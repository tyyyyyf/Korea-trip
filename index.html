<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 Pro Max+ Photo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-bg': '#F8F5F2',
                        'cream-card': '#FFFFFF',
                        'cream-accent': '#4A342E',
                        'cream-primary': '#E8DCCF',
                        'cat-att': '#D9B99B', 'cat-res': '#E8DCCF', 'cat-caf': '#EEDFCC',
                        'cat-shp': '#F3E9E0', 'cat-bis': '#C4A484', 'cat-mon': '#D2B48C', 'cat-oth': '#ECECEB',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .editable:focus { outline: 2px dashed #4A342E; background: rgba(74, 52, 46, 0.05); border-radius: 4px; color: #2C2C2C !important; }
        .active-nav-btn { color: #4A342E !important; }
        .day-btn { width: 75px; height: 75px; flex-shrink: 0; transition: all 0.2s; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); }
        .timeline-line::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #E8DCCF; opacity: 0.5; }
        #detail-modal { position: fixed; inset: 0; z-index: 500; background: #FFFFFF; display: none; overflow-y: auto; }
        #detail-modal.active { display: block; animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        /* 隱私控制 */
        .owner-only { display: none !important; }
        body.is-owner .owner-only { display: block !important; }
        body.is-owner .owner-only-flex { display: flex !important; }
        
        /* 圖片容器 */
        .photo-box { width: 100%; aspect-ratio: 4/3; background: #F3F4F6; border-radius: 1rem; overflow: hidden; position: relative; border: 2px dashed #E5E7EB; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .img-fullscreen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; items-center: center; justify-content: center; padding: 20px; }
        .img-fullscreen.active { display: flex; }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-cream-bg shadow-inner">
        
        <!-- Header -->
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-cream-primary/20 flex justify-between items-center">
            <h1 id="trip-title" contenteditable="true" onblur="saveState()" class="editable text-lg font-black tracking-tight italic">🇰🇷 韓國之旅 2026</h1>
            <div onclick="unlockSystem()" id="lock-indicator" class="w-10 h-10 rounded-full bg-cream-accent text-white flex items-center justify-center cursor-pointer shadow-lg active:scale-90 transition">
                <i id="lock-icon" class="fa-solid fa-lock text-xs"></i>
            </div>
        </header>

        <!-- [分頁 1] 行程 -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <div id="day-selector" class="flex space-x-2 overflow-x-auto no-scrollbar mb-8 pb-4"></div>
            <div class="relative timeline-line ml-1" id="itinerary-list"></div>
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-cream-primary rounded-[2rem] text-cream-accent font-bold text-sm tracking-widest">+ 新增行程項目</button>
        </section>

        <!-- [分頁 2] 待辦 -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic tracking-tight">行前待辦</h2>
                <button onclick="addTodoGroup()" class="bg-cream-accent text-white px-4 py-2 rounded-full text-[10px] font-black uppercase">+ 新增分類</button>
            </div>
            <div id="todo-groups" class="space-y-6"></div>
        </section>

        <!-- [分頁 3] 採購 (私密) -->
        <section id="tab-wishlist" class="tab-content px-6 pt-8 owner-only">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic tracking-tight">採購清單</h2>
                <button onclick="addWishGroup()" class="bg-cream-accent text-white px-4 py-2 rounded-full text-[10px] font-black uppercase">+ 新增分類</button>
            </div>
            <div id="wishlist-groups" class="space-y-6"></div>
        </section>

        <!-- [分頁 4] 記帳 -->
        <section id="tab-budget" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic text-cream-accent tracking-tighter">旅遊記帳</h2>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-4 text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-2">總預算進度</p>
                <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden mb-2">
                    <div id="budget-bar" class="bg-cream-accent h-full transition-all duration-700" style="width: 0%"></div>
                </div>
                <h3 id="total-spent" class="text-3xl font-black italic">NT$ 0</h3>
            </div>
            <div id="expense-list" class="space-y-4"></div>
        </section>

        <!-- [分頁 5] 資訊 -->
        <section id="tab-info" class="tab-content px-6 pt-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic text-cream-accent tracking-widest">資訊</h2>
                <button onclick="addCustomInfo()" class="bg-cream-accent text-white px-4 py-2 rounded-full text-[10px] font-black uppercase">+ 新增區塊</button>
            </div>
            <div id="custom-info-list" class="space-y-4"></div>
        </section>

        <!-- 底部導覽 -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] bg-white/80 backdrop-blur-2xl border border-white/50 h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-1 z-[100]">
            <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-btn flex flex-col items-center space-y-1 active-nav-btn text-gray-300">
                <i class="fa-solid fa-compass text-lg"></i><span class="text-[8px] font-black uppercase">行程</span>
            </button>
            <button onclick="switchTab('todo')" id="nav-todo" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-list-check text-lg"></i><span class="text-[8px] font-black uppercase">待辦</span>
            </button>
            <button onclick="switchTab('wishlist')" id="nav-wishlist" class="nav-btn owner-only-flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-basket-shopping text-lg"></i><span class="text-[8px] font-black uppercase">採購</span>
            </button>
            <button onclick="switchTab('budget')" id="nav-budget" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-sack-dollar text-lg"></i><span class="text-[8px] font-black uppercase">記帳</span>
            </button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-circle-info text-lg"></i><span class="text-[8px] font-black uppercase">資訊</span>
            </button>
        </nav>
    </div>

    <!-- [詳細頁 Modal] -->
    <div id="detail-modal" class="no-scrollbar">
        <div class="sticky top-0 z-[510] bg-white/90 backdrop-blur-md px-6 py-5 border-b border-gray-100 flex justify-between items-center">
            <button onclick="closeDetailModal()" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full text-gray-400">✕</button>
            <h3 class="text-[10px] font-black italic text-cream-accent uppercase">Detailed View</h3>
            <button onclick="saveCurrentDetail()" class="px-6 py-2 bg-cream-accent text-white rounded-full text-xs font-black">SAVE</button>
        </div>
        <div class="p-8 pb-40 space-y-8">
            <input type="hidden" id="detail-idx">
            <div class="space-y-4">
                <input id="detail-title" type="text" class="w-full text-3xl font-black border-none outline-none italic tracking-tighter" placeholder="景點名稱">
                <div class="flex items-center space-x-2">
                    <input id="detail-time" type="time" class="bg-gray-100 p-2 rounded-xl font-mono text-sm">
                    <select id="detail-type" class="bg-gray-100 p-2 rounded-xl text-xs font-black uppercase italic">
                        <option value="景點">景點</option><option value="餐廳">餐廳</option><option value="購物">購物</option><option value="住宿">住宿</option><option value="交通">交通</option>
                    </select>
                </div>
                <textarea id="detail-desc" rows="3" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm" placeholder="行程詳細描述..."></textarea>
            </div>

            <div id="detail-shopping-section" class="owner-only border-t pt-8">
                <div class="flex justify-between items-end mb-6">
                    <h4 class="text-xl font-black italic text-cream-accent">Shopping List</h4>
                    <button onclick="addDetailShop()" class="bg-cream-accent text-white px-4 py-2 rounded-full text-[10px]">+ Add Item</button>
                </div>
                <div id="detail-shopping-list" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <!-- 全螢幕大圖查看 -->
    <div id="img-fullscreen" class="img-fullscreen" onclick="this.classList.remove('active')">
        <img src="" id="full-img-src" class="max-w-full max-h-full rounded-lg shadow-2xl">
    </div>

    <script>
        // --- 初始化狀態 ---
        let state = JSON.parse(localStorage.getItem('korea_v3_data')) || {
            title: "🇰🇷 韓國之旅 2026", budget: 50000, currentDay: 1,
            itin: { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] },
            todoGroups: [{ title: "重要證件", items: ["護照", "簽證"] }],
            expenses: [], customInfo: [], 
            wishGroups: [{ title: "美妝保養", items: [{ name: "眼霜", img: null, done: false }] }]
        };

        let isOwner = false;
        const dayList = [{d:"7/5",w:"SUN"},{d:"7/6",w:"MON"},{d:"7/7",w:"TUE"},{d:"7/8",w:"WED"},{d:"7/9",w:"THU"},{d:"7/10",w:"FRI"},{d:"7/11",w:"SAT"}];

        function unlockSystem() {
            if (!isOwner) {
                const pass = prompt("請輸入密碼：");
                if (pass === "8888") {
                    isOwner = true;
                    document.body.classList.add('is-owner');
                    document.getElementById('lock-icon').className = "fa-solid fa-lock-open text-xs";
                }
            } else {
                isOwner = false;
                document.body.classList.remove('is-owner');
                document.getElementById('lock-icon').className = "fa-solid fa-lock text-xs";
            }
        }

        function saveState() {
            state.title = document.getElementById('trip-title').innerText;
            localStorage.setItem('korea_v3_data', JSON.stringify(state));
            updateSummary();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('active-nav-btn', 'text-gray-300'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.replace('text-gray-300', 'active-nav-btn');
        }

        // --- 核心渲染函數 ---
        function renderAll() {
            renderDayNav(); renderItin(); renderTodos(); renderWishlist(); renderExpenses(); renderInfo(); updateSummary();
        }

        // 1. 行程渲染
        function renderDayNav() {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            dayList.forEach((d, i) => {
                const num = i + 1;
                const btn = document.createElement('button');
                btn.className = `day-btn flex flex-col items-center justify-center rounded-2xl ${state.currentDay == num ? 'active' : 'bg-white shadow-sm'}`;
                btn.onclick = () => { state.currentDay = num; renderAll(); };
                btn.innerHTML = `<span class="text-[9px] font-black opacity-40">Day ${num}</span><span class="text-sm font-black italic">${d.d}</span>`;
                container.appendChild(btn);
            });
        }

        function renderItin() {
            const list = document.getElementById('itinerary-list'); list.innerHTML = "";
            const items = state.itin[state.currentDay] || [];
            items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "relative pl-10 mb-8";
                div.innerHTML = `
                    <div class="absolute left-[13px] top-1 w-4 h-4 rounded-full bg-cream-accent border-4 border-white z-10"></div>
                    <div onclick="openDetailModal(${idx})" class="bg-white p-5 rounded-[2rem] shadow-sm relative">
                        <div class="flex justify-between mb-2">
                            <span class="text-xs font-black text-cream-accent italic">${item.time || '12:00'}</span>
                            <button onclick="event.stopPropagation(); delItin(${idx})" class="text-gray-200">✕</button>
                        </div>
                        <h3 class="font-black text-base uppercase">${item.title}</h3>
                    </div>`;
                list.appendChild(div);
            });
        }
        function addNewItinerary() { state.itin[state.currentDay].push({ time: "12:00", title: "新行程", type: "景點", shops: [] }); saveState(); renderItin(); }
        function delItin(idx) { state.itin[state.currentDay].splice(idx,1); saveState(); renderItin(); }

        // 2. 待辦事項修復
        function renderTodos() {
            const container = document.getElementById('todo-groups'); container.innerHTML = "";
            state.todoGroups.forEach((group, gIdx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2rem] shadow-sm";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 contenteditable="true" onblur="updateTodoG(${gIdx}, this)" class="font-black italic underline decoration-cream-primary">${group.title}</h3>
                        <button onclick="delTodoG(${gIdx})" class="text-gray-200 text-xs">✕</button>
                    </div>
                    <div class="space-y-3">
                        ${group.items.map((item, iIdx) => `
                            <div class="flex items-center justify-between group bg-gray-50/50 p-2 rounded-xl">
                                <div class="flex items-center space-x-3">
                                    <div class="w-4 h-4 border border-gray-300 rounded"></div>
                                    <span contenteditable="true" onblur="updateTodoI(${gIdx}, ${iIdx}, this)" class="text-sm font-medium">${item}</span>
                                </div>
                                <button onclick="delTodoI(${gIdx}, ${iIdx})" class="text-red-200 text-xs">✕</button>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="addTodoI(${gIdx})" class="mt-4 text-[10px] font-black text-gray-300 uppercase">+ 新增事項</button>
                `;
                container.appendChild(div);
            });
        }
        function addTodoGroup() { state.todoGroups.push({ title: "新分類", items: ["新事項"] }); saveState(); renderTodos(); }
        function delTodoG(idx) { state.todoGroups.splice(idx,1); saveState(); renderTodos(); }
        function addTodoI(gIdx) { state.todoGroups[gIdx].items.push("新事項"); saveState(); renderTodos(); }
        function delTodoI(gIdx, iIdx) { state.todoGroups[gIdx].items.splice(iIdx, 1); saveState(); renderTodos(); }
        function updateTodoG(idx, el) { state.todoGroups[idx].title = el.innerText; saveState(); }
        function updateTodoI(gIdx, iIdx, el) { state.todoGroups[gIdx].items[iIdx] = el.innerText; saveState(); }

        // 3. 採購清單照片加強
        function renderWishlist() {
            const container = document.getElementById('wishlist-groups'); container.innerHTML = "";
            state.wishGroups.forEach((group, gIdx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2rem] shadow-sm";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 contenteditable="true" onblur="updateWishG(${gIdx}, this)" class="font-black italic underline decoration-cream-primary">${group.title}</h3>
                        <button onclick="delWishG(${gIdx})" class="text-gray-200 text-xs">✕</button>
                    </div>
                    <div class="space-y-6">
                        ${group.items.map((item, iIdx) => `
                            <div class="bg-gray-50/50 p-4 rounded-[1.5rem] relative">
                                <button onclick="delWishI(${gIdx}, ${iIdx})" class="absolute top-4 right-4 text-gray-300">✕</button>
                                <div class="flex items-center space-x-3 mb-4">
                                    <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleWish(${gIdx}, ${iIdx})" class="w-5 h-5 accent-cream-accent">
                                    <span contenteditable="true" onblur="updateWishIName(${gIdx}, ${iIdx}, this)" class="text-sm font-black ${item.done ? 'line-through opacity-30' : ''}">${item.name}</span>
                                </div>
                                <div class="photo-box" onclick="triggerImg('wish-${gIdx}-${iIdx}')">
                                    ${item.img ? `<img src="${item.img}" onclick="viewFull('${item.img}')">` : '<div class="h-full flex items-center justify-center text-gray-300"><i class="fa-solid fa-camera text-2xl"></i></div>'}
                                    <input type="file" id="wish-${gIdx}-${iIdx}" class="hidden" accept="image/*" onchange="handleImg(this, 'wish', ${gIdx}, ${iIdx})">
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="addWishI(${gIdx})" class="mt-6 w-full py-3 border-2 border-dashed border-gray-100 text-[10px] font-black text-gray-300 uppercase rounded-xl">+ 新增商品</button>
                `;
                container.appendChild(div);
            });
        }
        function addWishGroup() { state.wishGroups.push({ title: "新分類", items: [{ name: "新商品", img: null, done: false }] }); saveState(); renderWishlist(); }
        function delWishG(idx) { state.wishGroups.splice(idx,1); saveState(); renderWishlist(); }
        function addWishI(gIdx) { state.wishGroups[gIdx].items.push({ name: "新商品", img: null, done: false }); saveState(); renderWishlist(); }
        function delWishI(gIdx, iIdx) { state.wishGroups[gIdx].items.splice(iIdx,1); saveState(); renderWishlist(); }
        function updateWishG(idx, el) { state.wishGroups[idx].title = el.innerText; saveState(); }
        function updateWishIName(gIdx, iIdx, el) { state.wishGroups[gIdx].items[iIdx].name = el.innerText; saveState(); }
        function toggleWish(gIdx, iIdx) { state.wishGroups[gIdx].items[iIdx].done = !state.wishGroups[gIdx].items[iIdx].done; saveState(); renderWishlist(); }

        // 4. 資訊頁面修復
        function renderInfo() {
            const container = document.getElementById('custom-info-list'); container.innerHTML = "";
            state.customInfo.forEach((info, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2rem] shadow-sm relative";
                div.innerHTML = `
                    <button onclick="delInfo(${idx})" class="absolute top-6 right-6 text-gray-200 text-xs">✕</button>
                    <h4 contenteditable="true" onblur="updateInfoT(${idx}, this)" class="font-black text-sm mb-2 italic underline decoration-cream-accent/20">${info.title || "標題"}</h4>
                    <div contenteditable="true" onblur="updateInfoC(${idx}, this)" class="text-[11px] text-gray-500 leading-relaxed font-mono whitespace-pre-wrap">${info.content || "點擊編輯內容..."}</div>
                `;
                container.appendChild(div);
            });
        }
        function addCustomInfo() { state.customInfo.push({ title: "新資訊區塊", content: "在這裡輸入重要資訊..." }); saveState(); renderInfo(); }
        function delInfo(idx) { state.customInfo.splice(idx, 1); saveState(); renderInfo(); }
        function updateInfoT(idx, el) { state.customInfo[idx].title = el.innerText; saveState(); }
        function updateInfoC(idx, el) { state.customInfo[idx].content = el.innerText; saveState(); }

        // --- 圖片處理系統 ---
        function triggerImg(id) { document.getElementById(id).click(); }
        function handleImg(input, type, gIdx, iIdx) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result;
                if (type === 'wish') {
                    state.wishGroups[gIdx].items[iIdx].img = base64;
                } else if (type === 'detail') {
                    const dIdx = document.getElementById('detail-idx').value;
                    state.itin[state.currentDay][dIdx].shops[iIdx].img = base64;
                }
                saveState();
                if (type === 'wish') renderWishlist(); else renderDetailShops();
            };
            reader.readAsDataURL(file);
        }
        function viewFull(src) {
            document.getElementById('full-img-src').src = src;
            document.getElementById('img-fullscreen').classList.add('active');
        }

        // --- 詳細頁購物清單加強 ---
        function openDetailModal(idx) {
            const item = state.itin[state.currentDay][idx];
            document.getElementById('detail-idx').value = idx;
            document.getElementById('detail-title').value = item.title;
            document.getElementById('detail-time').value = item.time;
            document.getElementById('detail-type').value = item.type;
            document.getElementById('detail-desc').value = item.desc || "";
            if(!item.shops) item.shops = [];
            renderDetailShops();
            document.getElementById('detail-modal').classList.add('active');
        }
        function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }
        function renderDetailShops() {
            const dIdx = document.getElementById('detail-idx').value;
            const shops = state.itin[state.currentDay][dIdx].shops;
            const container = document.getElementById('detail-shopping-list');
            container.innerHTML = shops.map((shop, iIdx) => `
                <div class="bg-gray-50 p-4 rounded-2xl relative">
                    <button onclick="delDetailShop(${iIdx})" class="absolute top-4 right-4 text-gray-300">✕</button>
                    <input type="text" value="${shop.name}" onblur="updateDetailShopName(${iIdx}, this.value)" class="bg-transparent font-black text-sm mb-4 outline-none w-4/5" placeholder="商品名稱">
                    <div class="photo-box" onclick="triggerImg('shop-${iIdx}')">
                        ${shop.img ? `<img src="${shop.img}" onclick="viewFull('${shop.img}')">` : '<div class="h-full flex items-center justify-center text-gray-300"><i class="fa-solid fa-camera"></i></div>'}
                        <input type="file" id="shop-${iIdx}" class="hidden" accept="image/*" onchange="handleImg(this, 'detail', 0, ${iIdx})">
                    </div>
                </div>
            `).join('');
        }
        function addDetailShop() {
            const dIdx = document.getElementById('detail-idx').value;
            state.itin[state.currentDay][dIdx].shops.push({ name: "新商品", img: null });
            saveState(); renderDetailShops();
        }
        function delDetailShop(iIdx) {
            const dIdx = document.getElementById('detail-idx').value;
            state.itin[state.currentDay][dIdx].shops.splice(iIdx, 1);
            saveState(); renderDetailShops();
        }
        function updateDetailShopName(iIdx, val) {
            const dIdx = document.getElementById('detail-idx').value;
            state.itin[state.currentDay][dIdx].shops[iIdx].name = val;
            saveState();
        }
        function saveCurrentDetail() {
            const dIdx = document.getElementById('detail-idx').value;
            const item = state.itin[state.currentDay][dIdx];
            item.title = document.getElementById('detail-title').value;
            item.time = document.getElementById('detail-time').value;
            item.type = document.getElementById('detail-type').value;
            item.desc = document.getElementById('detail-desc').value;
            saveState(); renderItin(); closeDetailModal();
        }

        // --- 記帳渲染 ---
        function renderExpenses() {
            const list = document.getElementById('expense-list'); list.innerHTML = "";
            state.expenses.forEach((e, idx) => {
                const div = document.createElement('div'); div.className = "bg-white p-4 rounded-2xl shadow-sm flex justify-between";
                div.innerHTML = `<div><p class="text-sm font-black">${e.item}</p><p class="text-[9px] text-gray-400">${e.payer}</p></div><p class="font-mono text-sm">NT$ ${e.twd}</p>`;
                list.appendChild(div);
            });
        }

        function updateSummary() {
            const spent = state.expenses.reduce((s, e) => s + e.twd, 0);
            document.getElementById('total-spent').innerText = `NT$ ${spent.toLocaleString()}`;
            document.getElementById('budget-bar').style.width = Math.min(100, (spent / state.budget) * 100) + '%';
        }

        window.onload = () => { renderAll(); };
    </script>
</body>
</html>
