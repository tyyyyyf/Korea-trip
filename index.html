<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 2026 V11.6 LINK-PRO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .bg-accent { background-color: #4A342E; }
        .text-accent { color: #4A342E; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(74, 52, 46, 0.3); }
        
        .seg-btn { background-color: #FFFFFF; color: #8B8B8B; border: 1px solid #F3F0ED; font-size: 10px; font-weight: bold; padding: 8px 0; border-radius: 12px; transition: 0.2s; }
        .seg-btn.active { background-color: #4A342E; color: #FFFFFF; border-color: #4A342E; }
        
        #detail-modal, #zoom-modal, #expense-modal { position: fixed; inset: 0; z-index: 500; background: #FFFFFF; display: none; overflow-y: auto; }
        #detail-modal.active, #zoom-modal.active, #expense-modal.active { display: block; }
        #expense-modal { background: rgba(0,0,0,0.5); align-items: flex-end; }
        #expense-modal.active { display: flex; }
        
        .active-nav-btn { color: #4A342E !important; opacity: 1 !important; }
        .itin-img { width: 100%; height: 160px; object-fit: cover; border-radius: 1.5rem; margin-top: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .sortable-ghost { opacity: 0.2; background: #E8DCCF !important; border: 2px dashed #4A342E !important; }
        .badge-lg { padding: 6px 14px; border-radius: 99px; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* 網址點擊樣式 */
        .desc-link { color: #2563eb; text-decoration: underline; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body class="flex justify-center">

        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbGaaDf-WbI32waybI_jqRaU3HqSsAT6c",
            authDomain: "korea2026-e207a.firebaseapp.com",
            projectId: "korea2026-e207a",
            storageBucket: "korea2026-e207a.firebasestorage.app",
            messagingSenderId: "312602966357",
            appId: "1:312602966357:web:868542b30d43a0737b57dc",
            measurementId: "G-D1YGW14J6X"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tripRef = ref(db, 'korea2026_data');

        window.state = { 
            budget: 50000, currentDay: 1, 
            hotel: { name: "YL民宿", en: "Seoul Jung-gu Sogong-ro 6na-gil 11", kr: "서울특별시 중구 소공로6나길 11 와이엘 게스트訂하우스" },
            itin: { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] }, todoGroups: [], expenses: [], customInfo: [] 
        };

        onValue(tripRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                if (!data.itin) data.itin = { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] };
                window.state = data;
                renderAll(); 
            }
        });

        window.saveToCloud = () => set(tripRef, window.state);
        window.onload = () => { switchTab('schedule'); };
    </script>

    <!-- UI 功能 -->
    <script>
        const dayList = [{d:"7/5"},{d:"7/6"},{d:"7/7"},{d:"7/8"},{d:"7/9"},{d:"7/10"},{d:"7/11"}];
        const payers = ["小慌", "昱凱", "小安", "文哥", "零用金"];
        const payMethods = ["現金", "Wowpass", "信用卡", "其他"];
        let curPayer = "文哥", curMethod = "現金", tempImgData = "";

        // 網址識別函數
        function urlify(text) {
            if(!text) return "";
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, (url) => {
                return `<a href="${url}" target="_blank" class="desc-link" onclick="event.stopPropagation()">${url}</a>`;
            });
        }

        function getItinColor(type) {
            const darkBrown = 'text-[#4A342E]';
            switch(type) {
                case '景點': return { bg: 'bg-[#FFF9C4]', text: darkBrown, badge: 'bg-[#4A342E]/10 text-[#4A342E]' };
                case '餐廳': return { bg: 'bg-[#E3F2FD]', text: darkBrown, badge: 'bg-[#4A342E]/10 text-[#4A342E]' };
                case '購物': return { bg: 'bg-[#FCE4EC]', text: darkBrown, badge: 'bg-[#4A342E]/10 text-[#4A342E]' };
                case '住宿': return { bg: 'bg-[#FFF4B3]', text: darkBrown, badge: 'bg-[#4A342E]/10 text-[#4A342E]' };
                case '交通': return { bg: 'bg-[#C8E6C9]', text: darkBrown, badge: 'bg-[#4A342E]/10 text-[#4A342E]' };
                default: return { bg: 'bg-[#F5F5F5]', text: darkBrown, badge: 'bg-[#4A342E]/10 text-[#4A342E]' };
            }
        }

        function initSortable() {
            const el = document.getElementById('itinerary-list');
            if(!el) return;
            if (window.sortableInstance) window.sortableInstance.destroy();
            window.sortableInstance = Sortable.create(el, {
                animation: 200, handle: '.itin-card', ghostClass: 'sortable-ghost',
                onEnd: () => {
                    const dayItin = window.state.itin[window.state.currentDay];
                    const newOrder = [];
                    document.querySelectorAll('.itin-card').forEach(card => newOrder.push(dayItin[card.getAttribute('data-idx')]));
                    window.state.itin[window.state.currentDay] = newOrder;
                    window.saveToCloud();
                }
            });
        }

        function renderItin() {
            const list = document.getElementById('itinerary-list'); list.innerHTML = "";
            const items = window.state.itin[window.state.currentDay] || [];
            items.forEach((item, idx) => {
                const color = getItinColor(item.type);
                const div = document.createElement('div');
                div.className = `itin-card ${color.bg} ${color.text} p-6 rounded-[2.5rem] shadow-sm relative transition-all active:scale-[0.98]`;
                div.setAttribute('data-idx', idx);
                
                const addressLine = (item.addrKr || item.addrCn) ? `<p class="text-[11px] font-bold opacity-50 mt-1 italic">📍 ${item.addrKr || item.addrCn}</p>` : '';
                
                // 處理備註內容 (自動換行 + 連結活化)
                const descContent = item.desc ? 
                    `<div class="text-[11px] font-medium opacity-70 mt-3 whitespace-pre-wrap border-t border-black/5 pt-2">${urlify(item.desc)}</div>` : '';

                div.innerHTML = `
                    <button onclick="event.stopPropagation(); delItin(${idx})" class="absolute top-6 right-6 opacity-30">✕</button>
                    <div onclick="openDetailModal(${idx})">
                        <div class="flex justify-between items-start">
                            <div class="flex-1 pr-4">
                                <span class="text-xs font-mono font-black opacity-40">${item.time}</span>
                                <h3 class="font-black text-2xl italic tracking-tighter leading-tight mt-0.5">${item.title || '地點'}</h3>
                                ${addressLine}
                            </div>
                            <span class="badge-lg ${color.badge} shrink-0">${item.type || '其他'}</span>
                        </div>
                        ${descContent}
                        ${item.img ? `<img src="${item.img}" class="itin-img">` : ''}
                    </div>`;
                list.appendChild(div);
            });
            initSortable();
        }

        // --- 核心彈窗邏輯 ---
        function openDetailModal(idx) {
            const item = window.state.itin[window.state.currentDay][idx];
            document.getElementById('detail-idx').value = idx;
            document.getElementById('detail-title').value = item.title || "";
            document.getElementById('detail-time').value = item.time || "12:00";
            document.getElementById('detail-addr-cn').value = item.addrCn || "";
            document.getElementById('detail-addr-kr').value = item.addrKr || "";
            document.getElementById('detail-desc').value = item.desc || "";
            document.getElementById('detail-type').value = item.type || "景點";
            const preview = document.getElementById('detail-img-src');
            if(item.img) { preview.src = item.img; preview.classList.remove('hidden'); tempImgData = item.img; }
            else { preview.classList.add('hidden'); tempImgData = ""; }
            document.getElementById('detail-modal').classList.add('active');
        }

        function saveCurrentDetail() {
            const idx = document.getElementById('detail-idx').value;
            const item = window.state.itin[window.state.currentDay][idx];
            item.title = document.getElementById('detail-title').value;
            item.time = document.getElementById('detail-time').value;
            item.addrCn = document.getElementById('detail-addr-cn').value;
            item.addrKr = document.getElementById('detail-addr-kr').value;
            item.desc = document.getElementById('detail-desc').value;
            item.type = document.getElementById('detail-type').value;
            item.img = tempImgData;
            window.saveToCloud(); closeDetailModal();
        }

        // --- 其餘模組 (導航、複製、記帳、待辦) ---
        function navPrecise(type, target) {
            if(!target) { alert("尚未輸入地址或標題"); return; }
            if(type === 'google') window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(target)}`);
            else window.open(`https://map.naver.com/v5/search/${encodeURIComponent(target)}`);
        }
        function copyRawTxt(txt) { if(!txt) return; navigator.clipboard.writeText(txt).then(() => alert("已複製！")); }

        function renderExpenses() {
            const list = document.getElementById('expense-list'); list.innerHTML = "";
            (window.state.expenses || []).sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((e, idx) => {
                const div = document.createElement('div'); div.className = "bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm mb-4 transition active:scale-95";
                div.innerHTML = `<div class="flex-1" onclick="editExp(${idx})"><div class="flex items-center space-x-2"><span class="text-[8px] bg-gray-50 text-accent px-1.5 py-0.5 rounded font-black uppercase border border-gray-100">${e.payer}</span><p class="font-black italic text-sm text-gray-700">${e.item}</p></div><p class="text-[9px] text-gray-400 font-bold mt-1">${e.method} · ${e.date.slice(5)}</p></div><div class="text-right"><p class="text-sm font-black font-mono text-accent tracking-tighter">NT$ ${e.twd.toLocaleString()}</p><button onclick="delExp(${idx})" class="text-[8px] text-red-200 font-black uppercase mt-1">Delete</button></div>`;
                list.appendChild(div);
            });
            updateSummary();
        }
        function saveExpense() {
            const idx = document.getElementById('edit-exp-id').value; const amt = parseFloat(document.getElementById('exp-amount').value) || 0;
            const rec = { item: document.getElementById('exp-item').value, date: document.getElementById('exp-date').value, amount: amt, currency: document.getElementById('exp-currency').value, twd: (document.getElementById('exp-currency').value==="KRW"?Math.round(amt*0.024):Math.round(amt)), payer: curPayer, method: curMethod, tax: document.getElementById('exp-tax').value, notes: document.getElementById('exp-notes').value };
            if(!window.state.expenses) window.state.expenses = []; if(idx !== "") window.state.expenses[idx] = rec; else window.state.expenses.push(rec); window.saveToCloud(); closeExpenseModal();
        }

        function handleImageUpload(input, type, idx = null) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader(); reader.onload = (e) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    const max = 800; let w = img.width, h = img.height;
                    if(w > h && w > max) { h *= max/w; w = max; } else if(h > max) { w *= max/h; h = max; }
                    canvas.width = w; canvas.height = h; ctx.drawImage(img, 0,0,w,h);
                    const data = canvas.toDataURL('image/jpeg', 0.6);
                    if(type==='itin') { tempImgData = data; document.getElementById('detail-img-src').src = data; document.getElementById('detail-img-src').classList.remove('hidden'); }
                    else { window.state.customInfo[idx].img = data; window.saveToCloud(); }
                }; img.src = e.target.result;
            }; reader.readAsDataURL(file);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav-btn'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav-btn');
            document.getElementById('fab-budget').style.display = (tab === 'budget') ? 'flex' : 'none';
        }
        function renderDayNav() {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            dayList.forEach((d, i) => {
                const btn = document.createElement('button'); btn.className = `day-btn flex flex-col items-center justify-center rounded-[1.6rem] min-w-[70px] h-[70px] ${window.state.currentDay == (i+1) ? 'active shadow-lg' : 'bg-white shadow-sm'}`;
                btn.onclick = () => { window.state.currentDay = i+1; renderAll(); };
                btn.innerHTML = `<span class="text-[9px] font-black opacity-40 uppercase">Day ${i+1}</span><span class="text-sm font-black italic">${d.d}</span>`;
                container.appendChild(btn);
            });
        }
        function updateSummary() {
            const total = (window.state.expenses || []).reduce((s, e) => s + (e.twd || 0), 0);
            document.getElementById('total-spent').innerText = `NT$ ${total.toLocaleString()}`;
            const budget = parseFloat(window.state.budget) || 50000;
            document.getElementById('budget-left').innerText = `${(budget - total).toLocaleString()}`;
            document.getElementById('budget-bar').style.width = Math.min(100, (total / budget) * 100) + '%';
        }
        function toggleSettlement() {
            const paid = {}; payers.forEach(p => { if(p !== "零用金") paid[p] = 0; });
            (window.state.expenses || []).forEach(e => { if(paid.hasOwnProperty(e.payer)) paid[e.payer] += e.twd; });
            const m = document.createElement('div'); m.className="fixed inset-0 z-[600] bg-black/50 flex items-center justify-center p-6";
            m.innerHTML=`<div class="bg-white rounded-[2.5rem] p-8 w-full max-w-xs shadow-2xl text-center"><h3 class="font-black mb-4 italic text-accent text-xl uppercase">Settlement</h3><div class="space-y-1 mb-4">${Object.keys(paid).map(p => `<div class="flex justify-between border-b py-3 text-sm font-bold"><span>${p}</span><span class="font-mono text-accent">NT$ ${paid[p].toLocaleString()}</span></div>`).join('')}</div><button onclick="this.parentElement.parentElement.remove()" class="mt-2 w-full py-4 bg-accent text-white rounded-2xl font-black italic uppercase text-xs">Close</button></div>`;
            document.body.appendChild(m);
        }
        function renderTodos() {
            const container = document.getElementById('todo-groups'); container.innerHTML = "";
            (window.state.todoGroups || []).forEach((g, gIdx) => {
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-[2rem] shadow-sm mb-4 relative";
                div.innerHTML = `<button onclick="window.state.todoGroups.splice(${gIdx},1); window.saveToCloud();" class="absolute top-6 right-6 text-gray-200">✕</button><h3 contenteditable="true" onblur="window.state.todoGroups[gIdx].title=this.innerText; window.saveToCloud()" class="text-base font-black italic underline decoration-[#E8DCCF]">${g.title}</h3><div class="mt-4 space-y-3">${(g.items || []).map((it, iIdx) => `<div class="flex items-center justify-between"><div class="flex items-center space-x-2"><input type="checkbox" ${it.done?'checked':''} onchange="window.state.todoGroups[gIdx].items[iIdx].done=!window.state.todoGroups[gIdx].items[iIdx].done; window.saveToCloud();" class="accent-accent"><span contenteditable="true" onblur="window.state.todoGroups[gIdx].items[iIdx].text=this.innerText; window.saveToCloud()" class="text-sm font-bold ${it.done?'line-through opacity-30':''}">${it.text}</span></div><button onclick="window.state.todoGroups[gIdx].items.splice(${iIdx},1); window.saveToCloud();" class="text-xs text-gray-200">✕</button></div>`).join('')}</div><button onclick="addTodoItem(${gIdx})" class="mt-4 text-[10px] font-black text-accent uppercase tracking-widest">+ 新增項目</button>`;
                container.appendChild(div);
            });
        }
        function renderInfo() {
            const container = document.getElementById('custom-info-list'); container.innerHTML = "";
            document.getElementById('hotel-name').innerText = window.state.hotel.name;
            document.getElementById('hotel-en').innerText = window.state.hotel.en;
            document.getElementById('hotel-kr').innerText = window.state.hotel.kr;
            (window.state.customInfo || []).forEach((info, idx) => {
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-[2rem] shadow-sm relative border border-gray-50 mb-4";
                div.innerHTML = `<button onclick="window.state.customInfo.splice(${idx},1); window.saveToCloud();" class="absolute top-6 right-6 text-gray-200">✕</button><h4 contenteditable="true" onblur="window.state.customInfo[idx].title=this.innerText; window.saveToCloud()" class="font-black text-sm uppercase italic mb-2 pr-8">${info.title}</h4><div contenteditable="true" onblur="window.state.customInfo[idx].content=this.innerText; window.saveToCloud()" class="text-[11px] text-gray-500 font-mono leading-relaxed whitespace-pre-wrap mb-4">${info.content}</div><div class="relative">${info.img ? `<img src="${info.img}" class="w-full rounded-xl cursor-pointer shadow-sm" onclick="zoomImg(this.src)">` : `<label class="flex items-center justify-center w-full py-5 bg-gray-50 rounded-xl border-2 border-dashed border-gray-100 cursor-pointer"><span class="text-[10px] font-bold text-gray-300">新增條碼/相片</span><input type="file" onchange="handleImageUpload(this, 'info', ${idx})" class="hidden" accept="image/*"></label>`}</div>`;
                container.appendChild(div);
            });
        }
        function initExpenseBtns() {
            document.getElementById('payer-btns').innerHTML = payers.map(p => `<button onclick="curPayer='${p}'; initExpenseBtns()" class="seg-btn ${p===curPayer?'active':''}">${p}</button>`).join('');
            document.getElementById('method-btns').innerHTML = payMethods.map(m => `<button onclick="curMethod='${m}'; initExpenseBtns()" class="seg-btn ${m===curMethod?'active':''}">${m}</button>`).join('');
        }
        function calcTwdHint() { const amt = parseFloat(document.getElementById('exp-amount').value) || 0; const cur = document.getElementById('exp-currency').value; document.getElementById('exp-twd-hint').innerText = (cur === "KRW") ? `約 NT$ ${Math.round(amt * 0.024).toLocaleString()}` : `無需換算`; }
        function openExpenseModal() { 
            document.getElementById('edit-exp-id').value = ""; document.getElementById('exp-item').value = ""; document.getElementById('exp-amount').value = ""; 
            document.getElementById('exp-date').valueAsDate = new Date(); document.getElementById('exp-tax').value = "無"; document.getElementById('exp-notes').value = "";
            document.getElementById('expense-modal').classList.add('active'); initExpenseBtns(); calcTwdHint();
        }
        function editExp(idx) {
            const e = window.state.expenses[idx]; document.getElementById('edit-exp-id').value = idx; document.getElementById('exp-item').value = e.item;
            document.getElementById('exp-date').value = e.date; document.getElementById('exp-amount').value = e.amount; document.getElementById('exp-tax').value = e.tax || "無";
            document.getElementById('exp-notes').value = e.notes || ""; curPayer = e.payer; curMethod = e.method; document.getElementById('expense-modal').classList.add('active'); initExpenseBtns(); calcTwdHint();
        }
        function addNewItinerary() { if(!window.state.itin[window.state.currentDay]) window.state.itin[window.state.currentDay] = []; window.state.itin[window.state.currentDay].push({ time:"12:00", title:"", addrCn:"", addrKr:"", desc:"", type:"景點", img:"" }); window.saveToCloud(); }
        function delItin(i) { if(confirm("刪除行程？")) { window.state.itin[window.state.currentDay].splice(i,1); window.saveToCloud(); } }
        function delExp(i) { if(confirm("刪除支出？")) { window.state.expenses.splice(i,1); window.saveToCloud(); } }
        function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }
        function closeExpenseModal() { document.getElementById('expense-modal').classList.remove('active'); }
        function zoomImg(src) { document.getElementById('zoom-img').src = src; document.getElementById('zoom-modal').classList.add('active'); }
        function addTodoGroup() { if(!window.state.todoGroups) window.state.todoGroups = []; window.state.todoGroups.push({ title: "新清單", items: [] }); window.saveToCloud(); }
        function addTodoItem(gIdx) { if(!window.state.todoGroups[gIdx].items) window.state.todoGroups[gIdx].items = []; window.state.todoGroups[gIdx].items.push({ text: "新事項", done: false }); window.saveToCloud(); }
        function addCustomInfo() { if(!window.state.customInfo) window.state.customInfo = []; window.state.customInfo.push({ title: "新標題", content: "點擊編輯...", img: "" }); window.saveToCloud(); }

        function renderAll() {
            renderDayNav();
            renderItin();
            renderTodos();
            renderExpenses();
            renderInfo();
            updateSummary();
        }
    </script>
</body>
</html>
