<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-bg': '#F8F5F2',
                        'cream-card': '#FFFFFF',
                        'cream-accent': '#4A342E',
                        'cream-primary': '#E8DCCF',
                        'cat-att': '#D9B99B', 'cat-res': '#E8DCCF', 'cat-caf': '#EEDFCC',
                        'cat-shp': '#F3E9E0', 'cat-bis': '#C4A484', 'cat-mon': '#D2B48C', 'cat-oth': '#ECECEB',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .editable:focus { outline: 2px dashed #4A342E; background: rgba(74, 52, 46, 0.05); border-radius: 4px; color: #2C2C2C !important; }
        .active-nav-btn { color: #4A342E !important; }
        .day-btn { width: 75px; height: 75px; flex-shrink: 0; transition: all 0.2s; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); }
        .timeline-line::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #E8DCCF; opacity: 0.5; }
        .seg-btn { background-color: #FFFFFF; color: #8B8B8B; border: 1px solid #F3F0ED; font-size: 10px; font-weight: bold; padding: 10px 0; border-radius: 12px; }
        .seg-btn.active { background-color: #4A342E; color: #FFFFFF; border-color: #4A342E; }
        #detail-modal { position: fixed; inset: 0; z-index: 500; background: #FFFFFF; display: none; overflow-y: auto; }
        #detail-modal.active { display: block; animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .placeholder-hint { color: #D1D5DB !important; }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-cream-bg shadow-inner">
        
        <!-- Header -->
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-cream-primary/20 flex justify-between items-center">
            <h1 id="trip-title" contenteditable="true" class="editable text-lg font-black tracking-tight italic"></h1>
            <div class="w-8 h-8 rounded-full bg-cream-accent text-white flex items-center justify-center text-[10px] font-bold font-mono tracking-tighter">2026</div>
        </header>

        <!-- [分頁 1] 行程 -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <div id="day-selector" class="flex space-x-2 overflow-x-auto no-scrollbar mb-8 pb-4"></div>
            <div class="relative timeline-line ml-1" id="itinerary-list"></div>
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-cream-primary rounded-[2rem] text-cream-accent font-bold text-sm tracking-widest">+ 新增行程項目</button>
        </section>

        <!-- [分頁 2] 待辦 -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic tracking-tight">行前待辦事項</h2>
            <div id="todo-groups" class="space-y-6"></div>
            <button onclick="addTodoGroup()" class="mt-6 w-full py-4 bg-white border border-gray-100 rounded-3xl text-gray-400 font-bold text-sm">+ 新增分類標題</button>
        </section>

        <!-- [分頁 3] 採購 -->
        <section id="tab-wishlist" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic tracking-tight">待採購項目</h2>
            <div id="wishlist-groups" class="space-y-6"></div>
            <button onclick="addWishGroup()" class="mt-6 w-full py-4 bg-white border border-gray-100 rounded-3xl text-gray-400 font-bold text-sm">+ 新增採購分類</button>
        </section>

        <!-- [分頁 4] 記帳 -->
        <section id="tab-budget" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic text-cream-accent tracking-tighter">旅遊記帳</h2>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-4">
                <div class="flex justify-between text-[11px] font-bold text-gray-400 mb-2 uppercase tracking-tighter">
                    <span>預算進度 (NT$ <span contenteditable="true" id="budget-val" class="editable font-mono"></span>)</span>
                    <span>剩餘: <span id="budget-left" class="text-cream-accent font-mono">0</span></span>
                </div>
                <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                    <div id="budget-bar" class="bg-cream-accent h-full transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
            <div class="bg-cream-accent text-white p-8 rounded-[2.5rem] shadow-lg mb-6 relative overflow-hidden text-center">
                <p class="text-[10px] opacity-70 font-bold mb-1 tracking-widest uppercase font-mono">總支出 (TWD)</p>
                <h3 id="total-spent" class="text-4xl font-black italic tracking-tighter font-mono underline decoration-white/20 decoration-2">NT$ 0</h3>
                <button onclick="toggleSettlement()" class="mt-4 bg-white/20 px-4 py-2 rounded-full text-[10px] font-bold border border-white/30 italic">查看分帳統計</button>
                <i class="fa-solid fa-sack-dollar absolute -right-4 -bottom-4 text-white/10 text-9xl"></i>
            </div>
            <div id="expense-date-filter" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 px-1"></div>
            <div id="expense-list" class="space-y-4"></div>
        </section>

        <!-- [分頁 5] 資訊 -->
        <section id="tab-info" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic text-cream-accent tracking-widest">資訊</h2>
            <div id="custom-info-list" class="space-y-4"></div>
            <button onclick="addCustomInfo()" class="mt-6 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-gray-400 font-bold text-sm tracking-widest">+ 新增資訊區塊</button>
        </section>

        <!-- 底部導覽 -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] bg-white/80 backdrop-blur-2xl border border-white/50 h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-1 z-[100]">
            <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-btn flex flex-col items-center space-y-1 active-nav-btn text-gray-300">
                <i class="fa-solid fa-compass text-lg"></i><span class="text-[8px] font-black uppercase">行程</span>
            </button>
            <button onclick="switchTab('todo')" id="nav-todo" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-list-check text-lg"></i><span class="text-[8px] font-black uppercase">待辦</span>
            </button>
            <button onclick="switchTab('wishlist')" id="nav-wishlist" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-basket-shopping text-lg"></i><span class="text-[8px] font-black uppercase">採購</span>
            </button>
            <button onclick="switchTab('budget')" id="nav-budget" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-sack-dollar text-lg"></i><span class="text-[8px] font-black uppercase">記帳</span>
            </button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-circle-info text-lg"></i><span class="text-[8px] font-black uppercase">資訊</span>
            </button>
        </nav>

        <!-- 記帳新增浮動按鈕 -->
        <button id="fab-budget" onclick="openExpenseModal()" class="hidden fixed bottom-32 right-8 w-14 h-14 bg-cream-accent text-white rounded-full shadow-2xl items-center justify-center text-xl z-[90] active:scale-90 transition">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- [詳細頁] -->
    <div id="detail-modal" class="no-scrollbar">
        <div class="sticky top-0 z-[510] bg-white/90 backdrop-blur-md px-6 py-5 border-b border-gray-100 flex justify-between items-center">
            <button onclick="closeDetailModal()" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full text-gray-400">✕</button>
            <h3 class="text-[10px] font-black italic tracking-widest text-cream-accent uppercase">Detailed Page</h3>
            <button onclick="saveCurrentDetail()" class="px-6 py-2 bg-cream-accent text-white rounded-full text-xs font-black shadow-lg">SAVE</button>
        </div>
        <div class="p-8 pb-40 space-y-8">
            <input type="hidden" id="detail-idx">
            <div class="space-y-4">
                <input id="detail-title" type="text" class="w-full text-3xl font-black border-none outline-none italic tracking-tighter" placeholder="景點名稱">
                <input id="detail-loc" type="text" class="w-full text-sm font-bold text-gray-400 border-none outline-none italic" placeholder="📍 地標名稱用於導航">
                <div class="flex items-center space-x-2 mt-2">
                    <div class="flex items-center space-x-2 text-cream-accent font-bold text-sm bg-cream-bg/50 px-4 py-2 rounded-xl w-fit">
                        <i class="fa-regular fa-clock"></i>
                        <input id="detail-time" type="time" class="bg-transparent border-none outline-none font-mono">
                    </div>
                    <select id="detail-type" class="text-[10px] font-black bg-white border border-cream-primary rounded-xl px-3 py-2 outline-none uppercase italic">
                        <option value="景點">景點</option>
                        <option value="餐廳">餐廳</option>
                        <option value="購物">購物</option>
                        <option value="住宿">住宿</option>
                        <option value="宵夜">宵夜</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="openM('google', document.getElementById('detail-loc').value || document.getElementById('detail-title').value)" class="py-4 bg-gray-50 rounded-2xl text-[10px] font-black italic border border-gray-100 uppercase">Google Maps</button>
                <button onclick="openM('naver', document.getElementById('detail-loc').value || document.getElementById('detail-title').value)" class="py-4 bg-green-50 rounded-2xl text-[10px] font-black text-green-700 italic border border-green-100 uppercase">NAVER Map</button>
            </div>
            <div class="space-y-6 pt-4">
                <textarea id="detail-desc" rows="3" class="w-full bg-gray-50 p-5 rounded-[2rem] outline-none text-sm font-medium leading-relaxed" placeholder="行程詳細描述..."></textarea>
                <textarea id="detail-notes" rows="2" class="w-full bg-orange-50/50 p-5 rounded-[2rem] outline-none text-sm font-medium italic" placeholder="重要備註事項..."></textarea>
            </div>
            <div class="pt-8 border-t border-gray-100">
                <div class="flex justify-between items-end mb-6">
                    <div><h4 class="text-xl font-black italic tracking-tighter">Shopping List 🧾</h4><p id="shop-progress-text" class="text-[9px] font-black text-gray-400 uppercase mt-1">0 Items Bought (0%)</p></div>
                    <button onclick="addShopGroup()" class="bg-cream-accent text-white px-4 py-2 rounded-full text-[10px] font-black uppercase shadow-lg shadow-cream-accent/20">+ Add Shop</button>
                </div>
                <div id="shopping-list-area" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- 記帳 Modal -->
    <div id="expense-modal" class="fixed inset-0 z-[200] hidden bg-black/40 backdrop-blur-sm flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] p-8 animate-[slideUp_0.3s] pb-12 overflow-y-auto max-h-[90vh] no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h3 id="exp-modal-title" class="text-xl font-black italic italic tracking-tighter">新增記帳</h3>
                <button onclick="closeExpenseModal()" class="w-8 h-8 bg-gray-100 rounded-full text-gray-400 text-xs font-black">✕</button>
            </div>
            <div class="space-y-6">
                <input type="hidden" id="edit-exp-id">
                <input id="exp-item" type="text" placeholder="項目名稱" class="w-full bg-gray-50 p-5 rounded-2xl outline-none text-sm font-bold">
                <input id="exp-date" type="date" class="w-full bg-gray-50 p-5 rounded-2xl outline-none text-sm font-bold font-mono">
                
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 block">付款人</label>
                    <div class="grid grid-cols-4 gap-2" id="payer-btns"></div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 block">花費分類</label>
                    <div class="grid grid-cols-4 gap-2" id="cat-btns"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-gray-400 mb-2 block uppercase tracking-widest">方式</label><div class="grid grid-cols-1 gap-2" id="payment-btns"></div></div>
                    <div><label class="text-[10px] font-black text-gray-400 mb-2 block uppercase tracking-widest">退稅</label><div class="grid grid-cols-1 gap-2" id="tax-btns"></div></div>
                </div>

                <div class="flex items-center space-x-2">
                    <select id="exp-currency" class="w-1/3 bg-gray-50 p-5 rounded-2xl text-[10px] font-black appearance-none"><option value="KRW">KRW(₩)</option><option value="TWD">TWD($)</option></select>
                    <input id="exp-amount" type="number" placeholder="金額" class="flex-1 bg-gray-50 p-5 rounded-2xl outline-none text-xl font-black italic tracking-tighter">
                </div>
                <div class="flex justify-between px-3 text-[10px] font-bold font-mono text-gray-400 italic">
                    <span>匯率: <input id="exp-rate" type="number" value="0.024" step="0.001" class="w-10 bg-transparent border-b outline-none text-cream-accent"></span>
                    <span id="exp-twd-hint" class="text-cream-accent uppercase">台幣: NT$ 0</span>
                </div>
                <button onclick="saveExpense()" class="w-full bg-cream-accent text-white py-5 rounded-[2rem] font-black shadow-lg tracking-widest uppercase italic">Save Now</button>
            </div>
        </div>
    </div>

    <!-- 分帳 Modal -->
    <div id="settlement-modal" class="fixed inset-0 z-[250] hidden bg-black/40 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="w-full max-w-[350px] bg-white rounded-[2.5rem] p-8 text-center"><h3 class="text-lg font-black italic mb-6 tracking-widest">分帳統計</h3><div id="settlement-content" class="space-y-3 mb-6"></div><button onclick="toggleSettlement()" class="w-full bg-cream-accent text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg italic">Close</button></div>
    </div>

    <script>
        // --- 核心資料 ---
        let state = JSON.parse(localStorage.getItem('korea_final_vMax')) || {
            title: "🇰🇷 韓國之旅 2026", budget: 50000, currentDay: 1,
            itin: { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] },
            todoGroups: [], expenses: [], customInfo: [], wishGroups: []
        };

        const dayList = [{d:"7/5",w:"SUN"},{d:"7/6",w:"MON"},{d:"7/7",w:"TUE"},{d:"7/8",w:"WED"},{d:"7/9",w:"THU"},{d:"7/10",w:"FRI"},{d:"7/11",w:"SAT"}];
        const payers = ["小慌", "昱凱", "小安", "文哥"];
        const expCats = ["吃飯", "購物", "景點費用", "其他"];
        const payments = ["信用卡", "現金", "行動支付"];
        const taxes = ["無", "未退稅", "已退稅"];
        let curPayer="文哥", curPayment="現金", curTax="無", curExpCat="其他";

        function setupAutoClear(el, placeholder) {
            if (!el.innerText.trim() || el.innerText.trim() === placeholder) {
                el.innerText = placeholder;
                el.classList.add('placeholder-hint');
            }
            el.onfocus = () => {
                if (el.innerText.trim() === placeholder) {
                    el.innerText = "";
                    el.classList.remove('placeholder-hint');
                }
            };
            el.onblur = () => {
                if (!el.innerText.trim()) {
                    el.innerText = placeholder;
                    el.classList.add('placeholder-hint');
                }
            };
        }

        function saveState() {
            state.title = document.getElementById('trip-title').innerText;
            state.budget = parseFloat(document.getElementById('budget-val').innerText) || 0;
            localStorage.setItem('korea_final_vMax', JSON.stringify(state));
            updateSummary();
        }

        window.onload = () => {
            renderAll();
            setupAutoClear(document.getElementById('trip-title'), "🇰🇷 韓國之旅 2026");
            setupAutoClear(document.getElementById('budget-val'), "50000");
            document.getElementById('exp-amount').oninput = calcHint;
            document.getElementById('exp-rate').oninput = calcHint;
        };

        function renderAll() {
            renderDayNav(); renderItin(); renderTodos(); renderWishlist(); renderExpenses('all'); renderInfo(); updateSummary();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-300'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav-btn'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav-btn');
            document.getElementById('nav-' + tab).classList.remove('text-gray-300');
            document.getElementById('fab-budget').style.display = (tab === 'budget') ? 'flex' : 'none';
        }

        // --- 行程功能 ---
        function renderDayNav() {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            dayList.forEach((d, i) => {
                const num = i + 1;
                const btn = document.createElement('button');
                btn.className = `day-btn flex-none rounded-2xl flex flex-col items-center justify-center shadow-sm transition-all ${state.currentDay == num ? 'active' : 'bg-white text-cream-sub'}`;
                btn.onclick = () => { state.currentDay = num; renderAll(); };
                btn.innerHTML = `<span class="text-[9px] font-black opacity-40 mb-1 tracking-tighter">Day ${num}</span><span class="text-[10px] font-bold">${d.w}</span><span class="text-sm font-black italic tracking-tighter">${d.d}</span>`;
                container.appendChild(btn);
            });
        }

        function getCatColor(type) {
            const map = {'景點':'bg-cat-att text-white','購物':'bg-cat-shp text-[#8B735B]','餐廳':'bg-cat-res text-cream-accent','咖啡廳':'bg-cat-caf text-[#8B7E74]','住宿':'bg-cat-bis text-white','交通':'bg-cat-mon text-white','宵夜':'bg-purple-200 text-purple-700','其他':'bg-cat-oth text-gray-500'};
            return map[type] || 'bg-white text-gray-400';
        }

        function renderItin() {
            const list = document.getElementById('itinerary-list'); 
            list.innerHTML = "";
            const currentItin = state.itin[state.currentDay] || [];
            
            currentItin.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "relative pl-10 mb-8 itin-item";
                
                // 排序按鈕邏輯
                const isFirst = idx === 0;
                const isLast = idx === currentItin.length - 1;

                div.innerHTML = `
                    <div class="absolute left-[13px] top-1 w-4 h-4 rounded-full bg-cream-accent border-4 border-white shadow z-10"></div>
                    <div onclick="openDetailModal(${idx})" class="bg-white p-5 rounded-[2rem] shadow-sm border border-cream-primary/10 relative transition active:scale-95">
                        <!-- 按鈕區 -->
                        <div class="absolute top-4 right-4 flex items-center space-x-3 text-gray-300">
                            ${!isFirst ? `<button onclick="event.stopPropagation(); reorderItin(${idx}, -1)" class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-gray-100 hover:text-cream-accent"><i class="fa-solid fa-arrow-up text-[10px]"></i></button>` : ''}
                            ${!isLast ? `<button onclick="event.stopPropagation(); reorderItin(${idx}, 1)" class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-gray-100 hover:text-cream-accent"><i class="fa-solid fa-arrow-down text-[10px]"></i></button>` : ''}
                            <button onclick="event.stopPropagation(); delItin(${idx})" class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-red-50 hover:text-red-400 ml-1"><i class="fa-solid fa-xmark text-sm"></i></button>
                        </div>
                        
                        <div class="flex justify-between mb-2 pr-24">
                            <span class="text-xs font-black text-cream-accent italic font-mono">${item.time || '12:00'}</span>
                            <span class="text-[8px] px-2 py-1 rounded-lg font-bold uppercase ${getCatColor(item.type)}">${item.type}</span>
                        </div>
                        <h3 class="font-black text-base italic tracking-tight uppercase">${item.title || '點擊編輯名稱'}</h3>
                        ${item.loc ? `<p class="text-[9px] text-gray-400 italic mt-1">📍 ${item.loc}</p>` : ''}
                    </div>`;
                list.appendChild(div);
            });
        }

        // 行程排序功能
        function reorderItin(idx, dir) {
            const arr = state.itin[state.currentDay];
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= arr.length) return;
            const temp = arr[idx];
            arr[idx] = arr[newIdx];
            arr[newIdx] = temp;
            saveState();
            renderItin();
        }

        function addNewItinerary() { 
            if(!state.itin[state.currentDay]) state.itin[state.currentDay] = [];
            state.itin[state.currentDay].push({ time:"12:00", title:"新項目", loc:"", type:"景點", desc:"", notes:"", shops:[] }); 
            saveState(); 
            renderItin(); 
        }
        
        function delItin(idx) { if(confirm("刪除行程？")) { state.itin[state.currentDay].splice(idx,1); saveState(); renderItin(); } }

        function openDetailModal(idx) {
            const item = state.itin[state.currentDay][idx];
            document.getElementById('detail-idx').value = idx;
            document.getElementById('detail-title').value = item.title;
            document.getElementById('detail-time').value = item.time || "12:00";
            document.getElementById('detail-type').value = item.type || "景點";
            document.getElementById('detail-loc').value = item.loc || "";
            document.getElementById('detail-desc').value = item.desc || "";
            document.getElementById('detail-notes').value = item.notes || "";
            renderShopping(item.shops || []);
            document.getElementById('detail-modal').classList.add('active');
        }
        function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }
        function saveCurrentDetail() {
            const idx = document.getElementById('detail-idx').value;
            const item = state.itin[state.currentDay][idx];
            item.title = document.getElementById('detail-title').value;
            item.time = document.getElementById('detail-time').value;
            item.type = document.getElementById('detail-type').value;
            item.loc = document.getElementById('detail-loc').value;
            item.desc = document.getElementById('detail-desc').value;
            item.notes = document.getElementById('detail-notes').value;
            saveState(); renderItin(); closeDetailModal();
        }

        function renderShopping(shops) {
            const area = document.getElementById('shopping-list-area'); area.innerHTML = "";
            let total = 0, bought = 0;
            shops.forEach((shop, sIdx) => {
                const sortedItems = [...shop.items].sort((a, b) => a.done - b.done);
                const bCount = shop.items.filter(i => i.done).length;
                const tCount = shop.items.length;
                const pct = tCount > 0 ? Math.round((bCount / tCount) * 100) : 0;
                total += tCount; bought += bCount;
                const isCollapsed = shop.collapsed || false;

                const div = document.createElement('div');
                div.className = "bg-white border border-gray-100 rounded-[2rem] p-5 shadow-sm space-y-4 overflow-hidden transition-all";
                div.innerHTML = `
                    <div class="flex justify-between items-center cursor-pointer" onclick="toggleShopCollapse(${sIdx})">
                        <div class="flex-1">
                            <h5 contenteditable="true" id="shop-n-${sIdx}" onclick="event.stopPropagation()" class="font-black text-sm italic uppercase tracking-widest">${shop.name}</h5>
                            <div class="mt-2 flex items-center space-x-2">
                                <div class="flex-1 h-1 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-cream-accent transition-all" style="width: ${pct}%"></div></div>
                                <span class="text-[9px] font-black text-cream-accent font-mono">${bCount}/${tCount}</span>
                                <i class="fa-solid fa-chevron-${isCollapsed?'down':'up'} text-gray-300 text-[8px] ml-2"></i>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); delShop(${sIdx})" class="text-gray-200 ml-4"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                    <div class="${isCollapsed ? 'hidden' : 'space-y-3'}">
                        ${sortedItems.map((i, iIdx) => {
                            const originalIdx = shop.items.indexOf(i);
                            return `
                            <div class="bg-gray-50/50 p-4 rounded-3xl space-y-3 relative group">
                                <div class="flex items-center space-x-3">
                                    <input type="checkbox" ${i.done?'checked':''} onchange="toggleShopItem(${sIdx},${originalIdx})" class="w-5 h-5 accent-cream-accent">
                                    <div class="flex-1">
                                        <div contenteditable="true" id="shop-i-${sIdx}-${originalIdx}" class="text-[11px] font-black tracking-tight ${i.done?'line-through opacity-30':''}">${i.name}</div>
                                        <div class="flex space-x-3 mt-1 text-[8px] font-black text-gray-400 font-mono italic uppercase">
                                            <span>₩ <span contenteditable="true" id="shop-p-${sIdx}-${originalIdx}">${i.price || 0}</span></span>
                                            <span>Qty: <span contenteditable="true" id="shop-q-${sIdx}-${originalIdx}">${i.qty || 1}</span></span>
                                        </div>
                                    </div>
                                    <button onclick="delShopItem(${sIdx},${originalIdx})" class="text-gray-200"><i class="fa-solid fa-xmark text-xs"></i></button>
                                </div>
                                <div class="flex items-center space-x-3 pl-8">
                                    <div class="w-10 h-10 rounded-xl bg-white border border-gray-100 flex items-center justify-center overflow-hidden flex-shrink-0 relative">
                                        ${i.img ? `<img src="${i.img}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-camera text-gray-200 text-sm"></i>`}
                                        <input type="file" accept="image/*" onchange="uploadImage(event, ${sIdx}, ${originalIdx})" class="absolute inset-0 opacity-0 cursor-pointer">
                                    </div>
                                    <textarea id="shop-nt-${sIdx}-${originalIdx}" placeholder="商品備註事項..." class="flex-1 bg-transparent text-[9px] italic border-none outline-none resize-none">${i.note || ''}</textarea>
                                </div>
                            </div>`}).join('')}
                        <button onclick="addShopItem(${sIdx})" class="text-[9px] font-black text-cream-accent uppercase tracking-widest">+ Add Item</button>
                    </div>`;
                area.appendChild(div);
                const nEl = div.querySelector(`#shop-n-${sIdx}`); setupAutoClear(nEl, "商店名稱");
                nEl.onblur = () => { shop.name = nEl.innerText; saveState(); };
                shop.items.forEach((item, iIdx) => {
                    const iEl = div.querySelector(`#shop-i-${sIdx}-${iIdx}`); if(iEl) setupAutoClear(iEl, "商品名稱");
                    if(iEl) iEl.onblur = () => { item.name = iEl.innerText; saveState(); };
                    const pEl = div.querySelector(`#shop-p-${sIdx}-${iIdx}`); if(pEl) pEl.onblur = (e) => { item.price = e.target.innerText; saveState(); };
                    const qEl = div.querySelector(`#shop-q-${sIdx}-${iIdx}`); if(qEl) qEl.onblur = (e) => { item.qty = e.target.innerText; saveState(); };
                    const ntEl = div.querySelector(`#shop-nt-${sIdx}-${iIdx}`); if(ntEl) ntEl.onblur = (e) => { item.note = e.target.value; saveState(); };
                });
            });
            const overallPct = total > 0 ? Math.round((bought / total) * 100) : 0;
            document.getElementById('shop-progress-text').innerText = `${bought} / ${total} Items Bought (${overallPct}%)`;
        }

        function toggleShopCollapse(s) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].collapsed = !state.itin[state.currentDay][idx].shops[s].collapsed; saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function addShopGroup() { const idx = document.getElementById('detail-idx').value; if(!state.itin[state.currentDay][idx].shops) state.itin[state.currentDay][idx].shops = []; state.itin[state.currentDay][idx].shops.push({ name: "商店名稱", items: [], collapsed: false }); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function delShop(s) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops.splice(s,1); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function addShopItem(s) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items.push({ name: "商品名稱", price:0, qty:1, done:false, img: "", note: "" }); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function toggleShopItem(s, i) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items[i].done = !state.itin[state.currentDay][idx].shops[s].items[i].done; saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function delShopItem(s, i) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items.splice(i,1); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }

        function uploadImage(e, sIdx, iIdx) {
            const idx = document.getElementById('detail-idx').value;
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max_w = 200; const scale = max_w / img.width;
                    canvas.width = max_w; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0,0, canvas.width, canvas.height);
                    state.itin[state.currentDay][idx].shops[sIdx].items[iIdx].img = canvas.toDataURL('image/jpeg', 0.7);
                    saveState(); renderShopping(state.itin[state.currentDay][idx].shops);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function renderWishlist() {
            const container = document.getElementById('wishlist-groups'); container.innerHTML = "";
            (state.wishGroups || []).forEach((group, gIdx) => {
                const total = group.items.length;
                const bought = group.doneItems ? group.doneItems.filter(d => d).length : 0;
                const pct = total > 0 ? Math.round((bought / total) * 100) : 0;

                const gDiv = document.createElement('div'); 
                gDiv.className = "bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 relative mb-4";
                gDiv.innerHTML = `
                    <button onclick="delWishG(${gIdx})" class="absolute top-6 right-6 text-gray-200 text-xs">✕</button>
                    <h3 id="wg-${gIdx}" contenteditable="true" class="editable text-base font-black mb-1 pr-6 italic uppercase underline decoration-cream-primary/60">${group.title}</h3>
                    
                    <div class="flex items-center space-x-2 mb-4">
                        <div class="flex-1 h-1 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-cream-accent transition-all" style="width: ${pct}%"></div></div>
                        <span class="text-[9px] font-black text-cream-accent font-mono">${bought}/${total}</span>
                    </div>

                    <div class="space-y-3">
                        ${group.items.map((item, iIdx) => {
                            const isDone = group.doneItems && group.doneItems[iIdx];
                            return `
                            <div class="flex items-center justify-between group bg-gray-50/50 p-3 rounded-2xl">
                                <div class="flex items-center space-x-3">
                                    <input type="checkbox" ${isDone?'checked':''} onchange="toggleWishItem(${gIdx}, ${iIdx})" class="w-4 h-4 accent-cream-accent">
                                    <span id="wi-${gIdx}-${iIdx}" contenteditable="true" class="editable text-xs font-bold ${isDone?'line-through opacity-30':'text-gray-600'}">${item}</span>
                                </div>
                                <button onclick="delWishI(${gIdx},${iIdx})" class="text-gray-200 text-xs opacity-0 group-hover:opacity-100">✕</button>
                            </div>`}).join('')}
                    </div>
                    <button onclick="addWishI(${gIdx})" class="mt-4 text-[10px] font-black text-gray-300 uppercase tracking-widest hover:text-cream-accent transition">+ 新增事項</button>`;
                container.appendChild(gDiv);
                
                const tgEl = gDiv.querySelector(`#wg-${gIdx}`); setupAutoClear(tgEl, "分類標題");
                tgEl.onblur = () => { group.title = tgEl.innerText; saveState(); };
                group.items.forEach((_, iIdx) => {
                    const tiEl = gDiv.querySelector(`#wi-${gIdx}-${iIdx}`); if(tiEl) setupAutoClear(tiEl, "代採購內容");
                    if(tiEl) tiEl.onblur = () => { group.items[iIdx] = tiEl.innerText; saveState(); };
                });
            });
        }
        function toggleWishItem(g, i) {
            if(!state.wishGroups[g].doneItems) state.wishGroups[g].doneItems = [];
            state.wishGroups[g].doneItems[i] = !state.wishGroups[g].doneItems[i];
            saveState(); renderWishlist();
        }
        function addWishGroup() { if(!state.wishGroups) state.wishGroups = []; state.wishGroups.push({ title: "分類標題", items: ["代採購內容"], doneItems: [false] }); saveState(); renderWishlist(); }
        function delWishG(idx) { state.wishGroups.splice(idx,1); saveState(); renderWishlist(); }
        function addWishI(idx) { state.wishGroups[idx].items.push("代採購內容"); if(!state.wishGroups[idx].doneItems) state.wishGroups[idx].doneItems = []; state.wishGroups[idx].doneItems.push(false); saveState(); renderWishlist(); }
        function delWishI(g, i) { state.wishGroups[g].items.splice(i,1); if(state.wishGroups[g].doneItems) state.wishGroups[g].doneItems.splice(i,1); saveState(); renderWishlist(); }

        function renderTodos() {
            const container = document.getElementById('todo-groups'); container.innerHTML = "";
            state.todoGroups.forEach((group, gIdx) => {
                const gDiv = document.createElement('div'); gDiv.className = "bg-white p-6 rounded-[2.5rem] shadow-sm relative mb-4";
                gDiv.innerHTML = `
                    <button onclick="delTodoG(${gIdx})" class="absolute top-6 right-6 text-gray-200 text-xs">✕</button>
                    <h3 id="tg-${gIdx}" contenteditable="true" class="editable text-base font-black mb-4 pr-6 italic uppercase underline decoration-cream-primary/40">${group.title}</h3>
                    <div class="space-y-3">
                        ${group.items.map((item, iIdx) => `
                            <div class="flex items-center justify-between group">
                                <div class="flex items-center space-x-3"><div class="w-4 h-4 rounded border border-gray-200 flex-shrink-0"></div>
                                <span id="ti-${gIdx}-${iIdx}" contenteditable="true" class="editable text-sm font-bold text-gray-500">${item}</span></div>
                                <button onclick="delTodoI(${gIdx},${iIdx})" class="text-gray-200 text-xs opacity-0 group-hover:opacity-100">✕</button>
                            </div>`).join('')}
                    </div>
                    <button onclick="addTodoI(${gIdx})" class="mt-4 text-[10px] font-black text-gray-300 uppercase tracking-widest hover:text-cream-accent transition">+ 新增事項</button>`;
                container.appendChild(gDiv);
                const tgEl = gDiv.querySelector(`#tg-${gIdx}`); setupAutoClear(tgEl, "分類標題");
                tgEl.onblur = () => { group.title = tgEl.innerText; saveState(); };
                group.items.forEach((_, iIdx) => {
                    const tiEl = gDiv.querySelector(`#ti-${gIdx}-${iIdx}`); setupAutoClear(tiEl, "代辦細項內容");
                    tiEl.onblur = () => { group.items[iIdx] = tiEl.innerText; saveState(); };
                });
            });
        }
        function addTodoGroup() { state.todoGroups.push({ title: "分類標題", items: ["代辦細項內容"] }); saveState(); renderTodos(); }
        function delTodoG(idx) { state.todoGroups.splice(idx,1); saveState(); renderTodos(); }
        function addTodoI(idx) { state.todoGroups[idx].items.push("代辦細項內容"); saveState(); renderTodos(); }
        function delTodoI(g, i) { state.todoGroups[g].items.splice(i,1); saveState(); renderTodos(); }

        function setField(type, val) {
            document.querySelectorAll(`.${type}-btn`).forEach(b => {
                b.classList.remove('active'); if (b.innerText === val) b.classList.add('active');
            });
            if(type === 'payer') curPayer = val; if(type === 'payment') curPayment = val; if(type === 'tax') curTax = val; if(type === 'cat') curExpCat = val;
        }

        function renderExpenses(filter = 'all') {
            const list = document.getElementById('expense-list'); list.innerHTML = "";
            const uniqueDates = [...new Set(state.expenses.map(e => e.date.slice(5)))].sort();
            renderExpDateFilter(uniqueDates, filter);
            const filtered = filter === 'all' ? state.expenses : state.expenses.filter(e => e.date.endsWith(filter));
            filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((e, idx) => {
                const globalIdx = state.expenses.findIndex(x => x.id === e.id);
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm relative transition active:scale-95";
                div.innerHTML = `<div class="flex items-center space-x-4 flex-1" onclick="editExp(${globalIdx})">
                    <div class="w-10 h-10 bg-gray-50 rounded-2xl flex items-center justify-center text-[10px] font-black text-gray-400 italic">${e.payer[0]}</div>
                    <div class="flex-1"><div class="flex items-center space-x-2"><p class="text-sm font-black italic tracking-tighter uppercase font-sans">${e.item}</p>${e.tax === '已退稅'?'<span class="bg-green-500 text-white text-[7px] px-1.5 py-0.5 rounded-full font-bold">已退</span>':''}</div>
                    <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">${e.date.slice(5)} · ${e.payer} · ${e.cat || '其他'}</p></div></div>
                    <div class="text-right shrink-0"><p class="text-sm font-black italic tracking-tighter font-mono">NT$ ${e.twd.toLocaleString()}</p><p class="text-[9px] text-gray-300 font-bold uppercase tracking-widest italic font-mono">(₩ ${e.amount.toLocaleString()})</p>
                    <button onclick="delExp(${globalIdx})" class="text-[8px] text-red-200 font-bold mt-1 uppercase">✕</button></div>`;
                list.appendChild(div);
            });
            updateSummary();
        }
        function renderExpDateFilter(dates, cur) {
            const container = document.getElementById('expense-date-filter'); container.innerHTML = `<button onclick="renderExpenses('all')" class="px-5 py-2.5 rounded-full text-[10px] font-black ${cur === 'all' ? 'bg-cream-accent text-white' : 'bg-white text-gray-400'} shadow-sm">全部</button>`;
            dates.forEach(d => { container.innerHTML += `<button onclick="renderExpenses('${d}')" class="px-5 py-2.5 rounded-full text-[10px] font-black ${cur === d ? 'bg-cream-accent text-white' : 'bg-white text-gray-400'} shadow-sm">${d}</button>`; });
        }
        function openExpenseModal() {
            document.getElementById('exp-modal-title').innerText = "新增記帳"; document.getElementById('edit-exp-id').value = "";
            document.getElementById('expense-modal').classList.remove('hidden'); document.getElementById('exp-date').valueAsDate = new Date();
            initExpBtns(); document.getElementById('exp-item').value = ""; document.getElementById('exp-amount').value = ""; calcHint();
        }
        function initExpBtns() {
            document.getElementById('payer-btns').innerHTML = payers.map(p => `<button onclick="setField('payer','${p}')" class="payer-btn seg-btn ${p===curPayer?'active':''}">${p}</button>`).join('');
            document.getElementById('cat-btns').innerHTML = expCats.map(p => `<button onclick="setField('cat','${p}')" class="cat-btn seg-btn ${p===curExpCat?'active':''}">${p}</button>`).join('');
            document.getElementById('payment-btns').innerHTML = payments.map(p => `<button onclick="setField('payment','${p}')" class="payment-btn seg-btn ${p===curPayment?'active':''}">${p}</button>`).join('');
            document.getElementById('tax-btns').innerHTML = taxes.map(p => `<button onclick="setField('tax','${p}')" class="tax-btn seg-btn ${p===curTax?'active':''}">${p}</button>`).join('');
        }
        function editExp(idx) {
            const e = state.expenses[idx]; document.getElementById('exp-modal-title').innerText = "編輯帳目";
            document.getElementById('edit-exp-id').value = e.id; document.getElementById('exp-item').value = e.item;
            document.getElementById('exp-date').value = e.date; document.getElementById('exp-amount').value = e.amount;
            document.getElementById('exp-rate').value = e.rate; setField('payer', e.payer); setField('payment', e.payment); setField('tax', e.tax); setField('cat', e.cat || "其他");
            initExpBtns(); document.getElementById('expense-modal').classList.remove('hidden'); calcHint();
        }
        function saveExpense() {
            const item = document.getElementById('exp-item').value, date = document.getElementById('exp-date').value, amount = parseFloat(document.getElementById('exp-amount').value) || 0, rate = parseFloat(document.getElementById('exp-rate').value) || 1, id = document.getElementById('edit-exp-id').value;
            if (item && amount) {
                const rec = { id: id || Date.now(), item, date, amount, rate, payer: curPayer, payment: curPayment, tax: curTax, cat: curExpCat, twd: Math.round(amount * rate) };
                if (id) { const idx = state.expenses.findIndex(x => x.id == id); state.expenses[idx] = rec; } else { state.expenses.push(rec); }
                saveState(); renderExpenses(); closeExpenseModal();
            }
        }
        function closeExpenseModal() { document.getElementById('expense-modal').classList.add('hidden'); }
        function delExp(idx) { if(confirm("確定刪除？")) { state.expenses.splice(idx,1); saveState(); renderExpenses(); } }
        function calcHint() { const a = parseFloat(document.getElementById('exp-amount').value) || 0; const r = parseFloat(document.getElementById('exp-rate').value) || 1; document.getElementById('exp-twd-hint').innerText = `台幣: NT$ ${Math.round(a * r).toLocaleString()}`; }
        function updateSummary() {
            const total = state.expenses.reduce((s, e) => s + e.twd, 0); document.getElementById('total-spent').innerText = `NT$ ${total.toLocaleString()}`;
            const left = state.budget - total; document.getElementById('budget-left').innerText = `$ ${left.toLocaleString()}`;
            document.getElementById('budget-bar').style.width = Math.min(100, (total / state.budget) * 100) + '%';
        }
        function toggleSettlement() {
            const modal = document.getElementById('settlement-modal'), content = document.getElementById('settlement-content');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden'); const total = state.expenses.reduce((s, e) => s + e.twd, 0), avg = total / payers.length, paid = {}; payers.forEach(p => paid[p] = 0);
                state.expenses.forEach(e => paid[e.payer] += e.twd); content.innerHTML = "";
                payers.forEach(p => { const diff = paid[p] - avg; content.innerHTML += `<div class="flex justify-between py-2 border-b border-gray-50"><span class="text-sm font-bold uppercase italic">${p}</span><div class="text-right font-mono"><p class="text-[10px] text-gray-400">已付: ${paid[p].toLocaleString()}</p><p class="text-xs font-black italic ${diff >= 0 ? 'text-green-500' : 'text-red-400'}">${diff >= 0 ? '+' : ''}${Math.round(diff).toLocaleString()}</p></div></div>`; });
            } else { modal.classList.add('hidden'); }
        }

        function renderInfo() {
            const container = document.getElementById('custom-info-list'); container.innerHTML = "";
            (state.customInfo || []).forEach((info, idx) => {
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 relative mb-4";
                div.innerHTML = `<button onclick="delInfo(${idx})" class="absolute top-6 right-6 text-gray-200 text-xs">✕</button>
                    <h4 contenteditable="true" id="inf-t-${idx}" class="editable font-black text-sm mb-2 italic tracking-widest uppercase underline decoration-cream-accent/20">${info.title}</h4>
                    <div contenteditable="true" id="inf-c-${idx}" class="editable text-[11px] text-gray-500 leading-relaxed font-mono">${info.content}</div>`;
                container.appendChild(div);
                const tEl = div.querySelector(`#inf-t-${idx}`); setupAutoClear(tEl, "新資訊標題");
                tEl.onblur = () => { info.title = tEl.innerText; saveState(); };
                const cEl = div.querySelector(`#inf-c-${idx}`); setupAutoClear(cEl, "資訊細節內容...");
                cEl.onblur = () => { info.content = cEl.innerText; saveState(); };
            });
        }
        function addCustomInfo() { if(!state.customInfo) state.customInfo = []; state.customInfo.push({ title: "新資訊標題", content: "資訊細節內容..." }); saveState(); renderInfo(); }
        function delInfo(idx) { state.customInfo.splice(idx,1); saveState(); renderInfo(); }

        function openM(type, loc) { if(!loc) return alert("請輸入地標名稱"); const q = encodeURIComponent(loc); window.open(type === 'google' ? `https://www.google.com/maps/search/?api=1&query=${q}` : `https://map.naver.com/v5/search/${q}`, '_blank'); }
    </script>
</body>
</html>
