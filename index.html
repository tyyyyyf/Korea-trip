<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的韓國之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-bg': '#F8F5F2',
                        'cream-card': '#FFFFFF',
                        'cream-accent': '#D9B99B',
                        'cream-primary': '#E8DCCF',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .editable:focus { outline: 2px dashed #D9B99B; background: rgba(217, 185, 155, 0.1); border-radius: 4px; padding: 0 4px; }
        .active-nav-btn { color: #D9B99B !important; }
        .day-btn.active { background-color: #D9B99B; color: white; transform: scale(1.1); }
        .timeline-line::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #E8DCCF; opacity: 0.5; }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-cream-bg">
        
        <!-- Header -->
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-cream-primary/20 flex justify-between items-end">
            <div>
                <p class="text-[10px] font-bold text-cream-accent tracking-widest uppercase mb-1">Travel Plan</p>
                <h1 id="trip-title" contenteditable="true" onblur="saveGeneralInfo()" class="editable text-2xl font-black tracking-tight">🇰🇷 韓國之旅 7/5-7/11</h1>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-400 font-bold uppercase">預算剩餘</p>
                <p id="header-budget" class="text-sm font-black italic text-cream-accent">NT$ 0</p>
            </div>
        </header>

        <!-- [頁面 1] 行程管理 (Schedule) -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <!-- 日期切換 -->
            <div id="day-selector" class="flex space-x-3 overflow-x-auto no-scrollbar mb-8 pb-2 px-1">
                <!-- 由 JS 生成 -->
            </div>

            <!-- 行程清單 -->
            <div class="relative timeline-line ml-1" id="itinerary-list">
                <!-- 由 JS 生成 -->
            </div>

            <!-- 新增行程按鈕 -->
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-cream-primary rounded-[2rem] text-cream-accent font-bold text-sm hover:bg-cream-primary/10 transition">
                <i class="fa-solid fa-plus mr-2"></i>新增此日行程
            </button>
        </section>

        <!-- [頁面 2] 待辦事項 (To-do) -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6">行前待辦</h2>
            <div id="todo-list" class="bg-white rounded-[2.5rem] p-6 shadow-sm space-y-2">
                <!-- 由 JS 生成 -->
            </div>
            <div class="mt-8 flex space-x-3">
                <input id="todo-input" type="text" placeholder="輸入新的待辦..." class="flex-1 bg-white border-none rounded-2xl px-5 py-4 text-sm shadow-sm outline-none">
                <button onclick="addTodo()" class="bg-cream-accent text-white px-6 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">新增</button>
            </div>
        </section>

        <!-- [頁面 3] 記帳 (Budget) -->
        <section id="tab-budget" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6">旅遊記帳</h2>
            
            <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-cream-primary/20 mb-8 relative">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">總預算 (點擊修改)</p>
                <h3 id="budget-amount" contenteditable="true" onblur="saveGeneralInfo()" class="editable text-4xl font-black text-cream-text italic tracking-tighter">40000</h3>
                <div class="mt-6 flex justify-between">
                    <div><p class="text-[10px] text-gray-400 uppercase font-bold">總支出</p><p id="total-spent" class="font-black text-red-400 font-mono"></p></div>
                    <div class="text-right"><p class="text-[10px] text-gray-400 uppercase font-bold">每人應付</p><p id="per-person" class="font-black text-gray-800 font-mono"></p></div>
                </div>
            </div>

            <!-- 分帳建議 -->
            <div class="bg-cream-primary/20 p-6 rounded-[2rem] mb-8">
                <p class="text-xs font-black mb-3 italic text-cream-accent">誰該給誰錢 (Settlement)</p>
                <div id="settlement-results" class="space-y-2 text-[11px] font-bold"></div>
            </div>

            <div id="expense-list" class="space-y-3">
                <!-- 由 JS 生成 -->
            </div>
        </section>

        <!-- 底部導覽 -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-[360px] bg-white/80 backdrop-blur-2xl border border-white/50 h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-6 z-[100]">
            <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-btn flex flex-col items-center space-y-1 active-nav-btn">
                <i class="fa-solid fa-compass text-xl"></i><span class="text-[10px] font-black uppercase">行程</span>
            </button>
            <button onclick="switchTab('todo')" id="nav-todo" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-list-ul text-xl"></i><span class="text-[10px] font-black uppercase">待辦</span>
            </button>
            <button onclick="switchTab('budget')" id="nav-budget" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-wallet text-xl"></i><span class="text-[10px] font-black uppercase">記帳</span>
            </button>
        </nav>

        <!-- 記帳新增按鈕 (僅在記帳頁顯示) -->
        <button id="fab-budget" onclick="openExpenseModal()" class="hidden fixed bottom-32 right-8 w-14 h-14 bg-cream-accent text-white rounded-full shadow-2xl items-center justify-center text-xl z-[90]">
            <i class="fa-solid fa-plus"></i>
        </button>

    </div>

    <!-- 記帳 Modal -->
    <div id="expense-modal" class="fixed inset-0 z-[200] hidden bg-black/40 backdrop-blur-sm flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] p-8 animate-[slideUp_0.3s_ease-out]">
            <h3 class="text-xl font-black mb-6 italic">新增支出</h3>
            <div class="space-y-4">
                <input id="exp-item" type="text" placeholder="項目 (如：炸雞)" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm">
                <div class="flex space-x-2">
                    <input id="exp-amount" type="number" placeholder="金額" class="w-1/2 bg-gray-50 p-4 rounded-2xl outline-none text-sm">
                    <select id="exp-payer" class="w-1/2 bg-gray-50 p-4 rounded-2xl outline-none text-sm">
                        <option value="小慌">小慌</option><option value="昱凱">昱凱</option><option value="小安">小安</option><option value="文哥">文哥</option>
                    </select>
                </div>
                <button onclick="saveExpense()" class="w-full bg-cream-accent text-white py-4 rounded-2xl font-bold">儲存</button>
                <button onclick="closeExpenseModal()" class="w-full text-gray-400 py-2 text-xs">取消</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心資料結構 ---
        let state = JSON.parse(localStorage.getItem('korea_trip_state')) || {
            title: "🇰🇷 韓國之旅 7/5-7/11",
            budget: 40000,
            currentDay: 1,
            todos: [
                { id: 1, text: "護照與簽證", done: false },
                { id: 2, text: "eSIM 網卡確認", done: false }
            ],
            schedule: {
                1: [{ time: "16:30", title: "飯店 Check-in", loc: "Seoul Jung-gu Sogong-ro 6na-gil 11", note: "Naver Map 直接導航", type: "住宿" }],
                2: [], 3: [], 4: [], 5: [], 6: [], 7: []
            },
            expenses: []
        };

        const members = ["小慌", "昱凱", "小安", "文哥"];

        // --- 初始化 ---
        window.onload = () => {
            renderAll();
        };

        function renderAll() {
            document.getElementById('trip-title').innerText = state.title;
            document.getElementById('budget-amount').innerText = state.budget;
            renderDaySelector();
            renderItinerary();
            renderTodos();
            renderExpenses();
            localStorage.setItem('korea_trip_state', JSON.stringify(state));
        }

        // --- 1. 行程功能 ---
        function renderDaySelector() {
            const container = document.getElementById('day-selector');
            container.innerHTML = "";
            const days = ["FRI", "SAT", "SUN", "MON", "TUE", "WED", "THU"];
            const dates = ["7/5", "7/6", "7/7", "7/8", "7/9", "7/10", "7/11"];
            
            for (let i = 1; i <= 7; i++) {
                const btn = document.createElement('button');
                btn.className = `day-btn flex-none w-16 h-20 bg-white rounded-3xl flex flex-col items-center justify-center shadow-sm transition-all ${state.currentDay == i ? 'active' : 'text-cream-sub'}`;
                btn.onclick = () => { state.currentDay = i; renderAll(); };
                btn.innerHTML = `<span class="text-[10px] mb-1">${days[i-1]}</span><span class="text-lg font-bold">${dates[i-1]}</span>`;
                container.appendChild(btn);
            }
        }

        function renderItinerary() {
            const list = document.getElementById('itinerary-list');
            list.innerHTML = "";
            const dayItems = state.schedule[state.currentDay] || [];

            dayItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "relative pl-10 mb-8 animate-[fadeIn_0.3s]";
                card.innerHTML = `
                    <div class="absolute left-[13px] top-1 w-4 h-4 rounded-full bg-cream-accent border-4 border-white shadow z-10"></div>
                    <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-cream-primary/10 relative">
                        <button onclick="deleteItinerary(${index})" class="absolute top-4 right-4 text-gray-300 hover:text-red-400 text-xs"><i class="fa-solid fa-trash"></i></button>
                        <div class="flex justify-between mb-2 pr-6">
                            <span contenteditable="true" onblur="editItinerary(${index}, 'time', this.innerText)" class="editable text-xs font-black text-cream-accent">${item.time}</span>
                            <span contenteditable="true" onblur="editItinerary(${index}, 'type', this.innerText)" class="editable text-[10px] bg-cream-bg px-2 py-1 rounded-lg text-cream-sub">${item.type}</span>
                        </div>
                        <h3 contenteditable="true" onblur="editItinerary(${index}, 'title', this.innerText)" class="editable font-bold text-lg mb-1">${item.title}</h3>
                        <p contenteditable="true" onblur="editItinerary(${index}, 'loc', this.innerText)" class="editable text-xs text-cream-sub mb-3">📍 ${item.loc}</p>
                        <div contenteditable="true" onblur="editItinerary(${index}, 'note', this.innerText)" class="editable bg-cream-bg/50 p-3 rounded-2xl mb-4 text-[11px] text-cream-text leading-relaxed italic">${item.note}</div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="openMap('google', '${item.loc}')" class="py-3 bg-gray-50 rounded-2xl text-[10px] font-bold">Google</button>
                            <button onclick="openMap('naver', '${item.loc}')" class="py-3 bg-green-50 rounded-2xl text-[10px] font-bold text-green-700">Naver</button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function addNewItinerary() {
            state.schedule[state.currentDay].push({ time: "00:00", title: "新行程", loc: "目的地地址", note: "備註內容", type: "分類" });
            renderAll();
        }

        function editItinerary(index, field, value) {
            state.schedule[state.currentDay][index][field] = value;
            localStorage.setItem('korea_trip_state', JSON.stringify(state));
        }

        function deleteItinerary(index) {
            if(confirm("確定刪除此行程？")) {
                state.schedule[state.currentDay].splice(index, 1);
                renderAll();
            }
        }

        // --- 2. 待辦事項功能 ---
        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = "";
            state.todos.forEach(todo => {
                const item = document.createElement('div');
                item.className = "flex items-center justify-between group p-1";
                item.innerHTML = `
                    <div class="flex items-center space-x-4 flex-1">
                        <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggleTodo(${todo.id})" class="w-6 h-6 accent-cream-accent border-gray-200 rounded-lg">
                        <span contenteditable="true" onblur="editTodo(${todo.id}, this.innerText)" class="editable text-sm font-medium ${todo.done ? 'line-through text-gray-300' : ''}">${todo.text}</span>
                    </div>
                    <button onclick="deleteTodo(${todo.id})" class="text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity p-2 hover:text-red-400"><i class="fa-solid fa-xmark"></i></button>
                `;
                list.appendChild(item);
            });
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            if (input.value.trim()) {
                state.todos.push({ id: Date.now(), text: input.value, done: false });
                input.value = "";
                renderAll();
            }
        }

        function toggleTodo(id) {
            const todo = state.todos.find(t => t.id === id);
            todo.done = !todo.done;
            renderAll();
        }

        function editTodo(id, newText) {
            const todo = state.todos.find(t => t.id === id);
            todo.text = newText;
            localStorage.setItem('korea_trip_state', JSON.stringify(state));
        }

        function deleteTodo(id) {
            state.todos = state.todos.filter(t => t.id !== id);
            renderAll();
        }

        // --- 3. 記帳功能 ---
        function renderExpenses() {
            const list = document.getElementById('expense-list');
            const totalSpentEl = document.getElementById('total-spent');
            const perPersonEl = document.getElementById('per-person');
            const headerBudgetEl = document.getElementById('header-budget');
            
            list.innerHTML = "";
            let total = 0;
            const paidBy = {};
            members.forEach(m => paidBy[m] = 0);

            state.expenses.forEach((exp, idx) => {
                total += exp.amount;
                paidBy[exp.payer] += exp.amount;
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-[2rem] flex justify-between items-center shadow-sm relative group";
                div.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-cream-primary/20 rounded-xl flex items-center justify-center text-cream-accent text-xs font-bold">${exp.payer[0]}</div>
                        <div><p class="text-sm font-bold">${exp.item}</p><p class="text-[10px] text-gray-400">${exp.payer} 付款</p></div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm text-red-400">- ${exp.amount.toLocaleString()}</p>
                        <button onclick="deleteExpense(${idx})" class="text-[10px] text-gray-300 hover:text-red-400">刪除</button>
                    </div>
                `;
                list.appendChild(div);
            });

            totalSpentEl.innerText = `NT$ ${total.toLocaleString()}`;
            perPersonEl.innerText = `NT$ ${Math.round(total / members.length).toLocaleString()}`;
            headerBudgetEl.innerText = `NT$ ${(state.budget - total).toLocaleString()}`;
            
            renderSettlement(total, paidBy);
        }

        function renderSettlement(total, paidBy) {
            const avg = total / members.length;
            const diffs = members.map(m => ({ name: m, diff: paidBy[m] - avg }));
            const settlement = document.getElementById('settlement-results');
            settlement.innerHTML = "";

            let debtors = diffs.filter(x => x.diff < 0).sort((a,b) => a.diff - b.diff);
            let creditors = diffs.filter(x => x.diff > 0).sort((a,b) => b.diff - a.diff);

            debtors.forEach(d => {
                let dAmt = Math.abs(d.diff);
                creditors.forEach(c => {
                    if (dAmt <= 0) return;
                    let cAmt = c.diff;
                    if (cAmt <= 0) return;
                    let move = Math.min(dAmt, cAmt);
                    settlement.innerHTML += `<div class='flex justify-between border-b border-cream-primary/10 pb-1'><span>${d.name} → ${c.name}</span><span class='text-cream-accent'>NT$ ${Math.round(move).toLocaleString()}</span></div>`;
                    dAmt -= move; c.diff -= move;
                });
            });
        }

        function openExpenseModal() { document.getElementById('expense-modal').classList.remove('hidden'); }
        function closeExpenseModal() { document.getElementById('expense-modal').classList.add('hidden'); }
        
        function saveExpense() {
            const item = document.getElementById('exp-item').value;
            const amount = parseFloat(document.getElementById('exp-amount').value);
            const payer = document.getElementById('exp-payer').value;
            if(item && amount) {
                state.expenses.push({ item, amount, payer });
                document.getElementById('exp-item').value = "";
                document.getElementById('exp-amount').value = "";
                renderAll();
                closeExpenseModal();
            }
        }

        function deleteExpense(idx) {
            state.expenses.splice(idx, 1);
            renderAll();
        }

        // --- 通用功能 ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-300'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav-btn'));
            
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav-btn');
            document.getElementById('nav-' + tab).classList.remove('text-gray-300');
            
            document.getElementById('fab-budget').style.display = (tab === 'budget') ? 'flex' : 'none';
        }

        function saveGeneralInfo() {
            state.title = document.getElementById('trip-title').innerText;
            state.budget = parseFloat(document.getElementById('budget-amount').innerText) || 0;
            renderAll();
        }

        function openMap(type, loc) {
            const q = encodeURIComponent(loc);
            window.open(type === 'google' ? `https://www.google.com/maps/search/?api=1&query=${q}` : `https://map.naver.com/v5/search/${q}`, '_blank');
        }
    </script>
</body>
</html>
