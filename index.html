    <script>
        // --- 初始化狀態 ---
        let state = JSON.parse(localStorage.getItem('korea_final_vMax')) || {
            title: "🇰🇷 韓國之旅 2026", budget: 50000, currentDay: 1,
            itin: { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] },
            todoGroups: [], expenses: [], customInfo: [], wishGroups: []
        };

        let isOwner = false;
        const dayList = [{d:"7/5",w:"SUN"},{d:"7/6",w:"MON"},{d:"7/7",w:"TUE"},{d:"7/8",w:"WED"},{d:"7/9",w:"THU"},{d:"7/10",w:"FRI"},{d:"7/11",w:"SAT"}];
        
        // 擴充：付款人、方式、分類
        const payers = ["小慌", "昱凱", "小安", "文哥", "共同費用"];
        const payMethods = ["Wowpass", "Line Pay", "現金", "信用卡"];
        const expCats = ["吃飯", "購物", "景點", "交通"];
        
        let curPayer="文哥", curExpCat="吃飯", curMethod="Wowpass";

        // --- 核心系統 ---
        function unlockSystem() {
            if (!isOwner) {
                const pass = prompt("請輸入密碼：");
                if (pass === "2002") {
                    isOwner = true;
                    document.body.classList.add('is-owner');
                    document.getElementById('lock-icon').className = "fa-solid fa-lock-open text-xs";
                    alert("私人模式已開啟，私人採購清單已解鎖。");
                } else { alert("密碼錯誤！"); }
            } else {
                isOwner = false;
                document.body.classList.remove('is-owner');
                document.getElementById('lock-icon').className = "fa-solid fa-lock text-xs";
                if(document.querySelector('.tab-content.active').id === 'tab-wishlist') switchTab('schedule');
                alert("已切換回訪客模式。");
            }
        }

        function saveState() {
            state.title = document.getElementById('trip-title').innerText;
            state.budget = parseFloat(document.getElementById('budget-val').innerText) || 0;
            localStorage.setItem('korea_final_vMax', JSON.stringify(state));
            updateSummary();
        }

        window.onload = () => {
            renderAll();
            setupAutoClear(document.getElementById('trip-title'), "🇰🇷 韓國之旅 2026");
            setupAutoClear(document.getElementById('budget-val'), "50000");
            document.getElementById('exp-amount').oninput = calcHint;
        };

        function renderAll() {
            renderDayNav(); renderItin(); renderTodos(); renderWishlist(); renderExpenses('all'); renderInfo(); updateSummary();
        }

        function switchTab(tab) {
            if(tab === 'wishlist' && !isOwner) { alert("此分頁僅限小慌查看！"); return; }
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('active-nav-btn', 'text-gray-300'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.replace('text-gray-300', 'active-nav-btn');
            document.getElementById('fab-budget').style.display = (tab === 'budget') ? 'flex' : 'none';
        }

        // --- 行程功能 ---
        function renderItin() {
            const list = document.getElementById('itinerary-list'); list.innerHTML = "";
            const currentItems = state.itin[state.currentDay] || [];
            currentItems.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "relative pl-10 mb-8 itin-item";
                const isFirst = idx === 0, isLast = idx === currentItems.length - 1;
                div.innerHTML = `
                    <div class="absolute left-[13px] top-1 w-4 h-4 rounded-full bg-cream-accent border-4 border-white shadow z-10"></div>
                    <div onclick="openDetailModal(${idx})" class="bg-white p-5 rounded-[2rem] shadow-sm border border-cream-primary/10 relative transition active:scale-95">
                        <div class="absolute top-4 right-4 flex items-center space-x-2 text-gray-300">
                            ${!isFirst ? `<button onclick="event.stopPropagation(); moveItin(${idx},-1)" class="w-6 h-6 hover:text-cream-accent"><i class="fa-solid fa-arrow-up text-[10px]"></i></button>`:''}
                            ${!isLast ? `<button onclick="event.stopPropagation(); moveItin(${idx},1)" class="w-6 h-6 hover:text-cream-accent"><i class="fa-solid fa-arrow-down text-[10px]"></i></button>`:''}
                            <button onclick="event.stopPropagation(); delItin(${idx})" class="w-6 h-6 hover:text-red-400 ml-1"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="flex justify-between mb-2 pr-20">
                            <span class="text-xs font-black text-cream-accent italic font-mono">${item.time || '12:00'}</span>
                            <span class="text-[8px] px-2 py-1 rounded-lg font-bold uppercase ${getCatColor(item.type)}">${item.type}</span>
                        </div>
                        <h3 class="font-black text-base italic uppercase">${item.title || '點擊編輯'}</h3>
                        ${item.loc ? `<p class="text-[9px] text-gray-400 italic mt-1">📍 ${item.loc}</p>` : ''}
                    </div>`;
                list.appendChild(div);
            });
        }

        function moveItin(idx, dir) {
            const arr = state.itin[state.currentDay];
            [arr[idx], arr[idx + dir]] = [arr[idx + dir], arr[idx]];
            saveState(); renderItin();
        }

        function addNewItinerary() { 
            state.itin[state.currentDay].push({ time:"12:00", title:"新行程", type:"景點", shops:[] }); 
            saveState(); renderItin(); 
        }
        function delItin(idx) { if(confirm("刪除行程？")) { state.itin[state.currentDay].splice(idx,1); saveState(); renderItin(); } }

        function openDetailModal(idx) {
            const item = state.itin[state.currentDay][idx];
            document.getElementById('detail-idx').value = idx;
            document.getElementById('detail-title').value = item.title || "";
            document.getElementById('detail-time').value = item.time || "12:00";
            document.getElementById('detail-type').value = item.type || "景點";
            document.getElementById('detail-loc').value = item.loc || "";
            document.getElementById('detail-desc').value = item.desc || "";
            document.getElementById('detail-notes').value = item.notes || "";
            if(isOwner) renderShopping(item.shops || []);
            document.getElementById('detail-modal').classList.add('active');
        }
        function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }
        function saveCurrentDetail() {
            const idx = document.getElementById('detail-idx').value;
            const item = state.itin[state.currentDay][idx];
            item.title = document.getElementById('detail-title').value;
            item.time = document.getElementById('detail-time').value;
            item.type = document.getElementById('detail-type').value;
            item.loc = document.getElementById('detail-loc').value;
            item.desc = document.getElementById('detail-desc').value;
            item.notes = document.getElementById('detail-notes').value;
            saveState(); renderItin(); closeDetailModal();
        }

        // --- 記帳功能 ---
        function renderExpenses(filter = 'all') {
            const list = document.getElementById('expense-list'); list.innerHTML = "";
            const uniqueDates = [...new Set(state.expenses.map(e => e.date.slice(5)))].sort();
            renderExpDateFilter(uniqueDates, filter);
            const filtered = filter === 'all' ? state.expenses : state.expenses.filter(e => e.date.endsWith(filter));
            
            filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((e, idx) => {
                const globalIdx = state.expenses.findIndex(x => x.id === e.id);
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl shadow-sm relative";
                
                // 顯示標籤邏輯
                const methodTag = e.method ? `<span class="bg-gray-100 text-gray-500 text-[8px] px-2 py-0.5 rounded-md font-black mr-1">${e.method}</span>` : '';
                const payerInitial = e.payer === "共同費用" ? "公" : e.payer[0];
                const noteContent = e.note ? `<p class="mt-2 text-[10px] text-gray-400 bg-gray-50 p-2 rounded-xl italic leading-tight">💬 ${e.note}</p>` : '';

                div.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex items-center space-x-4 flex-1" onclick="editExp(${globalIdx})">
                        <div class="w-10 h-10 ${e.payer === '共同費用' ? 'bg-orange-100 text-orange-600' : 'bg-gray-50 text-gray-400'} rounded-2xl flex items-center justify-center text-[10px] font-black italic shrink-0">${payerInitial}</div>
                        <div class="flex-1">
                            <div class="flex items-center">
                                ${methodTag}
                                <p class="text-sm font-black italic uppercase font-sans line-clamp-1">${e.item}</p>
                            </div>
                            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">${e.date.slice(5)} · ${e.payer} · ${e.cat}</p>
                        </div>
                    </div>
                    <div class="text-right shrink-0">
                        <p class="text-sm font-black italic font-mono text-cream-accent">NT$ ${e.twd.toLocaleString()}</p>
                        <button onclick="delExp(${globalIdx})" class="text-[8px] text-red-200 font-bold uppercase">✕</button>
                    </div>
                </div>
                ${noteContent}
                `;
                list.appendChild(div);
            });
            updateSummary();
        }

        function saveExpense() {
            const item = document.getElementById('exp-item').value, 
                  date = document.getElementById('exp-date').value, 
                  amount = parseFloat(document.getElementById('exp-amount').value) || 0, 
                  rate = parseFloat(document.getElementById('exp-rate').value) || 0.024, 
                  id = document.getElementById('edit-exp-id').value,
                  note = document.getElementById('exp-note').value;

            if (item && amount) {
                const rec = { 
                    id: id || Date.now(), 
                    item, date, amount, rate, 
                    payer: curPayer, 
                    method: curMethod,
                    cat: curExpCat, 
                    note: note,
                    twd: Math.round(amount * rate) 
                };
                if (id) { 
                    const idx = state.expenses.findIndex(x => x.id == id); 
                    state.expenses[idx] = rec; 
                } else { 
                    state.expenses.push(rec); 
                }
                saveState(); renderExpenses(); closeExpenseModal();
            }
        }

        // --- 輔助功能 ---
        function renderDayNav() {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            dayList.forEach((d, i) => {
                const num = i + 1;
                const btn = document.createElement('button');
                btn.className = `day-btn flex flex-col items-center justify-center rounded-2xl shadow-sm ${state.currentDay == num ? 'active' : 'bg-white'}`;
                btn.onclick = () => { state.currentDay = num; renderAll(); };
                btn.innerHTML = `<span class="text-[9px] font-black opacity-40">Day ${num}</span><span class="text-[10px] font-bold">${d.w}</span><span class="text-sm font-black italic">${d.d}</span>`;
                container.appendChild(btn);
            });
        }

        function updateSummary() {
            const total = state.expenses.reduce((s, e) => s + e.twd, 0); 
            document.getElementById('total-spent').innerText = `NT$ ${total.toLocaleString()}`;
            const left = state.budget - total; 
            document.getElementById('budget-left').innerText = `$ ${left.toLocaleString()}`;
            document.getElementById('budget-bar').style.width = Math.min(100, (total / state.budget) * 100) + '%';
        }

        function setupAutoClear(el, placeholder) {
            if (!el.innerText.trim() || el.innerText.trim() === placeholder) { el.innerText = placeholder; el.classList.add('placeholder-hint'); }
            el.onfocus = () => { if (el.innerText.trim() === placeholder) { el.innerText = ""; el.classList.remove('placeholder-hint'); } };
            el.onblur = () => { if (!el.innerText.trim()) { el.innerText = placeholder; el.classList.add('placeholder-hint'); } saveState(); };
        }

        function getCatColor(type) {
            const map = {'景點':'bg-cat-att text-white','購物':'bg-cat-shp text-[#8B735B]','餐廳':'bg-cat-res text-cream-accent','住宿':'bg-cat-bis text-white','交通':'bg-cat-mon text-white','宵夜':'bg-purple-200 text-purple-700','其他':'bg-cat-oth text-gray-500'};
            return map[type] || 'bg-white text-gray-400';
        }

        function renderExpDateFilter(dates, cur) {
            const container = document.getElementById('expense-date-filter');
            container.innerHTML = `<button onclick="renderExpenses('all')" class="px-5 py-2.5 rounded-full text-[10px] font-black ${cur === 'all' ? 'bg-cream-accent text-white' : 'bg-white text-gray-400'} shadow-sm">全部</button>`;
            dates.forEach(d => { container.innerHTML += `<button onclick="renderExpenses('${d}')" class="px-5 py-2.5 rounded-full text-[10px] font-black ${cur === d ? 'bg-cream-accent text-white' : 'bg-white text-gray-400'} shadow-sm">${d}</button>`; });
        }

        function openExpenseModal() { 
            document.getElementById('expense-modal').classList.remove('hidden'); 
            document.getElementById('exp-date').valueAsDate = new Date(); 
            document.getElementById('edit-exp-id').value = "";
            document.getElementById('exp-item').value = "";
            document.getElementById('exp-amount').value = "";
            document.getElementById('exp-note').value = "";
            initExpBtns(); 
            calcHint(); 
        }

        function closeExpenseModal() { document.getElementById('expense-modal').classList.add('hidden'); }
        
        function initExpBtns() {
            document.getElementById('payer-btns').innerHTML = payers.map(p => `<button onclick="setField('payer','${p}')" class="payer-btn seg-btn ${p===curPayer?'active':''}">${p}</button>`).join('');
            document.getElementById('method-btns').innerHTML = payMethods.map(p => `<button onclick="setField('method','${p}')" class="method-btn seg-btn ${p===curMethod?'active':''}">${p}</button>`).join('');
            document.getElementById('cat-btns').innerHTML = expCats.map(p => `<button onclick="setField('cat','${p}')" class="cat-btn seg-btn ${p===curExpCat?'active':''}">${p}</button>`).join('');
        }

        function setField(type, val) { 
            if(type==='payer') curPayer=val; 
            else if(type==='method') curMethod=val;
            else curExpCat=val; 
            initExpBtns(); 
        }

        function calcHint() { 
            const a = parseFloat(document.getElementById('exp-amount').value) || 0; 
            const r = parseFloat(document.getElementById('exp-rate').value) || 1; 
            document.getElementById('exp-twd-hint').innerText = `台幣折合: NT$ ${Math.round(a * r).toLocaleString()}`; 
        }

        function editExp(idx) { 
            const e = state.expenses[idx]; 
            document.getElementById('edit-exp-id').value = e.id; 
            document.getElementById('exp-item').value = e.item; 
            document.getElementById('exp-date').value = e.date; 
            document.getElementById('exp-amount').value = e.amount; 
            document.getElementById('exp-note').value = e.note || "";
            curPayer = e.payer || "文哥"; 
            curMethod = e.method || "Wowpass";
            curExpCat = e.cat || "吃飯"; 
            document.getElementById('expense-modal').classList.remove('hidden');
            initExpBtns();
            calcHint();
        }

        function delExp(idx) { if(confirm("刪除？")) { state.expenses.splice(idx,1); saveState(); renderExpenses(); } }
        
        function toggleSettlement() {
            const modal = document.getElementById('settlement-modal'), content = document.getElementById('settlement-content');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                
                // 排除共同費用後的個人代墊計算
                const personalPayers = payers.filter(p => p !== "共同費用");
                const personalExpenses = state.expenses.filter(e => personalPayers.includes(e.payer));
                const total = personalExpenses.reduce((s, e) => s + e.twd, 0);
                const avg = total / personalPayers.length;
                const paid = {}; 
                personalPayers.forEach(p => paid[p] = 0);
                personalExpenses.forEach(e => paid[e.payer] += e.twd);
                
                content.innerHTML = "";
                personalPayers.forEach(p => { 
                    const diff = paid[p] - avg; 
                    content.innerHTML += `
                    <div class="flex justify-between py-2 border-b border-gray-50">
                        <span class="text-sm font-bold uppercase italic">${p}</span>
                        <div class="text-right font-mono">
                            <p class="text-[10px] text-gray-400">已代墊: ${paid[p].toLocaleString()}</p>
                            <p class="text-xs font-black italic ${diff >= 0 ? 'text-green-500' : 'text-red-400'}">${diff >= 0 ? '+' : ''}${Math.round(diff).toLocaleString()}</p>
                        </div>
                    </div>`; 
                });
            } else { modal.classList.add('hidden'); }
        }

        function openM(type, loc) { if(!loc) return alert("請輸入地標"); const q = encodeURIComponent(loc); window.open(type === 'google' ? `https://www.google.com/maps/search/?api=1&query=${q}` : `https://map.naver.com/v5/search/${q}`, '_blank'); }

        // 其他基礎渲染（Todo, Wishlist, Shopping, Info... 如舊）
        function renderTodos() {
            const container = document.getElementById('todo-groups'); container.innerHTML = "";
            state.todoGroups.forEach((group, gIdx) => {
                const gDiv = document.createElement('div'); gDiv.className = "bg-white p-6 rounded-[2.5rem] shadow-sm relative mb-4";
                gDiv.innerHTML = `<button onclick="delTodoG(${gIdx})" class="absolute top-6 right-6 text-gray-200 text-xs">✕</button><h3 id="tg-${gIdx}" contenteditable="true" class="editable text-base font-black mb-4 italic uppercase underline decoration-cream-primary/40">${group.title}</h3><div class="space-y-3">${group.items.map((item, iIdx) => `<div class="flex items-center justify-between group"><div class="flex items-center space-x-3"><div class="w-4 h-4 rounded border border-gray-200"></div><span id="ti-${gIdx}-${iIdx}" contenteditable="true" class="editable text-sm font-bold text-gray-500">${item}</span></div><button onclick="delTodoI(${gIdx},${iIdx})" class="text-gray-200 text-xs opacity-0 group-hover:opacity-100">✕</button></div>`).join('')}</div><button onclick="addTodoI(${gIdx})" class="mt-4 text-[10px] font-black text-gray-300 uppercase">+ 新增事項</button>`;
                container.appendChild(gDiv);
                const tgEl = gDiv.querySelector(`#tg-${gIdx}`); setupAutoClear(tgEl, "標題");
                group.items.forEach((_, iIdx) => { const tiEl = gDiv.querySelector(`#ti-${gIdx}-${iIdx}`); setupAutoClear(tiEl, "內容"); tiEl.onblur = () => { group.items[iIdx] = tiEl.innerText; saveState(); }; });
                tgEl.onblur = () => { group.title = tgEl.innerText; saveState(); };
            });
        }
        function addTodoGroup() { state.todoGroups.push({ title: "新分類", items: ["代辦事項"] }); saveState(); renderTodos(); }
        function delTodoG(idx) { state.todoGroups.splice(idx,1); saveState(); renderTodos(); }
        function addTodoI(idx) { state.todoGroups[idx].items.push("代辦事項"); saveState(); renderTodos(); }
        function delTodoI(g, i) { state.todoGroups[g].items.splice(i,1); saveState(); renderTodos(); }

        function renderWishlist() {
            const container = document.getElementById('wishlist-groups'); container.innerHTML = "";
            state.wishGroups.forEach((group, gIdx) => {
                const bCount = (group.done || []).filter(d => d).length, tCount = group.items.length, pct = tCount > 0 ? (bCount/tCount)*100 : 0;
                const gDiv = document.createElement('div'); gDiv.className = "bg-white p-6 rounded-[2.5rem] shadow-sm relative mb-4";
                gDiv.innerHTML = `<button onclick="delWishG(${gIdx})" class="absolute top-6 right-6 text-gray-200 text-xs">✕</button><h3 id="wg-${gIdx}" contenteditable="true" class="editable text-base font-black mb-1 italic uppercase underline decoration-cream-primary/60">${group.title}</h3><div class="flex items-center space-x-2 mb-4"><div class="flex-1 h-1 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-cream-accent transition-all" style="width: ${pct}%"></div></div><span class="text-[9px] font-black text-cream-accent font-mono">${bCount}/${tCount}</span></div><div class="space-y-3">${group.items.map((item, iIdx) => `<div class="flex items-center justify-between group bg-gray-50/50 p-3 rounded-2xl"><div class="flex items-center space-x-3"><input type="checkbox" ${group.done[iIdx]?'checked':''} onchange="toggleWishItem(${gIdx},${iIdx})" class="w-4 h-4 accent-cream-accent"><span id="wi-${gIdx}-${iIdx}" contenteditable="true" class="editable text-xs font-bold ${group.done[iIdx]?'line-through opacity-30':''}">${item}</span></div><button onclick="delWishI(${gIdx},${iIdx})" class="text-gray-200 text-xs">✕</button></div>`).join('')}</div><button onclick="addWishI(${gIdx})" class="mt-4 text-[10px] font-black text-gray-300 uppercase">+ 新增事項</button>`;
                container.appendChild(gDiv);
                const wgEl = gDiv.querySelector(`#wg-${gIdx}`); wgEl.onblur = () => { group.title = wgEl.innerText; saveState(); };
                group.items.forEach((_, iIdx) => { const wiEl = gDiv.querySelector(`#wi-${gIdx}-${iIdx}`); wiEl.onblur = () => { group.items[iIdx] = wiEl.innerText; saveState(); }; });
            });
        }
        function addWishGroup() { state.wishGroups.push({ title: "新分類", items: ["商品名稱"], done: [false] }); saveState(); renderWishlist(); }
        function delWishG(idx) { state.wishGroups.splice(idx,1); saveState(); renderWishlist(); }
        function addWishI(idx) { state.wishGroups[idx].items.push("商品名稱"); state.wishGroups[idx].done.push(false); saveState(); renderWishlist(); }
        function delWishI(g, i) { state.wishGroups[g].items.splice(i,1); state.wishGroups[g].done.splice(i,1); saveState(); renderWishlist(); }
        function toggleWishItem(g, i) { state.wishGroups[g].done[i] = !state.wishGroups[g].done[i]; saveState(); renderWishlist(); }

        function renderShopping(shops) {
            const area = document.getElementById('shopping-list-area'); area.innerHTML = "";
            let b=0, t=0;
            shops.forEach((shop, sIdx) => {
                const bC = shop.items.filter(i => i.done).length, tC = shop.items.length;
                b+=bC; t+=tC;
                const div = document.createElement('div'); div.className = "bg-white border border-gray-100 rounded-[2rem] p-5 shadow-sm space-y-4";
                div.innerHTML = `<div class="flex justify-between items-center"><div class="flex-1"><h5 contenteditable="true" id="sh-n-${sIdx}" class="font-black text-sm italic uppercase">${shop.name}</h5><div class="mt-2 flex items-center space-x-2"><div class="flex-1 h-1 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-cream-accent" style="width: ${tC>0?(bC/tC)*100:0}%"></div></div><span class="text-[9px] font-mono">${bC}/${tC}</span></div></div><button onclick="delShop(${sIdx})" class="text-gray-200 ml-4">✕</button></div><div class="space-y-3">${shop.items.map((i, iIdx) => `<div class="flex items-center space-x-3 bg-gray-50/50 p-3 rounded-2xl"><input type="checkbox" ${i.done?'checked':''} onchange="toggleShopItem(${sIdx},${iIdx})" class="w-4 h-4 accent-cream-accent"><div class="flex-1"><div contenteditable="true" id="sh-i-${sIdx}-${iIdx}" class="text-[11px] font-black ${i.done?'line-through opacity-30':''}">${i.name}</div><div class="text-[8px] font-mono text-gray-400">₩ <span contenteditable="true" id="sh-p-${sIdx}-${iIdx}">${i.price||0}</span></div></div><button onclick="delShopItem(${sIdx},${iIdx})" class="text-gray-200">✕</button></div>`).join('')}<button onclick="addShopItem(${sIdx})" class="text-[9px] font-black text-cream-accent uppercase">+ Add Item</button></div>`;
                area.appendChild(div);
                div.querySelector(`#sh-n-${sIdx}`).onblur = (e) => { shop.name = e.target.innerText; saveState(); };
                shop.items.forEach((_, iIdx) => { 
                    div.querySelector(`#sh-i-${sIdx}-${iIdx}`).onblur = (e) => { shop.items[iIdx].name = e.target.innerText; saveState(); };
                    div.querySelector(`#sh-p-${sIdx}-${iIdx}`).onblur = (e) => { shop.items[iIdx].price = e.target.innerText; saveState(); };
                });
            });
            document.getElementById('shop-progress-text').innerText = `${b} / ${t} Items Bought`;
        }
        function addShopGroup() { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops.push({ name: "商店", items: [] }); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function delShop(s) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops.splice(s,1); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function addShopItem(s) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items.push({ name: "商品", price: 0, done: false }); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function toggleShopItem(s, i) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items[i].done = !state.itin[state.currentDay][idx].shops[s].items[i].done; saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function delShopItem(s, i) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items.splice(i,1); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }

        function renderInfo() {
            const container = document.getElementById('custom-info-list'); container.innerHTML = "";
            state.customInfo.forEach((info, idx) => {
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 relative mb-4";
                div.innerHTML = `<button onclick="delInfo(${idx})" class="absolute top-6 right-6 text-gray-200 text-xs">✕</button><h4 contenteditable="true" id="inf-t-${idx}" class="editable font-black text-sm mb-2 italic uppercase underline decoration-cream-accent/20">${info.title}</h4><div contenteditable="true" id="inf-c-${idx}" class="editable text-[11px] text-gray-500 leading-relaxed font-mono">${info.content}</div>`;
                container.appendChild(div);
                div.querySelector(`#inf-t-${idx}`).onblur = (e) => { info.title = e.target.innerText; saveState(); };
                div.querySelector(`#inf-c-${idx}`).onblur = (e) => { info.content = e.target.innerText; saveState(); };
            });
        }
        function addCustomInfo() { state.customInfo.push({ title: "標題", content: "內容" }); saveState(); renderInfo(); }
        function delInfo(idx) { state.customInfo.splice(idx,1); saveState(); renderInfo(); }
    </script>
</body>
</html>
