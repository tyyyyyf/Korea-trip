<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 Pro Max+ V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-bg': '#F8F5F2',
                        'cream-accent': '#4A342E',
                        'cream-primary': '#E8DCCF',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .editable:focus { outline: 2px dashed #4A342E; background: rgba(74, 52, 46, 0.05); border-radius: 4px; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); }
        #detail-modal { position: fixed; inset: 0; z-index: 500; background: #FFFFFF; display: none; overflow-y: auto; }
        #detail-modal.active { display: block; }
        .owner-only { display: none !important; }
        body.is-owner .owner-only { display: block !important; }
        body.is-owner .owner-only-flex { display: flex !important; }
        
        /* 圖片縮圖樣式 */
        .thumb-box { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; cursor: zoom-in; border: 1px solid #eee; }
        /* 大圖預覽 */
        #image-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 20px; }
        #image-overlay.active { display: flex; }
        #image-overlay img { max-width: 100%; max-height: 90vh; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="flex justify-center">

    <!-- 大圖預覽層 -->
    <div id="image-overlay" onclick="this.classList.remove('active')">
        <img id="overlay-img" src="">
    </div>

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-cream-bg shadow-inner">
        
        <!-- Header -->
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-cream-primary/20 flex justify-between items-center">
            <h1 id="trip-title" contenteditable="true" onblur="saveState()" class="editable text-lg font-black italic">🇰🇷 韓國之旅 2026</h1>
            <div onclick="unlockSystem()" id="lock-indicator" class="w-10 h-10 rounded-full bg-cream-accent text-white flex items-center justify-center cursor-pointer shadow-lg active:scale-90 transition">
                <i id="lock-icon" class="fa-solid fa-lock text-xs"></i>
            </div>
        </header>

        <!-- [分頁 1] 行程 -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <div id="day-selector" class="flex space-x-2 overflow-x-auto no-scrollbar mb-8 pb-4"></div>
            <div class="relative ml-1 space-y-4" id="itinerary-list"></div>
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-cream-primary rounded-[2rem] text-cream-accent font-bold">+ 新增行程項目</button>
        </section>

        <!-- [分頁 2] 待辦 -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic">行前待辦事項</h2>
            <div id="todo-groups" class="space-y-6"></div>
            <button onclick="addTodoGroup()" class="mt-6 w-full py-4 bg-white border border-gray-100 rounded-3xl text-gray-400 font-bold">+ 新增分類標題</button>
        </section>

        <!-- [分頁 3] 採購 (私密) -->
        <section id="tab-wishlist" class="tab-content px-6 pt-8 owner-only">
            <h2 class="text-2xl font-black mb-6 italic">待採購清單 (私密)</h2>
            <div id="wishlist-groups" class="space-y-6"></div>
            <button onclick="addWishGroup()" class="mt-6 w-full py-4 bg-white border border-gray-100 rounded-3xl text-gray-400 font-bold">+ 新增採購分類</button>
        </section>

        <!-- [分頁 4] 記帳 -->
        <section id="tab-budget" class="tab-content px-6 pt-8 text-center">
            <div class="bg-white p-5 rounded-3xl shadow-sm border mb-4">
                <div class="flex justify-between text-[10px] font-bold text-gray-400 uppercase">
                    <span>預算進度 (NT$ <span contenteditable="true" id="budget-val" onblur="saveState()">50000</span>)</span>
                    <span>剩餘: <span id="budget-left" class="text-cream-accent">0</span></span>
                </div>
                <div class="w-full bg-gray-100 h-2 mt-2 rounded-full overflow-hidden">
                    <div id="budget-bar" class="bg-cream-accent h-full" style="width: 0%"></div>
                </div>
            </div>
            <div class="bg-cream-accent text-white p-8 rounded-[2.5rem] mb-6">
                <h3 id="total-spent" class="text-4xl font-black font-mono italic">NT$ 0</h3>
                <button onclick="toggleSettlement()" class="mt-4 bg-white/20 px-4 py-2 rounded-full text-xs italic">查看代墊分帳</button>
            </div>
            <div id="expense-list" class="space-y-4 text-left"></div>
        </section>

        <!-- [分頁 5] 資訊 -->
        <section id="tab-info" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic">旅遊資訊</h2>
            <div id="custom-info-list" class="space-y-4"></div>
            <button onclick="addCustomInfo()" class="mt-6 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-gray-400 font-bold">+ 新增資訊區塊</button>
        </section>

        <!-- 底部導覽 -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] bg-white/80 backdrop-blur-2xl border h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around z-[100]">
            <button onclick="switchTab('schedule')" class="flex flex-col items-center text-gray-300 active-nav-btn" id="nav-schedule"><i class="fa-solid fa-compass"></i><span class="text-[8px] font-bold">行程</span></button>
            <button onclick="switchTab('todo')" class="flex flex-col items-center text-gray-300" id="nav-todo"><i class="fa-solid fa-list-check"></i><span class="text-[8px] font-bold">待辦</span></button>
            <button onclick="switchTab('wishlist')" class="flex flex-col items-center text-gray-300 owner-only-flex" id="nav-wishlist"><i class="fa-solid fa-basket-shopping"></i><span class="text-[8px] font-bold">採購</span></button>
            <button onclick="switchTab('budget')" class="flex flex-col items-center text-gray-300" id="nav-budget"><i class="fa-solid fa-sack-dollar"></i><span class="text-[8px] font-bold">記帳</span></button>
            <button onclick="switchTab('info')" class="flex flex-col items-center text-gray-300" id="nav-info"><i class="fa-solid fa-circle-info"></i><span class="text-[8px] font-bold">資訊</span></button>
        </nav>

        <!-- 記帳新增浮動按鈕 -->
        <button id="fab-budget" onclick="openExpenseModal()" class="hidden fixed bottom-32 right-8 w-14 h-14 bg-cream-accent text-white rounded-full shadow-2xl items-center justify-center text-xl z-[90]">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- [詳細頁 Modal] -->
    <div id="detail-modal" class="no-scrollbar">
        <div class="sticky top-0 z-[510] bg-white/90 backdrop-blur-md px-6 py-5 border-b flex justify-between items-center">
            <button onclick="closeDetailModal()" class="text-gray-400">✕ 關閉</button>
            <h3 class="text-xs font-black uppercase text-cream-accent italic">Details</h3>
            <button onclick="saveCurrentDetail()" class="px-6 py-2 bg-cream-accent text-white rounded-full text-xs font-black">SAVE</button>
        </div>
        <div class="p-8 pb-40 space-y-6">
            <input type="hidden" id="detail-idx">
            <input id="detail-title" type="text" class="w-full text-3xl font-black outline-none italic tracking-tighter" placeholder="行程名稱">
            <input id="detail-loc" type="text" class="w-full text-sm font-bold text-gray-400 outline-none italic" placeholder="📍 地標名稱用於導航">
            
            <div class="flex items-center space-x-3">
                <input id="detail-time" type="time" class="bg-gray-50 px-4 py-2 rounded-xl font-mono outline-none">
                <select id="detail-type" class="bg-white border rounded-xl px-4 py-2 text-xs font-bold italic">
                    <option value="景點">景點</option><option value="餐廳">餐廳</option><option value="購物">購物</option><option value="住宿">住宿</option><option value="交通">交通</option><option value="其他">其他</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="openM('google', document.getElementById('detail-loc').value)" class="py-4 bg-gray-50 rounded-2xl text-[10px] font-black italic">GOOGLE MAPS</button>
                <button onclick="openM('naver', document.getElementById('detail-loc').value)" class="py-4 bg-green-50 rounded-2xl text-[10px] font-black text-green-700 italic">NAVER MAP</button>
            </div>

            <textarea id="detail-desc" rows="4" class="w-full bg-gray-50 p-5 rounded-[2rem] outline-none text-sm" placeholder="行程詳細描述..."></textarea>
            <textarea id="detail-notes" rows="2" class="w-full bg-orange-50/50 p-5 rounded-[2rem] outline-none text-sm italic" placeholder="重要備註..."></textarea>

            <!-- 詳細頁購物區 -->
            <div id="private-shopping-section" class="pt-8 border-t owner-only">
                <div class="flex justify-between items-end mb-4">
                    <h4 class="text-xl font-black italic text-cream-accent">Shopping List 🧾</h4>
                    <button onclick="addShopGroup()" class="bg-cream-accent text-white px-4 py-2 rounded-full text-[10px]">+ 新增商店</button>
                </div>
                <div id="shopping-list-area" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- 記帳 Modal -->
    <div id="expense-modal" class="fixed inset-0 z-[200] hidden bg-black/40 backdrop-blur-sm flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] p-8 pb-12 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between mb-6"><h3 class="text-xl font-black italic">記帳</h3><button onclick="closeExpenseModal()">✕</button></div>
            <div class="space-y-4">
                <input type="hidden" id="edit-exp-id">
                <input id="exp-item" type="text" placeholder="項目名稱" class="w-full bg-gray-50 p-5 rounded-2xl font-bold outline-none">
                <input id="exp-date" type="date" class="w-full bg-gray-50 p-5 rounded-2xl font-mono outline-none">
                <div class="grid grid-cols-3 gap-2" id="payer-btns"></div>
                <div class="flex space-x-2">
                    <select id="exp-currency" class="bg-gray-50 p-5 rounded-2xl"><option value="KRW">KRW</option><option value="TWD">TWD</option></select>
                    <input id="exp-amount" type="number" placeholder="金額" class="flex-1 bg-gray-50 p-5 rounded-2xl font-black outline-none">
                </div>
                <button onclick="saveExpense()" class="w-full bg-cream-accent text-white py-5 rounded-[2rem] font-black italic">SAVE</button>
            </div>
        </div>
    </div>

    <script>
        // --- 資料狀態 ---
        let state = JSON.parse(localStorage.getItem('korea_final_vV6')) || {
            title: "🇰🇷 韓國之旅 2026", budget: 50000, currentDay: 1,
            itin: { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] },
            todoGroups: [], expenses: [], customInfo: [], wishGroups: []
        };
        let isOwner = false;
        const dayList = [{d:"7/5",w:"SUN"},{d:"7/6",w:"MON"},{d:"7/7",w:"TUE"},{d:"7/8",w:"WED"},{d:"7/9",w:"THU"},{d:"7/10",w:"FRI"},{d:"7/11",w:"SAT"}];
        const payers = ["小慌", "昱凱", "小安", "文哥", "共同費用"];
        let curPayer = "文哥";

        // --- 初始化 ---
        window.onload = () => { renderAll(); };
        function saveState() {
            state.title = document.getElementById('trip-title').innerText;
            state.budget = parseFloat(document.getElementById('budget-val').innerText) || 0;
            localStorage.setItem('korea_final_vV6', JSON.stringify(state));
            updateSummary();
        }

        // --- 核心權限 ---
        function unlockSystem() {
            const pass = prompt("密碼：");
            if (pass === "2002") {
                isOwner = true;
                document.body.classList.add('is-owner');
                document.getElementById('lock-icon').className = "fa-solid fa-lock-open";
                alert("已解鎖私人權限！");
                renderAll();
            } else { alert("密碼錯誤"); }
        }

        function switchTab(tab) {
            if(tab === 'wishlist' && !isOwner) return alert("主人專屬分頁");
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav-btn'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav-btn');
            document.getElementById('fab-budget').style.display = (tab === 'budget') ? 'flex' : 'none';
        }

        // --- 圖片預覽 ---
        function zoomImg(src) {
            document.getElementById('overlay-img').src = src;
            document.getElementById('image-overlay').classList.add('active');
        }

        // --- 渲染功能 ---
        function renderAll() { renderDayNav(); renderItin(); renderTodos(); renderWishlist(); renderExpenses(); renderInfo(); updateSummary(); }

        function renderDayNav() {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            dayList.forEach((d, i) => {
                const num = i + 1;
                const btn = document.createElement('button');
                btn.className = `day-btn flex flex-col items-center justify-center rounded-2xl min-w-[70px] h-[70px] ${state.currentDay == num ? 'active' : 'bg-white shadow-sm'}`;
                btn.onclick = () => { state.currentDay = num; renderAll(); };
                btn.innerHTML = `<span class="text-[9px] font-black opacity-40">DAY ${num}</span><span class="text-sm font-black italic">${d.d}</span>`;
                container.appendChild(btn);
            });
        }

        function renderItin() {
            const list = document.getElementById('itinerary-list'); list.innerHTML = "";
            (state.itin[state.currentDay] || []).forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-[2rem] shadow-sm relative";
                div.innerHTML = `
                    <button onclick="event.stopPropagation(); delItin(${idx})" class="absolute top-4 right-4 text-gray-200">✕</button>
                    <div onclick="openDetailModal(${idx})">
                        <span class="text-xs font-mono text-cream-accent">${item.time}</span>
                        <h3 class="font-black text-lg italic uppercase">${item.title}</h3>
                        <p class="text-[10px] text-gray-400 italic">📍 ${item.loc || '未填寫地點'}</p>
                    </div>`;
                list.appendChild(div);
            });
        }

        // --- 詳細頁與購物伸縮功能 ---
        function openDetailModal(idx) {
            const item = state.itin[state.currentDay][idx];
            document.getElementById('detail-idx').value = idx;
            document.getElementById('detail-title').value = item.title;
            document.getElementById('detail-time').value = item.time;
            document.getElementById('detail-loc').value = item.loc || "";
            document.getElementById('detail-desc').value = item.desc || "";
            document.getElementById('detail-notes').value = item.notes || "";
            renderShopping(item.shops || []);
            document.getElementById('detail-modal').classList.add('active');
        }
        function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }
        function saveCurrentDetail() {
            const idx = document.getElementById('detail-idx').value;
            const item = state.itin[state.currentDay][idx];
            item.title = document.getElementById('detail-title').value;
            item.time = document.getElementById('detail-time').value;
            item.loc = document.getElementById('detail-loc').value;
            item.desc = document.getElementById('detail-desc').value;
            item.notes = document.getElementById('detail-notes').value;
            saveState(); renderItin(); closeDetailModal();
        }

        function renderShopping(shops) {
            const area = document.getElementById('shopping-list-area'); area.innerHTML = "";
            shops.forEach((shop, sIdx) => {
                const detail = document.createElement('details');
                detail.className = "bg-white border rounded-[1.5rem] overflow-hidden shadow-sm";
                detail.open = true;
                detail.innerHTML = `
                    <summary class="p-4 font-black italic text-sm flex justify-between items-center cursor-pointer list-none bg-gray-50">
                        <div class="flex items-center space-x-2">
                            <i class="fa-solid fa-chevron-down text-[10px] transition-transform"></i>
                            <span contenteditable="true" onblur="updateShopN(${sIdx}, this)">${shop.name}</span>
                        </div>
                        <button onclick="delShop(${sIdx})" class="text-gray-300">✕</button>
                    </summary>
                    <div class="p-4 space-y-4">
                        ${shop.items.map((i, iIdx) => `
                            <div class="flex items-center justify-between border-b border-gray-50 pb-3">
                                <div class="flex items-center space-x-3 flex-1">
                                    <input type="checkbox" ${i.done?'checked':''} onchange="toggleShopItem(${sIdx},${iIdx})" class="accent-cream-accent">
                                    <div class="flex-1">
                                        <div contenteditable="true" onblur="updateShopIN(${sIdx},${iIdx},this)" class="text-[11px] font-bold">${i.name}</div>
                                        <div class="text-[9px] font-mono opacity-50">₩ <span contenteditable="true" onblur="updateShopIP(${sIdx},${iIdx},this)">${i.price}</span></div>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-3">
                                    ${i.img ? `<img src="${i.img}" class="thumb-box" onclick="zoomImg(this.src)">` : `<label class="w-[50px] h-[50px] bg-gray-100 flex items-center justify-center rounded-xl cursor-pointer text-gray-300 text-xs"><i class="fa-solid fa-camera"></i><input type="file" class="hidden" accept="image/*" onchange="upImg('shop',${sIdx},${iIdx},this)"></label>`}
                                    <button onclick="delShopItem(${sIdx},${iIdx})" class="text-gray-200">✕</button>
                                </div>
                            </div>
                        `).join('')}
                        <button onclick="addShopItem(${sIdx})" class="text-[10px] font-black text-cream-accent uppercase">+ 新增項目</button>
                    </div>`;
                area.appendChild(detail);
            });
        }

        // --- 圖片上傳邏輯 ---
        function upImg(type, g, i, el) {
            const file = el.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onloadend = () => {
                if(type === 'shop') {
                    const idx = document.getElementById('detail-idx').value;
                    state.itin[state.currentDay][idx].shops[g].items[i].img = reader.result;
                    renderShopping(state.itin[state.currentDay][idx].shops);
                } else if(type === 'wish') {
                    state.wishGroups[g].items[i].img = reader.result;
                    renderWishlist();
                }
                saveState();
            };
            reader.readAsDataURL(file);
        }

        // --- 待辦功能 (CRUD 修復) ---
        function renderTodos() {
            const container = document.getElementById('todo-groups'); container.innerHTML = "";
            state.todoGroups.forEach((g, gIdx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2rem] shadow-sm relative";
                div.innerHTML = `
                    <button onclick="delTodoGroup(${gIdx})" class="absolute top-6 right-6 text-gray-200">✕</button>
                    <h3 contenteditable="true" onblur="state.todoGroups[${gIdx}].title=this.innerText; saveState()" class="text-base font-black italic underline decoration-cream-primary">${g.title}</h3>
                    <div class="mt-4 space-y-3">
                        ${g.items.map((it, iIdx) => `
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-2">
                                    <input type="checkbox" ${it.done?'checked':''} onchange="state.todoGroups[${gIdx}].items[${iIdx}].done=!state.todoGroups[${gIdx}].items[${iIdx}].done; saveState(); renderTodos();" class="accent-cream-accent">
                                    <span contenteditable="true" onblur="state.todoGroups[${gIdx}].items[${iIdx}].text=this.innerText; saveState()" class="text-sm font-bold ${it.done?'line-through opacity-30':''}">${it.text}</span>
                                </div>
                                <button onclick="state.todoGroups[${gIdx}].items.splice(${iIdx},1); saveState(); renderTodos();" class="text-xs text-gray-200">✕</button>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="state.todoGroups[${gIdx}].items.push({text:'新事項',done:false}); saveState(); renderTodos();" class="mt-4 text-[10px] font-black text-cream-accent">+ 新增項目</button>`;
                container.appendChild(div);
            });
        }
        function addTodoGroup() { state.todoGroups.push({ title: "新清單", items: [] }); saveState(); renderTodos(); }
        function delTodoGroup(idx) { if(confirm("確定刪除此分類？")) { state.todoGroups.splice(idx,1); saveState(); renderTodos(); } }

        // --- 採購頁面 (伸縮 + 縮圖) ---
        function renderWishlist() {
            const container = document.getElementById('wishlist-groups'); container.innerHTML = "";
            state.wishGroups.forEach((g, gIdx) => {
                const detail = document.createElement('details');
                detail.className = "bg-white border rounded-[1.5rem] overflow-hidden mb-4 shadow-sm";
                detail.open = true;
                detail.innerHTML = `
                    <summary class="p-4 font-black italic text-base flex justify-between items-center cursor-pointer list-none bg-gray-50">
                        <div class="flex items-center space-x-2">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                            <span contenteditable="true" onblur="state.wishGroups[${gIdx}].title=this.innerText; saveState()">${g.title}</span>
                        </div>
                        <button onclick="state.wishGroups.splice(${gIdx},1); saveState(); renderWishlist();" class="text-gray-300">✕</button>
                    </summary>
                    <div class="p-4 space-y-6">
                        ${g.items.map((it, iIdx) => `
                            <div class="flex items-center justify-between border-b pb-4 border-gray-50">
                                <div class="flex items-center space-x-2 flex-1">
                                    <input type="checkbox" ${it.done?'checked':''} onchange="state.wishGroups[${gIdx}].items[${iIdx}].done=!state.wishGroups[${gIdx}].items[${iIdx}].done; saveState(); renderWishlist();">
                                    <span contenteditable="true" onblur="state.wishGroups[${gIdx}].items[${iIdx}].text=this.innerText; saveState()" class="text-sm font-bold ${it.done?'line-through opacity-30':''}">${it.text}</span>
                                </div>
                                <div class="flex items-center space-x-3">
                                    ${it.img ? `<img src="${it.img}" class="thumb-box" onclick="zoomImg(this.src)">` : `<label class="w-[50px] h-[50px] bg-gray-100 flex items-center justify-center rounded-xl cursor-pointer text-gray-300 text-xs"><i class="fa-solid fa-camera"></i><input type="file" class="hidden" accept="image/*" onchange="upImg('wish',${gIdx},${iIdx},this)"></label>`}
                                    <button onclick="state.wishGroups[${gIdx}].items.splice(${iIdx},1); saveState(); renderWishlist();" class="text-gray-200">✕</button>
                                </div>
                            </div>
                        `).join('')}
                        <button onclick="state.wishGroups[${gIdx}].items.push({text:'新商品',done:false,img:''}); saveState(); renderWishlist();" class="text-[10px] font-black text-cream-accent uppercase">+ 新增項目</button>
                    </div>`;
                container.appendChild(detail);
            });
        }
        function addWishGroup() { state.wishGroups.push({ title: "新分類", items: [] }); saveState(); renderWishlist(); }

        // --- 記帳功能 ---
        function renderExpenses() {
            const list = document.getElementById('expense-list'); list.innerHTML = "";
            state.expenses.forEach((e, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm relative active:scale-95 transition";
                div.innerHTML = `
                    <div class="flex-1" onclick="editExp(${idx})">
                        <p class="font-black italic uppercase">${e.item}</p>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">${e.payer} · ${e.date.slice(5)}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black font-mono">NT$ ${e.twd.toLocaleString()}</p>
                        <button onclick="delExp(${idx})" class="text-[8px] text-red-200 font-black">DELETE</button>
                    </div>`;
                list.appendChild(div);
            });
        }
        function updateSummary() {
            const total = state.expenses.reduce((s, e) => s + e.twd, 0); 
            document.getElementById('total-spent').innerText = `NT$ ${total.toLocaleString()}`;
            const left = state.budget - total; 
            document.getElementById('budget-left').innerText = `${left.toLocaleString()}`;
            document.getElementById('budget-bar').style.width = Math.min(100, (total / state.budget) * 100) + '%';
        }
        function openExpenseModal() { 
            document.getElementById('edit-exp-id').value = ""; 
            document.getElementById('exp-item').value = "";
            document.getElementById('exp-amount').value = "";
            document.getElementById('expense-modal').classList.remove('hidden'); 
            initPayerBtns(); 
        }
        function initPayerBtns() {
            document.getElementById('payer-btns').innerHTML = payers.map(p => `<button onclick="curPayer='${p}'; initPayerBtns()" class="seg-btn ${p===curPayer?'active':''}">${p}</button>`).join('');
        }
        function editExp(idx) {
            const e = state.expenses[idx];
            document.getElementById('edit-exp-id').value = idx;
            document.getElementById('exp-item').value = e.item;
            document.getElementById('exp-date').value = e.date;
            document.getElementById('exp-amount').value = e.amount;
            curPayer = e.payer;
            document.getElementById('expense-modal').classList.remove('hidden');
            initPayerBtns();
        }
        function saveExpense() {
            const idx = document.getElementById('edit-exp-id').value;
            const amt = parseFloat(document.getElementById('exp-amount').value) || 0;
            const rec = { 
                item: document.getElementById('exp-item').value, 
                date: document.getElementById('exp-date').value, 
                amount: amt, 
                twd: Math.round(amt * 0.024), // 簡化匯率
                payer: curPayer 
            };
            if(idx !== "") state.expenses[idx] = rec; else state.expenses.push(rec);
            saveState(); renderExpenses(); closeExpenseModal();
        }
        function closeExpenseModal() { document.getElementById('expense-modal').classList.add('hidden'); }
        function delExp(i) { if(confirm("刪除此筆帳目？")) { state.expenses.splice(i,1); saveState(); renderExpenses(); } }

        // --- 資訊區塊 (CRUD 修復) ---
        function renderInfo() {
            const container = document.getElementById('custom-info-list'); container.innerHTML = "";
            state.customInfo.forEach((info, idx) => {
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-[2rem] shadow-sm relative";
                div.innerHTML = `
                    <button onclick="state.customInfo.splice(${idx},1); saveState(); renderInfo();" class="absolute top-6 right-6 text-gray-200">✕</button>
                    <h4 contenteditable="true" onblur="state.customInfo[${idx}].title=this.innerText; saveState()" class="font-black text-sm uppercase italic mb-2">${info.title}</h4>
                    <div contenteditable="true" onblur="state.customInfo[${idx}].content=this.innerText; saveState()" class="text-[11px] text-gray-500 font-mono leading-relaxed">${info.content}</div>`;
                container.appendChild(div);
            });
        }
        function addCustomInfo() { state.customInfo.push({ title: "新標題", content: "點擊編輯內容" }); saveState(); renderInfo(); }

        // --- 其餘工具 ---
        function addNewItinerary() { state.itin[state.currentDay].push({ time:"12:00", title:"新行程", loc:"", desc:"", notes:"", shops:[] }); saveState(); renderItin(); }
        function delItin(i) { if(confirm("刪除行程？")) { state.itin[state.currentDay].splice(i,1); saveState(); renderItin(); } }
        function openM(type, loc) { if(!loc) return; window.open(type==='google' ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}` : `https://map.naver.com/v5/search/${encodeURIComponent(loc)}`); }
        function addShopGroup() { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops.push({ name: "商店名", items: [] }); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function delShop(s) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops.splice(s,1); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function addShopItem(s) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items.push({ name: "商品", price: 0, done: false, img: "" }); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function delShopItem(s, i) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items.splice(i,1); saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function toggleShopItem(s, i) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items[i].done = !state.itin[state.currentDay][idx].shops[s].items[i].done; saveState(); renderShopping(state.itin[state.currentDay][idx].shops); }
        function updateShopN(s, el) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].name = el.innerText; saveState(); }
        function updateShopIN(s, i, el) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items[i].name = el.innerText; saveState(); }
        function updateShopIP(s, i, el) { const idx = document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items[i].price = el.innerText; saveState(); }
        function toggleSettlement() {
            const m = document.getElementById('settlement-modal') || document.createElement('div');
            if(!m.id) {
                m.id="settlement-modal"; m.className="fixed inset-0 z-[300] bg-black/50 flex items-center justify-center p-6";
                m.innerHTML=`<div class="bg-white rounded-3xl p-8 w-full max-w-xs"><h3 class="font-black mb-4">代墊統計</h3><div id="set-c"></div><button onclick="this.parentElement.parentElement.remove()" class="mt-6 w-full py-3 bg-cream-accent text-white rounded-xl">關閉</button></div>`;
                document.body.appendChild(m);
            }
            const c = document.getElementById('set-c');
            const paid = {}; payers.forEach(p => paid[p] = 0);
            state.expenses.forEach(e => paid[e.payer] += e.twd);
            c.innerHTML = payers.map(p => `<div class="flex justify-between border-b py-2 text-sm"><span>${p}</span><span class="font-mono">NT$ ${paid[p]}</span></div>`).join('');
        }
    </script>
</body>
</html>
