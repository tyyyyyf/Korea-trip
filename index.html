<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 2026 Pro Max</title>
    <!-- Tailwind & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-bg': '#F8F5F2',
                        'cream-card': '#FFFFFF',
                        'cream-accent': '#4A342E',
                        'cream-primary': '#E8DCCF',
                        'cat-att': '#D9B99B', 'cat-res': '#E8DCCF', 'cat-caf': '#EEDFCC',
                        'cat-shp': '#F3E9E0', 'cat-bis': '#C4A484', 'cat-mon': '#D2B48C', 'cat-oth': '#ECECEB',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .editable:focus { outline: 2px dashed #4A342E; background: rgba(74, 52, 46, 0.05); border-radius: 4px; color: #2C2C2C !important; }
        .active-nav-btn { color: #4A342E !important; }
        .day-btn { width: 80px; height: 80px; flex-shrink: 0; transition: all 0.2s; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); }
        .timeline-line::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #E8DCCF; opacity: 0.5; }
        /* Detail Modal Full Screen */
        #detail-modal { position: fixed; inset: 0; z-index: 500; background: #FFFFFF; display: none; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #detail-modal.active { display: block; animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .placeholder-hint { color: #D1D5DB !important; }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-cream-bg shadow-inner">
        
        <!-- Header -->
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-cream-primary/20 flex justify-between items-center">
            <h1 id="trip-title" contenteditable="true" class="editable text-lg font-black tracking-tight italic placeholder-hint" onblur="saveState()">🇰🇷 韓國之旅 2026</h1>
            <div class="w-8 h-8 rounded-full bg-cream-accent text-white flex items-center justify-center text-[10px] font-bold">KR</div>
        </header>

        <!-- [分頁 1] 行程 (維持 Timeline UI) -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <div id="day-selector" class="flex space-x-3 overflow-x-auto no-scrollbar mb-8 pb-4"></div>
            <div class="relative timeline-line ml-1" id="itinerary-list"></div>
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-cream-accent font-bold text-sm tracking-widest">+ 新增行程項目</button>
        </section>

        <!-- [分頁 2] 採購 (維持原本設計) -->
        <section id="tab-wishlist" class="tab-content px-6 pt-8">
            <div class="flex justify-between items-center mb-6 text-gray-800">
                <h2 class="text-2xl font-black italic flex items-center"><i class="fa-solid fa-basket-shopping mr-2 text-cream-accent"></i>待採購清單</h2>
                <button onclick="addWishGroup()" class="bg-cream-accent text-white px-4 py-2 rounded-full text-[10px] font-black uppercase shadow-lg">+ Add Shop</button>
            </div>
            <div id="wishlist-module-area" class="space-y-6"></div>
        </section>

        <!-- [分頁 3] 待辦 -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black italic tracking-tight mb-6 text-gray-800 flex items-center"><i class="fa-solid fa-list-check mr-2 text-cream-accent"></i>行前待辦事項</h2>
            <div id="todo-groups" class="space-y-6"></div>
            <button onclick="addTodoGroup()" class="mt-6 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-gray-400 font-bold text-sm tracking-widest">+ 新增分類母項目</button>
        </section>

        <!-- [分頁 4] 記帳 -->
        <section id="tab-budget" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic text-cream-accent tracking-tighter flex items-center"><i class="fa-solid fa-sack-dollar mr-2"></i>旅遊記帳</h2>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-6">
                <div class="flex justify-between text-[11px] font-bold text-gray-400 mb-2 uppercase">
                    <span>預算進度 (NT$ <span contenteditable="true" id="budget-val" class="editable font-mono"></span>)</span>
                    <span>剩餘: <span id="budget-left" class="text-cream-accent font-mono">0</span></span>
                </div>
                <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden"><div id="budget-bar" class="bg-cream-accent h-full transition-all duration-700"></div></div>
            </div>
            <div id="expense-list-area">
                <div class="bg-cream-accent text-white p-8 rounded-[2.5rem] shadow-lg mb-6 relative overflow-hidden text-center">
                    <p class="text-[10px] opacity-70 font-bold mb-1 tracking-widest uppercase">總支出 (TWD)</p>
                    <h3 id="total-spent" class="text-4xl font-black italic tracking-tighter font-mono">NT$ 0</h3>
                    <button onclick="toggleSettlement()" class="mt-4 bg-white/20 px-4 py-2 rounded-full text-[10px] font-bold border border-white/30 italic">查看分帳統計</button>
                </div>
                <div id="expense-date-filter" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 px-1"></div>
                <div id="expense-list" class="space-y-4"></div>
            </div>
        </section>

        <!-- [分頁 5] 資訊 -->
        <section id="tab-info" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic text-cream-accent tracking-widest flex items-center"><i class="fa-solid fa-circle-info mr-2"></i>資訊</h2>
            <div id="info-content-static" class="space-y-4 mb-8"></div>
            <div id="custom-info-list" class="space-y-4"></div>
            <button onclick="addCustomInfo()" class="mt-4 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-gray-400 font-bold text-sm">+ 新增資訊區塊</button>
        </section>

        <!-- 底部導覽 (5 欄新排序) -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] bg-white/80 backdrop-blur-2xl border border-white/50 h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-2 z-[100]">
            <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-btn flex flex-col items-center space-y-1 active-nav-btn text-gray-300 transition-all"><i class="fa-solid fa-compass text-lg"></i><span class="text-[8px] font-black uppercase">行程</span></button>
            <button onclick="switchTab('wishlist')" id="nav-wishlist" class="nav-btn flex flex-col items-center space-y-1 text-gray-300 transition-all"><i class="fa-solid fa-basket-shopping text-lg"></i><span class="text-[8px] font-black uppercase">採購</span></button>
            <button onclick="switchTab('todo')" id="nav-todo" class="nav-btn flex flex-col items-center space-y-1 text-gray-300 transition-all"><i class="fa-solid fa-list-check text-lg"></i><span class="text-[8px] font-black uppercase">待辦</span></button>
            <button onclick="switchTab('budget')" id="nav-budget" class="nav-btn flex flex-col items-center space-y-1 text-gray-300 transition-all"><i class="fa-solid fa-sack-dollar text-lg"></i><span class="text-[8px] font-black uppercase">記帳</span></button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-btn flex flex-col items-center space-y-1 text-gray-300 transition-all"><i class="fa-solid fa-circle-info text-lg"></i><span class="text-[8px] font-black uppercase">資訊</span></button>
        </nav>

        <button id="fab-calculator" onclick="openCalcModal()" class="hidden fixed bottom-48 right-8 w-14 h-14 bg-white border border-gray-100 text-cream-accent rounded-full shadow-2xl items-center justify-center text-xl z-[90] active:scale-90 transition"><i class="fa-solid fa-calculator"></i></button>
        <button id="fab-budget" onclick="openExpenseModal()" class="hidden fixed bottom-32 right-8 w-14 h-14 bg-cream-accent text-white rounded-full shadow-2xl items-center justify-center text-xl z-[90] active:scale-90 transition"><i class="fa-solid fa-plus"></i></button>
    </div>

    <!-- [詳細頁] Full Screen Modal -->
    <div id="detail-modal" class="no-scrollbar">
        <div class="sticky top-0 z-[510] bg-white/95 backdrop-blur-md px-6 py-5 border-b border-gray-100 flex justify-between items-center">
            <button onclick="closeDetailModal()" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full text-gray-400">✕</button>
            <h3 class="text-[10px] font-black italic tracking-widest text-cream-accent uppercase">Detailed Itinerary</h3>
            <button onclick="saveCurrentDetail()" class="px-6 py-2 bg-cream-accent text-white rounded-full text-xs font-black shadow-lg">SAVE</button>
        </div>

        <div class="p-8 pb-40 space-y-8">
            <input type="hidden" id="detail-idx">
            
            <div class="space-y-6">
                <!-- Title & Time -->
                <div class="space-y-4">
                    <input id="detail-title" type="text" class="w-full text-3xl font-black border-none outline-none italic tracking-tighter" placeholder="景點或住宿名稱">
                    <div class="flex items-center space-x-2 bg-cream-bg/50 px-4 py-2 rounded-xl w-fit">
                        <i class="fa-regular fa-clock text-cream-accent"></i>
                        <input id="detail-time" type="time" class="bg-transparent border-none outline-none font-mono font-black italic">
                    </div>
                </div>

                <!-- Category Dropdown -->
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 block">Category</label>
                    <div class="flex items-center space-x-2">
                        <select id="detail-category" class="flex-1 bg-gray-50 p-4 rounded-xl outline-none text-xs font-bold border-none appearance-none italic">
                            <option value="景點">景點</option><option value="餐廳">餐廳</option><option value="咖啡廳">咖啡廳</option>
                            <option value="購物">購物</option><option value="住宿">住宿</option><option value="交通">交通</option>
                            <option value="機場">機場</option><option value="夜生活">夜生活</option><option value="其他">其他</option>
                        </select>
                        <button onclick="addCustomCategory()" class="w-12 h-12 bg-gray-100 rounded-xl text-gray-400">+</button>
                    </div>
                </div>
                
                <!-- Location & Navigation -->
                <div class="grid grid-cols-1 gap-4 bg-gray-50/50 p-6 rounded-[2rem]">
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">中文地址 (Google Maps)</label>
                            <button onclick="copyToClipboard(document.getElementById('detail-loc-cn').value)"><i class="fa-regular fa-copy text-gray-300 text-xs"></i></button>
                        </div>
                        <input id="detail-loc-cn" type="text" class="bg-white w-full p-3 rounded-xl border-none outline-none text-xs font-bold" placeholder="輸入中文地址或目的地">
                        
                        <div class="flex items-center justify-between">
                            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">韓文地址 (NAVER Maps)</label>
                            <button onclick="copyToClipboard(document.getElementById('detail-loc-kr').value)"><i class="fa-regular fa-copy text-gray-300 text-xs"></i></button>
                        </div>
                        <input id="detail-loc-kr" type="text" class="bg-white w-full p-3 rounded-xl border-none outline-none text-xs font-bold" placeholder="輸入韓文地址">
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-2">
                        <button onclick="openM('google', document.getElementById('detail-loc-cn').value || document.getElementById('detail-title').value)" class="py-3 bg-white border border-gray-100 rounded-xl text-[10px] font-black uppercase italic shadow-sm">Google Map</button>
                        <button onclick="openM('naver', document.getElementById('detail-loc-kr').value || document.getElementById('detail-title').value)" class="py-3 bg-green-50 text-green-700 border border-green-100 rounded-xl text-[10px] font-black uppercase italic shadow-sm">Naver Map</button>
                    </div>
                </div>
            </div>

            <!-- Description & Notes -->
            <div class="space-y-6">
                <div>
                    <label class="text-[11px] font-black text-gray-800 uppercase mb-2 block tracking-tight">行程詳細描述</label>
                    <textarea id="detail-desc" rows="3" class="w-full bg-gray-50 p-5 rounded-[2rem] outline-none text-sm font-medium leading-relaxed placeholder-hint" placeholder="請輸入行程內容..."></textarea>
                </div>
                <div>
                    <label class="text-[11px] font-black text-gray-800 uppercase mb-2 block tracking-tight">備註</label>
                    <textarea id="detail-notes" rows="2" class="w-full bg-orange-50/50 p-5 rounded-[2rem] outline-none text-sm font-medium italic placeholder-hint" placeholder="請輸入備註內容..."></textarea>
                </div>
            </div>

            <!-- Shopping List Module -->
            <div class="pt-8 border-t border-gray-100">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <h4 class="text-xl font-black italic tracking-tight">Shopping List 🧾</h4>
                        <p id="shop-progress-text" class="text-[9px] font-black text-gray-400 uppercase mt-1 tracking-tighter">0 Items (0%)</p>
                    </div>
                    <button onclick="addShopGroupDetail()" class="bg-cream-accent text-white px-4 py-2 rounded-full text-[10px] font-black uppercase shadow-lg">+ Add Shop</button>
                </div>
                <div id="detail-shopping-list-area" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <!-- 記帳 & 計算機 Modal (保持原有邏輯) -->
    <div id="calc-modal" class="no-scrollbar">
        <!-- 內容略，與之前一致 -->
    </div>

    <script>
        // --- 核心資料 ---
        let state = JSON.parse(localStorage.getItem('korea_vFinal_2026')) || {
            title: "🇰🇷 韓國之旅 2026", budget: 50000, currentDay: 1,
            itin: { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] },
            todoGroups: [], expenses: [], customInfo: [], wishGroups: []
        };

        const dayArr = [{d:"7/5",w:"SUN"},{d:"7/6",w:"MON"},{d:"7/7",w:"TUE"},{d:"7/8",w:"WED"},{d:"7/9",w:"THU"},{d:"7/10",w:"FRI"},{d:"7/11",w:"SAT"}];
        
        // --- 初始化 & 保存 ---
        window.onload = () => { renderAll(); setupAutoClear(document.getElementById('trip-title'), "🇰🇷 韓國之旅 2026"); };
        function saveState() {
            state.title = document.getElementById('trip-title').innerText;
            localStorage.setItem('korea_vFinal_2026', JSON.stringify(state));
            updateSummary();
            // Sync to Supabase Logic (Optional placeholder)
            // supabase.from('trips').upsert(state);
        }

        function setupAutoClear(el, placeholder) {
            if (!el.innerText.trim() || el.innerText.trim() === placeholder) {
                el.innerText = placeholder; el.classList.add('placeholder-hint');
            }
            el.onfocus = () => { if (el.innerText.trim() === placeholder) { el.innerText = ""; el.classList.remove('placeholder-hint'); } };
            el.onblur = () => { if (!el.innerText.trim()) { el.innerText = placeholder; el.classList.add('placeholder-hint'); } };
        }

        function renderAll() {
            renderDayNav(); renderItin(); renderWishlist(); renderTodos(); renderExpenses('all'); renderInfo(); updateSummary();
        }

        // --- 分頁切換 ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-300'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav-btn'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav-btn');
            document.getElementById('nav-' + tab).classList.remove('text-gray-300');
            const showFab = (tab === 'budget');
            document.getElementById('fab-budget').style.display = showFab ? 'flex' : 'none';
        }

        // --- 行程功能 (Timeline UI) ---
        function renderDayNav() {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            dayArr.forEach((d, i) => {
                const btn = document.createElement('button');
                btn.className = `day-btn flex-none rounded-2xl flex flex-col items-center justify-center shadow-sm transition-all ${state.currentDay == i+1 ? 'active' : 'bg-white text-cream-sub'}`;
                btn.onclick = () => { state.currentDay = i+1; renderAll(); };
                btn.innerHTML = `<span class="text-[9px] font-black opacity-40 mb-1">Day ${i+1}</span><span class="text-[10px] font-bold">${d.w}</span><span class="text-base font-black italic underline decoration-cream-primary/30">${d.d}</span>`;
                container.appendChild(btn);
            });
        }

        function renderItin() {
            const list = document.getElementById('itinerary-list'); list.innerHTML = "";
            (state.itin[state.currentDay] || []).forEach((item, idx) => {
                const div = document.createElement('div'); div.className = "relative pl-10 mb-8";
                div.innerHTML = `<div class="absolute left-[13px] top-1 w-4 h-4 rounded-full bg-cream-accent border-4 border-white shadow z-10"></div>
                    <div onclick="openDetailModal(${idx})" class="bg-white p-5 rounded-[2rem] shadow-sm border border-cream-primary/10 relative transition active:scale-95">
                        <div class="absolute top-4 right-4 flex space-x-3 text-gray-300">
                            <button onclick="event.stopPropagation(); moveItin(${idx},-1)"><i class="fa-solid fa-chevron-up text-xs"></i></button>
                            <button onclick="event.stopPropagation(); moveItin(${idx},1)"><i class="fa-solid fa-chevron-down text-xs"></i></button>
                            <button onclick="event.stopPropagation(); delItin(${idx})" class="hover:text-red-400 ml-1"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="flex justify-between mb-2 pr-14 italic font-black text-cream-accent text-xs"><span>${item.time || '12:00'}</span><span class="text-[9px] uppercase opacity-40">${item.type || '景點'}</span></div>
                        <h3 class="font-black text-base italic tracking-tight uppercase mb-2">${item.title || '地標名稱'}</h3>
                        <div class="space-y-1">
                            ${item.locCN ? `<p class="text-[8px] text-gray-400 font-bold truncate">📍 ${item.locCN}</p>` : ''}
                            ${item.locKR ? `<p class="text-[8px] text-gray-400 font-bold truncate">📍 ${item.locKR}</p>` : ''}
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-3">
                             <button onclick="event.stopPropagation(); openM('google', '${item.locCN || item.title}')" class="py-2 bg-gray-50 rounded-xl text-[8px] font-black uppercase">Google</button>
                             <button onclick="event.stopPropagation(); openM('naver', '${item.locKR || item.title}')" class="py-2 bg-green-50 text-green-700 rounded-xl text-[8px] font-black uppercase">Naver</button>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        function addNewItinerary() { state.itin[state.currentDay].push({ time:"12:00", title:"新行程", locCN:"", locKR:"", desc:"", notes:"", type:"景點", shops:[] }); saveState(); renderItin(); }
        function moveItin(idx, dir) { const arr = state.itin[state.currentDay]; const t = idx+dir; if(t>=0 && t<arr.length) { [arr[idx],arr[t]]=[arr[t],arr[idx]]; saveState(); renderItin(); } }
        function delItin(idx) { if(confirm("確定刪除行程？")) { state.itin[state.currentDay].splice(idx,1); saveState(); renderItin(); } }

        // --- 詳細頁功能 ---
        function openDetailModal(idx) {
            const item = state.itin[state.currentDay][idx];
            document.getElementById('detail-idx').value = idx;
            document.getElementById('detail-title').value = item.title;
            document.getElementById('detail-loc-cn').value = item.locCN || "";
            document.getElementById('detail-loc-kr').value = item.locKR || "";
            document.getElementById('detail-time').value = item.time || "12:00";
            document.getElementById('detail-category').value = item.type || "景點";
            document.getElementById('detail-desc').value = item.desc || "";
            document.getElementById('detail-notes').value = item.notes || "";
            renderDetailShopping(item.shops || []);
            document.getElementById('detail-modal').classList.add('active');
        }

        function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }

        function saveCurrentDetail() {
            const idx = document.getElementById('detail-idx').value; const item = state.itin[state.currentDay][idx];
            item.title = document.getElementById('detail-title').value; item.locCN = document.getElementById('detail-loc-cn').value;
            item.locKR = document.getElementById('detail-loc-kr').value; item.time = document.getElementById('detail-time').value;
            item.type = document.getElementById('detail-category').value;
            item.desc = document.getElementById('detail-desc').value; item.notes = document.getElementById('detail-notes').value;
            saveState(); renderItin(); closeDetailModal();
        }

        function renderDetailShopping(shops) {
            const area = document.getElementById('detail-shopping-list-area'); area.innerHTML = "";
            let tItems=0, bItems=0;
            shops.forEach((shop, sIdx) => {
                const sortedItems = [...shop.items].sort((a,b) => (a.done === b.done) ? 0 : a.done ? 1 : -1);
                const bCount = shop.items.filter(i=>i.done).length, tCount = shop.items.length, pct = tCount>0 ? Math.round((bCount/tCount)*100) : 0;
                tItems += tCount; bItems += bCount;
                const div = document.createElement('div'); div.className = "bg-white border border-gray-100 rounded-[2.5rem] p-5 shadow-sm space-y-4";
                div.innerHTML = `<div class="flex justify-between items-center"><div class="flex-1"><h5 contenteditable="true" id="dsn-${sIdx}" class="font-black text-sm italic uppercase tracking-widest">${shop.name}</h5><div class="mt-2 flex items-center space-x-2"><div class="flex-1 h-1 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-cream-accent" style="width:${pct}%"></div></div><span class="text-[9px] font-black font-mono text-cream-accent">${bCount}/${tCount}</span></div></div><button onclick="delShopDetail(${sIdx})" class="text-gray-200 ml-4"><i class="fa-solid fa-trash-can text-xs"></i></button></div>
                    <div class="space-y-3">${sortedItems.map((i) => { const origIdx = shop.items.indexOf(i); return `<div class="bg-gray-50/50 p-4 rounded-3xl space-y-3 relative group"><div class="flex items-center space-x-3"><input type="checkbox" ${i.done?'checked':''} onchange="toggleShopItemDetail(${sIdx},${origIdx})" class="w-6 h-6 accent-cream-accent shadow-sm"><div class="flex-1 min-w-0"><div contenteditable="true" id="dsi-${sIdx}-${origIdx}" class="text-[11px] font-black ${i.done?'line-through opacity-30':''}">${i.name}</div><div class="flex space-x-3 mt-1 text-[8px] font-black text-gray-400 font-mono italic uppercase"><span>₩ <span contenteditable="true" id="dsp-${sIdx}-${origIdx}">${i.price}</span></span><span>Qty: <span contenteditable="true" id="dsq-${sIdx}-${origIdx}">${i.qty}</span></span></div></div><button onclick="delShopItemDetail(${sIdx},${origIdx})" class="text-gray-200"><i class="fa-solid fa-xmark text-xs"></i></button></div>
                    <div class="flex items-center space-x-3 pl-10"><div class="w-12 h-12 rounded-xl bg-white border border-gray-100 flex items-center justify-center overflow-hidden flex-shrink-0 relative">${i.img?`<img src="${i.img}" class="w-full h-full object-cover">`:`<i class="fa-solid fa-camera text-gray-200 text-lg"></i>`}<input type="file" accept="image/*" onchange="uploadImageDetail(event,${sIdx},${origIdx})" class="absolute inset-0 opacity-0"></div><textarea id="dsnt-${sIdx}-${origIdx}" placeholder="商品備註內容..." class="flex-1 bg-transparent text-[10px] italic border-none outline-none resize-none font-sans">${i.note||''}</textarea></div></div>`}).join('')}<button onclick="addShopItemDetail(${sIdx})" class="text-[9px] font-black text-cream-accent uppercase tracking-widest">+ Add Item</button></div>`;
                area.appendChild(div);
                setupAutoClear(div.querySelector(`#dsn-${sIdx}`), "商店名稱");
                shop.items.forEach((item, iIdx) => { 
                    setupAutoClear(div.querySelector(`#dsi-${sIdx}-${iIdx}`), "商品名稱"); 
                    div.querySelector(`#dsn-${sIdx}`).onblur=(e)=>{ shop.name=e.target.innerText; saveState(); };
                    div.querySelector(`#dsi-${sIdx}-${iIdx}`).onblur=(e)=>{ item.name=e.target.innerText; saveState(); };
                    div.querySelector(`#dsp-${sIdx}-${iIdx}`).onblur=(e)=>{ item.price=e.target.innerText; saveState(); };
                    div.querySelector(`#dsq-${sIdx}-${iIdx}`).onblur=(e)=>{ item.qty=e.target.innerText; saveState(); };
                    div.querySelector(`#dsnt-${sIdx}-${iIdx}`).onblur=(e)=>{ item.note=e.target.value; saveState(); };
                });
            });
            document.getElementById('shop-progress-text').innerText = `${bItems} / ${tItems} Items (${Math.round((bItems/tItems)*100)||0}%)`;
        }

        function addShopGroupDetail() { const idx=document.getElementById('detail-idx').value; if(!state.itin[state.currentDay][idx].shops) state.itin[state.currentDay][idx].shops=[]; state.itin[state.currentDay][idx].shops.push({name:"商店名稱",items:[]}); saveState(); renderDetailShopping(state.itin[state.currentDay][idx].shops); }
        function delShopDetail(s) { const idx=document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops.splice(s,1); saveState(); renderDetailShopping(state.itin[state.currentDay][idx].shops); }
        function addShopItemDetail(s) { const idx=document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items.push({name:"商品名稱",price:0,qty:1,done:false,img:"",note:""}); saveState(); renderDetailShopping(state.itin[state.currentDay][idx].shops); }
        function toggleShopItemDetail(s,i) { const idx=document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items[i].done=!state.itin[state.currentDay][idx].shops[s].items[i].done; saveState(); renderDetailShopping(state.itin[state.currentDay][idx].shops); }
        function delShopItemDetail(s,i) { const idx=document.getElementById('detail-idx').value; state.itin[state.currentDay][idx].shops[s].items.splice(i,1); saveState(); renderDetailShopping(state.itin[state.currentDay][idx].shops); }
        function uploadImageDetail(e,s,i) { const idx=document.getElementById('detail-idx').value; const file=e.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=(event)=>{ const img=new Image(); img.onload=()=>{ const canvas=document.createElement('canvas'); const mw=300, scale=mw/img.width; canvas.width=mw; canvas.height=img.height*scale; canvas.getContext('2d').drawImage(img,0,0,mw,canvas.height); state.itin[state.currentDay][idx].shops[s].items[i].img=canvas.toDataURL('image/jpeg',0.7); saveState(); renderDetailShopping(state.itin[state.currentDay][idx].shops); }; img.src=event.target.result; }; reader.readAsDataURL(file); }

        // --- 資訊頁面 (靜態航班飯店) ---
        function renderInfo() {
            const staticArea = document.getElementById('info-content-static');
            staticArea.innerHTML = `<!-- 這裡放入您提到的去回程與飯店內容 -->`;
            // 此處實作航班與飯店內容... 同理自訂資訊...
        }

        function copyToClipboard(text) { if(!text) return; navigator.clipboard.writeText(text).then(()=>alert("已複製: " + text)); }
        function openM(type, loc) { if(!loc)return alert("請輸入位址"); const q=encodeURIComponent(loc); window.open(type==='google'?`https://www.google.com/maps/search/?api=1&query=${q}`:`https://map.naver.com/v5/search/${q}`,'_blank'); }
    </script>
</body>
</html>
