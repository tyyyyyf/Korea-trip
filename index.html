<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-bg': '#F8F5F2',
                        'cream-card': '#FFFFFF',
                        'cream-accent': '#4A342E',
                        'cream-primary': '#E8DCCF',
                        'cat-att': '#D9B99B', // 景點
                        'cat-shp': '#F3E9E0', // 購物
                        'cat-res': '#E8DCCF', // 餐廳
                        'cat-caf': '#EEDFCC', // 咖啡廳
                        'cat-bis': '#C4A484', // 餐酒館
                        'cat-mon': '#D2B48C', // 換錢站
                        'cat-oth': '#ECECEB', // 其他
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .editable:focus { outline: 2px dashed #4A342E; background: rgba(74, 52, 46, 0.05); border-radius: 4px; }
        .active-nav-btn { color: #4A342E !important; }
        .day-btn { width: 80px; height: 80px; transition: all 0.2s; flex-shrink: 0; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); }
        .timeline-line::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #E8DCCF; opacity: 0.5; }
        .seg-btn { background-color: #FFFFFF; color: #8B8B8B; border: 1px solid #F3F0ED; transition: all 0.2s; }
        .seg-btn.active { background-color: #4A342E; color: #FFFFFF; border-color: #4A342E; }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-cream-bg shadow-inner">
        
        <!-- Header -->
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-cream-primary/20 flex justify-between items-center">
            <h1 id="trip-title" contenteditable="true" onblur="saveState()" class="editable text-lg font-black tracking-tight italic">🇰🇷 韓國之旅 2026</h1>
            <div class="w-8 h-8 rounded-full bg-cream-accent text-white flex items-center justify-center text-[10px] font-bold">KR</div>
        </header>

        <!-- [分頁 1] 行程 (全面升級版) -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <div id="day-selector" class="flex space-x-3 overflow-x-auto no-scrollbar mb-8 pb-4"></div>
            <div class="relative timeline-line ml-1" id="itinerary-list"></div>
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-cream-primary rounded-[2rem] text-cream-accent font-bold text-sm tracking-widest">+ 新增行程項目</button>
        </section>

        <!-- [分頁 2] 代辦 -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic">行前代辦</h2>
                <button onclick="addTodoGroup()" class="text-xs bg-cream-accent text-white px-3 py-1.5 rounded-full font-bold">新增母標題</button>
            </div>
            <div id="todo-groups" class="space-y-6"></div>
        </section>

        <!-- [分頁 3] 記帳 -->
        <section id="tab-budget" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic">旅遊記帳</h2>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-4">
                <div class="flex justify-between text-[11px] font-bold text-gray-400 mb-2 uppercase">
                    <span>預算進度 (NT$ <span contenteditable="true" id="budget-val" onblur="saveState()">50000</span>)</span>
                    <span>剩餘: <span id="budget-left" class="text-cream-accent">0</span></span>
                </div>
                <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                    <div id="budget-bar" class="bg-cream-accent h-full transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
            <div class="bg-cream-accent text-white p-8 rounded-[2.5rem] shadow-lg mb-6 relative overflow-hidden text-center">
                <p class="text-[10px] opacity-70 font-bold mb-1 tracking-widest uppercase">總支出 (TWD)</p>
                <h3 id="total-spent" class="text-4xl font-black italic tracking-tighter">NT$ 0</h3>
                <button onclick="toggleSettlement()" class="mt-4 bg-white/20 px-4 py-2 rounded-full text-[10px] font-bold border border-white/30 italic">查看分帳統計</button>
                <i class="fa-solid fa-sack-dollar absolute -right-4 -bottom-4 text-white/10 text-9xl"></i>
            </div>
            <div id="expense-date-filter" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 px-1"></div>
            <div id="expense-list" class="space-y-4"></div>
        </section>

        <!-- [分頁 4] 資訊 -->
        <section id="tab-info" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic text-cream-accent">旅遊資訊</h2>
            <div class="space-y-4 mb-8">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-[10px] font-black text-blue-500 uppercase mb-3 tracking-widest font-mono italic">✈️ 去程班機時刻</p>
                    <h4 class="font-black text-base italic">濟州航空 7C6102</h4>
                    <div class="mt-2 text-sm text-gray-500 font-medium font-mono">11:55 桃機 T1 / 15:35 抵達仁川 T1</div>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-[10px] font-black text-orange-500 uppercase mb-3 tracking-widest font-mono italic">✈️ 回程班機時刻</p>
                    <h4 class="font-black text-base italic">長榮航空 BR159</h4>
                    <div class="mt-2 text-sm text-gray-500 font-medium font-mono">19:45 仁川 T1 / 21:25 抵達桃機 T2</div>
                </div>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-8 text-center">
                <p class="text-[10px] font-black text-cream-accent uppercase mb-3 tracking-widest font-mono italic">🏨 住宿與導航</p>
                <h4 class="font-black text-[13px] mb-4">Seoul Jung-gu Sogong-ro 6na-gil 11</h4>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="openM('google', 'Seoul Jung-gu Sogong-ro 6na-gil 11')" class="py-3 bg-gray-50 rounded-2xl text-[10px] font-bold">Google Maps</button>
                    <button onclick="openM('naver', '서울특별시 중구 소公路6나길 11')" class="py-3 bg-green-50 rounded-2xl text-[10px] font-bold text-green-700">NAVER Map</button>
                </div>
            </div>
            <div id="custom-info-list" class="space-y-4"></div>
            <button onclick="addCustomInfo()" class="mt-4 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-gray-400 font-bold text-sm">+ 新增自訂資訊</button>
        </section>

        <!-- 底部導覽 -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-[400px] bg-white/80 backdrop-blur-2xl border border-white/50 h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-2 z-[100]">
            <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-btn flex flex-col items-center space-y-1 active-nav-btn text-gray-300">
                <i class="fa-solid fa-compass text-lg"></i><span class="text-[9px] font-black uppercase tracking-tighter">行程</span>
            </button>
            <button onclick="switchTab('todo')" id="nav-todo" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-list-check text-lg"></i><span class="text-[9px] font-black uppercase tracking-tighter">代辦</span>
            </button>
            <button onclick="switchTab('budget')" id="nav-budget" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-sack-dollar text-lg"></i><span class="text-[9px] font-black uppercase tracking-tighter">記帳</span>
            </button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-circle-info text-lg"></i><span class="text-[9px] font-black uppercase tracking-tighter">資訊</span>
            </button>
        </nav>

        <!-- 記帳新增按鈕 -->
        <button id="fab-budget" onclick="openExpenseModal()" class="hidden fixed bottom-32 right-8 w-14 h-14 bg-cream-accent text-white rounded-full shadow-2xl items-center justify-center text-xl z-[90] active:scale-90 transition">
            <i class="fa-solid fa-plus"></i>
        </button>

        <!-- 記帳 Modal, 分帳 Modal (保留原邏輯) -->
        <div id="expense-modal" class="fixed inset-0 z-[200] hidden bg-black/40 backdrop-blur-sm flex items-end">
            <div class="w-full bg-white rounded-t-[3rem] p-8 animate-[slideUp_0.3s]">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="exp-modal-title" class="text-xl font-black italic">新增記帳</h3>
                    <button onclick="closeExpenseModal()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-400">✕</button>
                </div>
                <div class="space-y-5 overflow-y-auto max-h-[75vh] pb-10 no-scrollbar">
                    <input type="hidden" id="edit-exp-id">
                    <input id="exp-item" type="text" placeholder="項目名稱" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm font-bold">
                    <input id="exp-date" type="date" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm font-bold font-mono">
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 mb-2 block uppercase tracking-widest">付款人</label>
                        <div class="grid grid-cols-4 gap-2">
                            <button onclick="setField('payer', '小慌')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold">小慌</button>
                            <button onclick="setField('payer', '昱凱')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold">昱凱</button>
                            <button onclick="setField('payer', '小安')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold">小安</button>
                            <button onclick="setField('payer', '文哥')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold active">文哥</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 mb-2 block uppercase tracking-widest">付款方式</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setField('payment', '信用卡')" class="payment-btn seg-btn py-3 rounded-xl text-[10px] font-bold">信用卡</button>
                            <button onclick="setField('payment', '現金')" class="payment-btn seg-btn py-3 rounded-xl text-[10px] font-bold active">現金</button>
                            <button onclick="setField('payment', '行動支付')" class="payment-btn seg-btn py-3 rounded-xl text-[10px] font-bold">行動支付</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 mb-2 block uppercase tracking-widest">退稅狀態</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setField('tax', '無')" class="tax-btn seg-btn py-3 rounded-xl text-[10px] font-bold active">無</button>
                            <button onclick="setField('tax', '未退稅')" class="tax-btn seg-btn py-3 rounded-xl text-[10px] font-bold">未退稅</button>
                            <button onclick="setField('tax', '已退稅')" class="tax-btn seg-btn py-3 rounded-xl text-[10px] font-bold">已退稅</button>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <select id="exp-currency" class="w-1/3 bg-gray-50 p-4 rounded-2xl text-[10px] font-black border-none outline-none"><option value="KRW">KRW(₩)</option><option value="TWD">TWD($)</option></select>
                        <input id="exp-amount" type="number" placeholder="金額" class="flex-1 bg-gray-50 p-4 rounded-2xl outline-none text-base font-black italic">
                    </div>
                    <div class="flex justify-between px-2 font-mono text-[10px] text-gray-400">
                        <span>匯率: <input id="exp-rate" type="number" value="0.024" step="0.001" class="w-10 bg-transparent border-b outline-none text-cream-accent font-bold"></span>
                        <span id="exp-twd-hint" class="font-black text-cream-accent uppercase tracking-tighter">台幣: NT$ 0</span>
                    </div>
                    <button onclick="saveExpense()" class="w-full bg-cream-accent text-white py-5 rounded-[2rem] font-black shadow-lg tracking-widest transition">確認儲存</button>
                </div>
            </div>
        </div>

        <div id="settlement-modal" class="fixed inset-0 z-[250] hidden bg-black/40 backdrop-blur-sm flex items-center justify-center p-6 text-center">
            <div class="w-full max-w-[350px] bg-white rounded-[2.5rem] p-8">
                <h3 class="text-lg font-black italic mb-6">分帳統計</h3>
                <div id="settlement-content" class="space-y-3 max-h-[300px] overflow-y-auto no-scrollbar"></div>
                <button onclick="toggleSettlement()" class="w-full mt-8 bg-cream-accent text-white py-4 rounded-2xl font-bold text-sm tracking-widest uppercase italic">Close</button>
            </div>
        </div>

    </div>

    <script>
        // --- 核心資料 ---
        let state = JSON.parse(localStorage.getItem('korea_2026_v7_itins')) || {
            title: "🇰🇷 韓國之旅 2026", budget: 50000, currentDay: 1,
            itin: { 
                1: [], 2: [], 3: [], 4: [], 5: [], 6: [], 7: [] 
            },
            todoGroups: [{ id: Date.now(), title: "母標題: 必備清單", items: ["護照", "網卡"] }],
            expenses: [], customInfo: []
        };

        const dayArr = [
            { d: "7/5", w: "SUN", n: "Day 1" }, { d: "7/6", w: "MON", n: "Day 2" }, { d: "7/7", w: "TUE", n: "Day 3" },
            { d: "7/8", w: "WED", n: "Day 4" }, { d: "7/9", w: "THU", n: "Day 5" }, { d: "7/10", w: "FRI", n: "Day 6" }, { d: "7/11", w: "SAT", n: "Day 7" }
        ];

        let curPayer = "文哥", curPayment = "現金", curTax = "無";

        window.onload = () => {
            renderAll();
            document.getElementById('exp-amount').oninput = calcHint;
            document.getElementById('exp-rate').oninput = calcHint;
        };

        function saveState() {
            state.title = document.getElementById('trip-title').innerText;
            state.budget = parseFloat(document.getElementById('budget-val').innerText) || 0;
            localStorage.setItem('korea_2026_v7_itins', JSON.stringify(state));
            updateSummary();
        }

        function renderAll() {
            renderDayNav(); renderItin(); renderTodos(); renderExpenses('all'); renderInfo(); updateSummary();
        }

        // --- 行程功能 (排序/選取器/巢狀清單) ---
        function renderDayNav() {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            dayArr.forEach((d, i) => {
                const num = i + 1;
                const btn = document.createElement('button');
                btn.className = `day-btn flex-none rounded-2xl flex flex-col items-center justify-center shadow-sm transition-all ${state.currentDay == num ? 'active' : 'bg-white text-cream-sub'}`;
                btn.onclick = () => { state.currentDay = num; renderAll(); };
                btn.innerHTML = `<span class="text-[9px] font-black opacity-40 mb-1 uppercase">${d.n}</span><span class="text-[10px] font-bold">${d.w}</span><span class="text-base font-black italic tracking-tighter">${d.d}</span>`;
                container.appendChild(btn);
            });
        }

        function getCatColor(type) {
            const colors = {
                '景點': 'bg-cat-att text-white',
                '購物': 'bg-cat-shp text-[#8B735B]',
                '餐廳': 'bg-cat-res text-cream-accent',
                '咖啡廳': 'bg-cat-caf text-[#8B7E74]',
                '餐酒館': 'bg-cat-bis text-white font-black',
                '換錢站': 'bg-cat-mon text-white font-black',
                '其他': 'bg-cat-oth text-gray-500'
            };
            return colors[type] || 'bg-white text-gray-400';
        }

        function renderItin() {
            const list = document.getElementById('itinerary-list'); list.innerHTML = "";
            const items = state.itin[state.currentDay] || [];
            
            items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "relative pl-10 mb-8";
                const catClass = getCatColor(item.type);
                
                div.innerHTML = `
                    <div class="absolute left-[13px] top-1 w-4 h-4 rounded-full bg-cream-accent border-4 border-white shadow z-10"></div>
                    <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-cream-primary/10 relative">
                        <!-- 右上控制 -->
                        <div class="absolute top-4 right-4 flex space-x-2 text-gray-300">
                            <button onclick="moveItin(${idx},-1)"><i class="fa-solid fa-chevron-up"></i></button>
                            <button onclick="moveItin(${idx},1)"><i class="fa-solid fa-chevron-down"></i></button>
                            <button onclick="delItin(${idx})" class="hover:text-red-400"><i class="fa-solid fa-xmark ml-2"></i></button>
                        </div>

                        <!-- 時間與分類 -->
                        <div class="flex justify-between mb-3 pr-14">
                            <input type="time" value="${item.time}" onchange="editItin(${idx},'time',this.value)" class="bg-transparent text-xs font-black text-cream-accent italic outline-none font-mono">
                            <select onchange="editItin(${idx},'type',this.value)" class="text-[9px] px-2 py-1 rounded-lg font-bold uppercase outline-none ${catClass}">
                                <option value="景點" ${item.type==='景點'?'selected':''}>景點</option>
                                <option value="購物" ${item.type==='購物'?'selected':''}>購物</option>
                                <option value="餐廳" ${item.type==='餐廳'?'selected':''}>餐廳</option>
                                <option value="咖啡廳" ${item.type==='咖啡廳'?'selected':''}>咖啡廳</option>
                                <option value="餐酒館" ${item.type==='餐酒館'?'selected':''}>餐酒館</option>
                                <option value="換錢站" ${item.type==='換錢站'?'selected':''}>換錢站</option>
                                <option value="其他" ${item.type==='其他'?'selected':''}>其他</option>
                            </select>
                        </div>

                        <!-- 地標名稱 -->
                        <h3 contenteditable="true" onblur="editItin(${idx},'title',this.innerText)" class="editable font-black text-base mb-3 italic tracking-tight uppercase">${item.title}</h3>
                        
                        <!-- 🧾 行程清單區塊 -->
                        <div class="bg-cream-bg/40 rounded-2xl p-3 mb-3">
                            <p class="text-[9px] font-black text-cream-accent uppercase tracking-widest mb-2 flex items-center">
                                <i class="fa-solid fa-receipt mr-1"></i> 行程詳細清單
                            </p>
                            <div id="itin-check-container-${idx}" class="space-y-3">
                                ${renderItinChecklists(idx, item.lists)}
                            </div>
                            <button onclick="addItinMother(${idx})" class="mt-3 text-[8px] font-black text-gray-400 uppercase tracking-tighter">+ 新增母項目</button>
                        </div>

                        <!-- 備註 -->
                        <p class="text-[10px] text-gray-400 font-bold mb-1 uppercase tracking-widest italic opacity-60">Notes</p>
                        <div contenteditable="true" onblur="editItin(${idx},'note',this.innerText)" class="editable text-[11px] text-gray-500 leading-relaxed min-h-[20px] mb-4">${item.note}</div>

                        <!-- 導航按鈕 -->
                        <div class="grid grid-cols-2 gap-2 border-t border-cream-primary/10 pt-3">
                            <button onclick="openM('google', '${item.title}')" class="py-2.5 bg-gray-50 rounded-xl text-[10px] font-black italic tracking-widest uppercase">Google</button>
                            <button onclick="openM('naver', '${item.title}')" class="py-2.5 bg-green-50 rounded-xl text-[10px] font-black text-green-700 italic tracking-widest uppercase">Naver</button>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // 行程巢狀清單渲染
        function renderItinChecklists(itinIdx, lists) {
            if (!lists) return "";
            return lists.map((group, gIdx) => `
                <div class="border-l-2 border-cream-primary/30 pl-3 relative">
                    <div class="flex justify-between items-center mb-1">
                        <span contenteditable="true" onblur="editItinListGroup(${itinIdx},${gIdx},this.innerText)" class="editable text-[11px] font-black text-cream-accent italic tracking-tight">${group.title}</span>
                        <div class="flex space-x-1 opacity-40 text-[7px]">
                            <button onclick="moveItinGroup(${itinIdx},${gIdx},-1)"><i class="fa-solid fa-chevron-up"></i></button>
                            <button onclick="moveItinGroup(${itinIdx},${gIdx},1)"><i class="fa-solid fa-chevron-down"></i></button>
                            <button onclick="delItinGroup(${itinIdx},${gIdx})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="space-y-1">
                        ${group.items.map((sub, sIdx) => `
                            <div class="flex items-center justify-between group">
                                <div class="flex items-center space-x-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-cream-primary/50"></div>
                                    <span contenteditable="true" onblur="editItinListItem(${itinIdx},${gIdx},${sIdx},this.innerText)" class="editable text-[10px] font-bold text-gray-500">${sub}</span>
                                </div>
                                <div class="flex space-x-1 opacity-0 group-hover:opacity-100 text-[6px]">
                                    <button onclick="moveItinSub(${itinIdx},${gIdx},${sIdx},-1)"><i class="fa-solid fa-chevron-up"></i></button>
                                    <button onclick="moveItinSub(${itinIdx},${gIdx},${sIdx},1)"><i class="fa-solid fa-chevron-down"></i></button>
                                    <button onclick="delItinSub(${itinIdx},${gIdx},${sIdx})"><i class="fa-solid fa-xmark text-red-300"></i></button>
                                </div>
                            </div>
                        `).join('')}
                        <button onclick="addItinSub(${itinIdx},${gIdx})" class="text-[8px] font-bold text-gray-300 mt-1 italic">+ 新增代買項目</button>
                    </div>
                </div>
            `).join('');
        }

        function moveItin(idx, dir) {
            const arr = state.itin[state.currentDay]; const target = idx + dir;
