<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 2026 V11.1 VISUAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .bg-accent { background-color: #4A342E; }
        .text-accent { color: #4A342E; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(74, 52, 46, 0.3); }
        
        #detail-modal, #zoom-modal, #expense-modal { position: fixed; inset: 0; z-index: 500; background: #FFFFFF; display: none; overflow-y: auto; }
        #detail-modal.active, #zoom-modal.active, #expense-modal.active { display: block; }
        #expense-modal { background: rgba(0,0,0,0.5); align-items: flex-end; }
        #expense-modal.active { display: flex; }
        
        .active-nav-btn { color: #4A342E !important; opacity: 1 !important; }
        .itin-img { width: 100%; height: 180px; object-fit: cover; border-radius: 1.5rem; margin-top: 12px; border: 1px solid #eee; }
        .sortable-ghost { opacity: 0.2; background: #E8DCCF !important; border: 2px dashed #4A342E !important; }
        
        /* 記帳組件 */
        .seg-btn { background-color: #FFFFFF; color: #8B8B8B; border: 1px solid #F3F0ED; font-size: 10px; font-weight: bold; padding: 8px 0; border-radius: 12px; transition: 0.2s; }
        .seg-btn.active { background-color: #4A342E; color: #FFFFFF; border-color: #4A342E; }
    </style>
</head>
<body class="flex justify-center">

    <div id="zoom-modal" onclick="this.classList.remove('active')" class="flex items-center justify-center p-4 bg-black/95 z-[1000]">
        <img id="zoom-img" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl">
    </div>

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-[#F8F5F2] shadow-inner">
        
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-[#E8DCCF] flex justify-between items-center">
            <h1 class="text-lg font-black italic tracking-tighter text-accent uppercase">KOREA 2026</h1>
            <div class="flex items-center space-x-1">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-black text-gray-400 uppercase">Synced</span>
            </div>
        </header>

        <!-- [分頁 1] 行程 -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <div id="day-selector" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 pb-2"></div>
            <div id="itinerary-list" class="space-y-4 min-h-[100px]"></div>
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-[#E8DCCF] rounded-[2rem] text-accent font-bold">+ 新增行程項目</button>
        </section>

        <!-- [分頁 2] 待辦 -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic text-accent uppercase">Todo List</h2>
            <div id="todo-groups" class="space-y-6"></div>
            <button onclick="addTodoGroup()" class="mt-6 w-full py-4 bg-white border border-gray-100 rounded-3xl text-gray-400 font-bold">+ 新增分類標題</button>
        </section>

        <!-- [分頁 3] 記帳 -->
        <section id="tab-budget" class="tab-content px-6 pt-8 text-center">
            <div class="bg-white p-5 rounded-3xl shadow-sm border mb-4 text-left text-accent">
                <div class="flex justify-between text-[10px] font-bold">
                    <span>預算進度 (NT$ <span id="budget-val-display">50000</span>)</span>
                    <span>剩餘: NT$ <span id="budget-left" class="font-mono">0</span></span>
                </div>
                <div class="w-full bg-gray-100 h-2 mt-2 rounded-full overflow-hidden"><div id="budget-bar" class="bg-accent h-full w-0 transition-all duration-500"></div></div>
            </div>
            <div class="bg-accent text-white p-8 rounded-[2.5rem] mb-6 relative shadow-lg">
                <p class="text-[10px] opacity-60 font-bold mb-1 uppercase tracking-widest">總支出折合 (TWD)</p>
                <h3 id="total-spent" class="text-4xl font-black font-mono italic">NT$ 0</h3>
                <button onclick="toggleSettlement()" class="mt-4 bg-white/20 px-4 py-2 rounded-full text-xs italic border border-white/30">個人代墊統計</button>
            </div>
            <div id="expense-list" class="space-y-4 text-left"></div>
        </section>

        <!-- [分頁 4] 資訊 -->
        <section id="tab-info" class="tab-content px-6 pt-8 pb-10">
            <h2 class="text-xs font-black mb-3 text-accent uppercase tracking-widest">1. 住宿地址</h2>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm mb-8 border border-[#E8DCCF]/40">
                <h3 id="hotel-name" contenteditable="true" onblur="window.state.hotel.name=this.innerText; window.saveToCloud()" class="font-black text-xl text-accent italic mb-4">YL民宿</h3>
                <div class="space-y-4">
                    <div>
                        <p class="text-[10px] font-black text-gray-400 uppercase">英文地址</p>
                        <div class="flex items-center"><p id="hotel-en" contenteditable="true" onblur="window.state.hotel.en=this.innerText; window.saveToCloud()" class="text-xs font-bold text-gray-600 flex-1">Seoul Jung-gu Sogong-ro 6na-gil 11</p><button onclick="copyRawTxt(document.getElementById('hotel-en').innerText)" class="p-2 text-gray-300"><i class="fa-solid fa-copy"></i></button></div>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-gray-400 uppercase">韓文地址</p>
                        <div class="flex items-center"><p id="hotel-kr" contenteditable="true" onblur="window.state.hotel.kr=this.innerText; window.saveToCloud()" class="text-xs font-bold text-gray-600 flex-1">서울특별시 중구 소공로6나길 11 와이엘 게스트하우스</p><button onclick="copyRawTxt(document.getElementById('hotel-kr').innerText)" class="p-2 text-gray-300"><i class="fa-solid fa-copy"></i></button></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-6">
                    <button onclick="navPrecise('google', window.state.hotel.kr)" class="bg-gray-50 py-3 rounded-xl text-[10px] font-black">GOOGLE MAP</button>
                    <button onclick="navPrecise('naver', window.state.hotel.kr)" class="bg-green-50 py-3 rounded-xl text-[10px] font-black text-green-700 font-black">NAVER MAP</button>
                </div>
            </div>
            <div class="flex justify-between items-center mb-4"><h2 class="text-xs font-black text-accent uppercase tracking-widest">2. 其他條碼資訊</h2><button onclick="addCustomInfo()" class="bg-accent text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-plus"></i></button></div>
            <div id="custom-info-list" class="space-y-4"></div>
        </section>

        <!-- 底部導覽 -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] bg-white/90 backdrop-blur-2xl border h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around z-[100]">
            <button onclick="switchTab('schedule')" class="flex flex-col items-center text-gray-300" id="nav-schedule"><i class="fa-solid fa-compass"></i><span class="text-[8px] font-bold">行程</span></button>
            <button onclick="switchTab('todo')" class="flex flex-col items-center text-gray-300" id="nav-todo"><i class="fa-solid fa-list-check"></i><span class="text-[8px] font-bold">待辦</span></button>
            <button onclick="switchTab('budget')" class="flex flex-col items-center text-gray-300" id="nav-budget"><i class="fa-solid fa-sack-dollar"></i><span class="text-[8px] font-bold">記帳</span></button>
            <button onclick="switchTab('info')" class="flex flex-col items-center text-gray-300" id="nav-info"><i class="fa-solid fa-qrcode"></i><span class="text-[8px] font-bold">資訊</span></button>
        </nav>

        <button id="fab-budget" onclick="openExpenseModal()" class="hidden fixed bottom-32 right-8 w-14 h-14 bg-accent text-white rounded-full shadow-2xl items-center justify-center text-xl z-[90]"><i class="fa-solid fa-plus"></i></button>
    </div>

    <!-- 行程詳細頁 Modal -->
    <div id="detail-modal" class="no-scrollbar">
        <div class="sticky top-0 z-[510] bg-white/90 backdrop-blur-md px-6 py-5 border-b flex justify-between items-center">
            <button onclick="closeDetailModal()" class="text-gray-400 font-bold text-xs">✕ CLOSE</button>
            <h3 class="text-xs font-black text-accent italic uppercase tracking-widest">Detail</h3>
            <button onclick="saveCurrentDetail()" class="px-6 py-2 bg-accent text-white rounded-full text-xs font-black shadow-md">SAVE</button>
        </div>
        <div class="p-8 pb-40 space-y-6">
            <input type="hidden" id="detail-idx">
            <div id="detail-img-preview" class="w-full h-48 bg-gray-50 rounded-[2.5rem] flex items-center justify-center border-2 border-dashed border-gray-200 relative overflow-hidden">
                <span class="text-gray-300 text-xs font-bold italic">上傳地標相片</span>
                <input type="file" onchange="handleImageUpload(this, 'itin')" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                <img id="detail-img-src" src="" class="hidden w-full h-full object-cover">
            </div>

            <input id="detail-title" type="text" class="w-full text-3xl font-black outline-none italic tracking-tighter text-accent" placeholder="地點名稱">
            
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1">中文地址</label>
                    <div class="flex items-center mt-1"><input id="detail-addr-cn" type="text" class="flex-1 bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent" placeholder="輸入中文地址..."><button onclick="copyRawTxt(document.getElementById('detail-addr-cn').value)" class="ml-2 p-4 bg-gray-100 rounded-2xl text-gray-400"><i class="fa-solid fa-copy"></i></button></div>
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1">韓文地址 (導航精準)</label>
                    <div class="flex items-center mt-1"><input id="detail-addr-kr" type="text" class="flex-1 bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent" placeholder="輸入韓文地址..."><button onclick="copyRawTxt(document.getElementById('detail-addr-kr').value)" class="ml-2 p-4 bg-gray-100 rounded-2xl text-gray-400"><i class="fa-solid fa-copy"></i></button></div>
                </div>
            </div>

            <div class="flex items-center space-x-3">
                <input id="detail-time" type="time" class="bg-gray-50 px-4 py-2 rounded-xl font-mono outline-none border border-transparent">
                <select id="detail-type" class="bg-white border rounded-xl px-4 py-2 text-xs font-bold italic">
                    <option value="景點">🎡 景點</option><option value="餐廳">🍽️ 餐廳</option><option value="購物">🛍️ 購物</option><option value="住宿">🏨 住宿</option><option value="交通">✈️ 交通</option><option value="其他">✨ 其他</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="navPrecise('google', document.getElementById('detail-addr-kr').value || document.getElementById('detail-title').value)" class="py-4 bg-gray-50 rounded-2xl text-[10px] font-black uppercase">Google Map</button>
                <button onclick="navPrecise('naver', document.getElementById('detail-addr-kr').value || document.getElementById('detail-title').value)" class="py-4 bg-green-50 rounded-2xl text-[10px] font-black text-green-700 uppercase">Naver Map</button>
            </div>

            <textarea id="detail-desc" rows="4" class="w-full bg-gray-50 p-5 rounded-[2rem] outline-none text-sm leading-re
