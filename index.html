<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 Pro Max 最終版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-bg': '#F8F5F2',
                        'cream-card': '#FFFFFF',
                        'cream-accent': '#4A342E',
                        'cream-primary': '#E8DCCF',
                        'cat-att': '#D9B99B', 'cat-res': '#E8DCCF', 'cat-shp': '#F3E9E0',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .editable:focus { outline: 2px dashed #4A342E; background: rgba(74, 52, 46, 0.05); border-radius: 4px; color: #2C2C2C !important; }
        .active-nav-btn { color: #4A342E !important; }
        .day-btn { width: 75px; height: 75px; flex-shrink: 0; transition: all 0.2s; border-radius: 20px; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); }
        .timeline-line::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #E8DCCF; opacity: 0.5; }
        .seg-btn { background-color: #FFFFFF; color: #8B8B8B; border: 1px solid #F3F0ED; font-size: 10px; font-weight: bold; padding: 10px 0; border-radius: 12px; }
        .seg-btn.active { background-color: #4A342E; color: #FFFFFF; border-color: #4A342E; }
        #detail-modal, #calc-modal { position: fixed; inset: 0; z-index: 500; background: #FFFFFF; display: none; overflow-y: auto; }
        #detail-modal.active, #calc-modal.active { display: block; animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .placeholder-hint { color: #D1D5DB !important; }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-cream-bg shadow-inner text-gray-800">
        
        <!-- Header -->
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-cream-primary/20 flex justify-between items-center">
            <h1 id="trip-title" contenteditable="true" class="editable text-lg font-black tracking-tight italic"></h1>
            <div class="w-8 h-8 rounded-full bg-cream-accent text-white flex items-center justify-center text-[10px] font-bold font-mono">2026</div>
        </header>

        <!-- [分頁 1] 行程 -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <div id="day-selector" class="flex space-x-2 overflow-x-auto no-scrollbar mb-8 pb-4"></div>
            <div class="relative timeline-line ml-1" id="itinerary-list"></div>
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-cream-accent font-bold text-sm tracking-widest">+ 新增行程項目</button>
        </section>

        <!-- [分頁 2] 採購 -->
        <section id="tab-wishlist" class="tab-content px-6 pt-8">
            <div class="flex justify-between items-center mb-6 text-gray-800">
                <h2 class="text-2xl font-black italic tracking-tight flex items-center"><i class="fa-solid fa-basket-shopping mr-2 text-cream-accent"></i>待採購清單</h2>
                <button onclick="addWishGroup()" class="bg-cream-accent text-white px-4 py-2 rounded-full text-[10px] font-black uppercase shadow-lg">+ Add Shop</button>
            </div>
            <div id="wishlist-module-area" class="space-y-6"></div>
        </section>

        <!-- [分頁 3] 待辦 -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black italic tracking-tight mb-6 text-gray-800 flex items-center"><i class="fa-solid fa-list-check mr-2 text-cream-accent"></i>行前待辦事項</h2>
            <div id="todo-groups" class="space-y-6"></div>
            <button onclick="addTodoGroup()" class="mt-6 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-gray-400 font-bold text-sm">+ 新增分類母項目</button>
        </section>

        <!-- [分頁 4] 記帳 -->
        <section id="tab-budget" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic text-cream-accent flex items-center"><i class="fa-solid fa-sack-dollar mr-2"></i>旅遊記帳</h2>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-6">
                <div class="flex justify-between text-[11px] font-bold text-gray-400 mb-2 uppercase">
                    <span>預算進度 (NT$ <span contenteditable="true" id="budget-val" class="editable font-mono font-black"></span>)</span>
                    <span>剩餘: <span id="budget-left" class="text-cream-accent font-mono font-black">0</span></span>
                </div>
                <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden"><div id="budget-bar" class="bg-cream-accent h-full transition-all duration-700"></div></div>
            </div>
            <div class="bg-cream-accent text-white p-8 rounded-[2.5rem] shadow-lg mb-6 relative overflow-hidden text-center">
                <p class="text-[10px] opacity-70 font-bold mb-1 tracking-widest uppercase">總支出 (TWD)</p>
                <h3 id="total-spent" class="text-4xl font-black italic tracking-tighter font-mono underline decoration-white/20">NT$ 0</h3>
                <button onclick="toggleSettlement()" class="mt-4 bg-white/20 px-4 py-2 rounded-full text-[10px] font-bold border border-white/30 italic">查看分帳統計</button>
                <i class="fa-solid fa-sack-dollar absolute -right-4 -bottom-4 text-white/10 text-9xl"></i>
            </div>
            <div id="expense-date-filter" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 px-1"></div>
            <div id="expense-list" class="space-y-4"></div>
        </section>

        <!-- [分頁 5] 資訊 -->
        <section id="tab-info" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic text-cream-accent flex items-center"><i class="fa-solid fa-circle-info mr-2"></i>資訊</h2>
            <div id="info-static-area" class="space-y-4 mb-8"></div>
            <div id="custom-info-list" class="space-y-4"></div>
            <button onclick="addCustomInfo()" class="mt-4 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-gray-400 font-bold text-sm">+ 新增資訊</button>
        </section>

        <!-- 底部導覽 -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] bg-white/80 backdrop-blur-2xl border border-white/50 h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-2 z-[100]">
            <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-btn flex flex-col items-center space-y-1 active-nav-btn text-gray-300 transition-all"><i class="fa-solid fa-compass text-lg"></i><span class="text-[8px] font-black uppercase">行程</span></button>
            <button onclick="switchTab('wishlist')" id="nav-wishlist" class="nav-btn flex flex-col items-center space-y-1 text-gray-300 transition-all"><i class="fa-solid fa-basket-shopping text-lg"></i><span class="text-[8px] font-black uppercase">採購</span></button>
            <button onclick="switchTab('todo')" id="nav-todo" class="nav-btn flex flex-col items-center space-y-1 text-gray-300 transition-all"><i class="fa-solid fa-list-check text-lg"></i><span class="text-[8px] font-black uppercase">待辦</span></button>
            <button onclick="switchTab('budget')" id="nav-budget" class="nav-btn flex flex-col items-center space-y-1 text-gray-300 transition-all"><i class="fa-solid fa-sack-dollar text-lg"></i><span class="text-[8px] font-black uppercase tracking-tighter">記帳</span></button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-btn flex flex-col items-center space-y-1 text-gray-300 transition-all"><i class="fa-solid fa-circle-info text-lg"></i><span class="text-[8px] font-black uppercase">資訊</span></button>
        </nav>

        <button id="fab-calculator" onclick="openCalcModal()" class="hidden fixed bottom-48 right-8 w-14 h-14 bg-white border border-gray-100 text-cream-accent rounded-full shadow-2xl items-center justify-center text-xl z-[90] active:scale-90 transition"><i class="fa-solid fa-calculator"></i></button>
        <button id="fab-budget" onclick="openExpenseModal()" class="hidden fixed bottom-32 right-8 w-14 h-14 bg-cream-accent text-white rounded-full shadow-2xl items-center justify-center text-xl z-[90] active:scale-90 transition"><i class="fa-solid fa-plus"></i></button>
    </div>

    <!-- [詳細頁 Detail Modal] -->
    <div id="detail-modal" class="no-scrollbar">
        <div class="sticky top-0 z-[510] bg-white/95 backdrop-blur-md px-6 py-5 border-b border-gray-100 flex justify-between items-center">
            <button onclick="closeDetailModal()" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full text-gray-400">✕</button>
            <h3 class="text-[10px] font-black italic tracking-widest text-cream-accent uppercase">Detail View</h3>
            <button onclick="saveCurrentDetail()" class="px-6 py-2 bg-cream-accent text-white rounded-full text-xs font-black shadow-lg">SAVE</button>
        </div>
        <div class="p-8 pb-40 space-y-8">
            <input type="hidden" id="detail-idx">
            <div class="space-y-4">
                <input id="detail-title" type="text" class="w-full text-3xl font-black border-none outline-none italic tracking-tighter text-gray-800" placeholder="景點名稱">
                
                <!-- 時間放在行程下面 -->
                <div class="flex items-center space-x-2 bg-cream-bg/50 px-4 py-2 rounded-xl w-fit">
                    <i class="fa-regular fa-clock text-cream-accent"></i>
                    <input id="detail-time" type="time" class="bg-transparent border-none outline-none font-mono font-black italic">
                </div>

                <!-- 地點照片上傳 -->
                <div class="bg-gray-50 p-4 rounded-3xl flex items-center space-x-4">
                    <div id="detail-img-preview" class="w-20 h-20 bg-white rounded-2xl border border-gray-100 flex items-center justify-center overflow-hidden">
                        <i class="fa-solid fa-camera text-gray-200"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Location Photo</p>
                        <input type="file" accept="image/*" onchange="uploadLocationImage(event)" class="text-[10px] font-bold text-cream-accent">
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4 bg-gray-50/50 p-6 rounded-[2.5rem]">
                    <select id="detail-category" class="bg-white p-4 rounded-xl border-none outline-none text-xs font-bold italic appearance-none">
                        <option value="景點">景點</option><option value="購物">購物</option><option value="餐廳">餐廳</option><option value="住宿">住宿</option><option value="其他">其他</option>
                    </select>
                    <div class="flex items-center justify-between"><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">中文地址 (Google Maps)</label><button onclick="copyToClipboard(document.getElementById('detail-loc-cn').value)"><i class="fa-regular fa-copy text-gray-300 text-xs"></i></button></div>
                    <input id="detail-loc-cn" type="text" class="bg-white p-3 rounded-xl border-none outline-none text-xs font-bold" placeholder="輸入中文地址">
                    <div class="flex items-center justify-between"><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">韓文地址 (NAVER Maps)</label><button onclick="copyToClipboard(document.getElementById('detail-loc-kr').value)"><i class="fa-regular fa-copy text-gray-300 text-xs"></i></button></div>
                    <input id="detail-loc-kr" type="text" class="bg-white p-3 rounded-xl border-none outline-none text-xs font-bold" placeholder="輸入韓文地址">
                    <div class="grid grid-cols-2 gap-3 mt-2">
                        <button onclick="openM('google', document.getElementById('detail-loc-cn').value || document.getElementById('detail-title').value)" class="py-3 bg-white border border-gray-100 rounded-xl text-[10px] font-black uppercase italic">Google Map</button>
                        <button onclick="openM('naver', document.getElementById('detail-loc-kr').value || document.getElementById('detail-title').value)" class="py-3 bg-green-50 text-green-700 border border-green-100 rounded-xl text-[10px] font-black uppercase italic">Naver Map</button>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div><label class="text-[11px] font-black text-gray-800 uppercase mb-2 block tracking-tight">行程詳細描述</label><textarea id="detail-desc" rows="3" class="w-full bg-gray-50 p-5 rounded-[2rem] outline-none text-sm font-medium leading-relaxed" placeholder="行程詳細內容..."></textarea></div>
                <div><label class="text-[11px] font-black text-gray-800 uppercase mb-2 block tracking-tight">備註</label><textarea id="detail-notes" rows="2" class="w-full bg-orange-50/50 p-5 rounded-[2rem] outline-none text-sm font-medium italic" placeholder="輸入重要提醒..."></textarea></div>
            </div>
            
            <!-- Shopping List in Detail -->
            <div id="detail-shopping-area" class="pt-8 border-t border-gray-100">
                <div class="flex justify-between items-end mb-6">
                    <div><h4 class="text-xl font-black italic tracking-tighter">Shopping List 🧾</h4><p id="detail-shop-stat" class="text-[9px] font-black text-gray-400 uppercase">0 Items Bought (0%)</p></div>
                    <button onclick="addShopGroupDetail()" class="bg-cream-accent text-white px-4 py-2 rounded-full text-[10px] font-black shadow-lg">+ Add Shop</button>
                </div>
                <div id="detail-shopping-list-area" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <!-- [匯率計算機 Modal] -->
    <div id="calc-modal" class="no-scrollbar">
        <div class="sticky top-0 z-[510] bg-white/95 backdrop-blur-md px-6 py-5 border-b border-gray-100 flex justify-between items-center"><button onclick="closeCalcModal()" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full text-gray-400">✕</button><h3 class="text-[10px] font-black italic tracking-widest text-cream-accent uppercase">Converter</h3><div class="w-10"></div></div>
        <div class="p-8 space-y-10">
            <div class="bg-cream-bg p-4 rounded-2xl flex justify-between items-center"><span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Exchange Rate</span><div class="flex items-center space-x-2"><span class="text-[10px] font-bold">1 KRW =</span><input type="number" id="main-calc-rate" value="0.024" step="0.001" oninput="syncFromKRW()" class="w-16 bg-white border-none rounded-lg p-2 text-center text-xs font-black text-cream-accent outline-none"><span class="text-[10px] font-bold">TWD</span></div></div>
            <div class="space-y-8">
                <div><label class="text-[11px] font-black text-gray-300 uppercase tracking-widest ml-2">KRW (₩)</label><input type="number" id="main-calc-krw" oninput="syncFromKRW()" placeholder="0" class="w-full bg-gray-50 p-6 rounded-[2rem] text-4xl font-black italic outline-none tracking-tighter"></div>
                <div class="flex justify-center"><div class="w-12 h-12 bg-cream-accent rounded-full flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-right-left rotate-90"></i></div></div>
                <div><label class="text-[11px] font-black text-gray-300 uppercase tracking-widest ml-2">TWD ($)</label><input type="number" id="main-calc-twd" oninput="syncFromTWD()" placeholder="0" class="w-full bg-gray-50 p-6 rounded-[2rem] text-4xl font-black italic outline-none tracking-tighter text-cream-accent"></div>
            </div>
        </div>
    </div>

    <!-- [記帳 Modal] -->
    <div id="expense-modal" class="fixed inset-0 z-[200] hidden bg-black/40 backdrop-blur-sm flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] p-8 animate-[slideUp_0.3s] pb-12 overflow-y-auto max-h-[90vh] no-scrollbar text-gray-800">
            <div class="flex justify-between items-center mb-8"><h3 id="exp-modal-title" class="text-xl font-black italic tracking-tighter uppercase underline decoration-cream-accent/20 font-mono">Record Transaction</h3><button onclick="closeExpenseModal()" class="w-8 h-8 bg-gray-100 rounded-full text-gray-400 text-xs font-black">✕</button></div>
            <div class="space-y-6">
                <input type="hidden" id="edit-exp-id">
                <input id="exp-item" type="text" placeholder="項目名稱" class="w-full bg-gray-50 p-5 rounded-2xl outline-none text-sm font-bold border-none">
                <input id="exp-date" type="date" class="w-full bg-gray-50 p-5 rounded-2xl outline-none text-sm font-bold border-none font-mono">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block font-mono">Payment</label><select id="exp-payment" class="w-full bg-gray-50 p-4 rounded-xl outline-none text-xs font-bold border-none italic"><option value="現金">現金</option><option value="旅遊金">旅遊金</option><option value="信用卡">信用卡</option><option value="Line Pay">Line Pay</option><option value="Wowpass">Wowpass</option><option value="其他">其他</option></select></div>
                    <div><label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block font-mono">Tax</label><select id="exp-tax" class="w-full bg-gray-50 p-4 rounded-xl outline-none text-xs font-bold border-none italic"><option value="無">無</option><option value="未退稅">未退稅</option><option value="已退稅">已退稅</option></select></div>
                </div>
                <div><label class="text-[10px] font-black text-gray-400 uppercase mb-3 block font-mono">Paid By</label><div class="grid grid-cols-3 gap-2" id="payer-btns"></div></div>
                <div><label class="text-[10px] font-black text-gray-400 uppercase mb-3 block font-mono">Category</label><div class="grid grid-cols-4 gap-2" id="cat-btns"></div></div>
                <div class="flex items-center space-x-2"><select id="exp-currency" onchange="calcHint()" class="w-1/3 bg-gray-50 p-5 rounded-2xl text-[10px] font-black border-none outline-none font-mono"><option value="KRW">KRW(₩)</option><option value="TWD">TWD($)</option></select><input id="exp-amount" type="number" placeholder="0" class="flex-1 bg-gray-50 p-5 rounded-2xl outline-none text-2xl font-black italic tracking-tighter font-mono"></div>
                <div class="flex justify-between px-3 text-[10px] font-black font-mono italic text-gray-400"><span>Rate: <input id="exp-rate" type="number" value="0.024" step="0.001" class="w-10 bg-transparent border-b border-gray-200 outline-none text-cream-accent"></span><span id="exp-twd-hint" class="text-cream-accent uppercase">Total: NT$ 0</span></div>
                <button onclick="saveExpense()" class="w-full bg-cream-accent text-white py-5 rounded-[2rem] font-black shadow-lg tracking-widest uppercase italic font-mono">Save Now</button>
            </div>
        </div>
    </div>

    <!-- Settlement Modal -->
    <div id="settlement-modal" class="fixed inset-0 z-[250] hidden bg-black/40 backdrop-blur-sm flex items-center justify-center p-6 text-center"><div class="w-full max-w-[350px] bg-white rounded-[2.5rem] p-8 text-gray-800"><h3 class="text-lg font-black italic mb-6 tracking-widest uppercase font-mono">Settlement</h3><div id="settlement-content" class="space-y-3 mb-6"></div><button onclick="toggleSettlement()" class="w-full bg-cream-accent text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg italic">Close</button></div></div>

    <script>
        // --- 核心資料 ---
        let state = JSON.parse(localStorage.getItem('korea_vFinal_Full')) || {
            title: "🇰🇷 韓國之旅 2026", budget: 50000, currentDay: 1,
            itin: { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] },
            todoGroups: [], expenses: [], customInfo: [], wishGroups: []
        };

        const dayArr = [{d:"7/5",w:"SUN"},{d:"7/6",w:"MON"},{d:"7/7",w:"TUE"},{d:"7/8",w:"WED"},{d:"7/9",w:"THU"},{d:"7/10",w:"FRI"},{d:"7/11",w:"SAT"}];
        const payers = ["小慌", "昱凱", "小安", "文哥", "零用金"];
        const expCats = ["吃飯", "購物", "景點費用", "其他"];
        let curPayer="文哥", curExpCat="其他";

        function setupAutoClear(el, placeholder) {
            if (!el.innerText.trim() || el.innerText.trim() === placeholder) { el.innerText = placeholder; el.classList.add('placeholder-hint'); }
            el.onfocus = () => { if (el.innerText.trim() === placeholder) { el.innerText = ""; el.classList.remove('placeholder-hint'); } };
            el.onblur = () => { if (!el.innerText.trim()) { el.innerText = placeholder; el.classList.add('placeholder-hint'); } };
        }

        function saveState() {
            state.title = document.getElementById('trip-title').innerText;
            state.budget = parseFloat(document.getElementById('budget-val').innerText) || 0;
            localStorage.setItem('korea_vFinal_Full', JSON.stringify(state));
            updateSummary();
        }

        window.onload = () => { renderAll(); setupAutoClear(document.getElementById('trip-title'), "🇰🇷 韓國之旅 2026"); setupAutoClear(document.getElementById('budget-val'), "50000"); document.getElementById('exp-amount').oninput = calcHint; document.getElementById('exp-rate').oninput = calcHint; };

        function renderAll() {
            renderDayNav(); renderItin(); renderWishlist(); renderTodos(); renderExpenses('all'); renderInfo(); updateSummary();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-300'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav-btn'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav-btn');
            document.getElementById('nav-' + tab).classList.remove('text-gray-300');
            const showFab = (tab === 'budget');
            document.getElementById('fab-budget').style.display = showFab ? 'flex' : 'none';
            document.getElementById('fab-calculator').style.display = showFab ? 'flex' : 'none';
        }

        // --- 行程功能 ---
        function renderDayNav() {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            dayArr.forEach((d, i) => {
                const btn = document.createElement('button');
                btn.className = `day-btn flex-none rounded-2xl flex flex-col items-center justify-center shadow-sm transition-all ${state.currentDay == i+1 ? 'active' : 'bg-white text-cream-sub'}`;
                btn.onclick = () => { state.currentDay = i+1; renderAll(); };

            const container=document.getElementById('custom-info-list'); container.innerHTML=""; (state.customInfo||[]).forEach((info, idx)=>{ const div=document.createElement('div'); div.className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 relative mb-4"; div.innerHTML=`<button onclick="state.customInfo.splice(${idx},1); saveState(); renderInfo();" class="absolute top-6 right-6 text-gray-200 text-xs">✕</button><h4 contenteditable="true" id="inf-t-${idx}" class="editable font-black text-sm mb-2 italic tracking-widest uppercase underline decoration-cream-accent/20 font-mono">${info.title}</h4><div contenteditable="true" id="inf-c-${idx}" class="editable text-[11px] text-gray-500 leading-relaxed font-mono font-medium">${info.content}</div>`; container.appendChild(div); setupAutoClear(div.querySelector(`#inf-t-${idx}`),"標題"); setupAutoClear(div.querySelector(`#inf-c-${idx}`),"內容"); div.querySelector(`#inf-t-${idx}`).onblur=(e)=>{info.title=tEl.innerText; saveState();}; div.querySelector(`#inf-c-${idx}`).onblur=(e)=>{info.content=cEl.innerText; saveState();}; });
        }
        function addCustomInfo() { if(!state.customInfo)state.customInfo=[]; state.customInfo.push({title:"標題",content:"內容"}); saveState(); renderInfo(); }
        function copyToClipboard(text) { if(!text) return; navigator.clipboard.writeText(text).then(()=>alert("已複製: " + text)); }
        function openM(type, loc) { if(!loc)return alert("請輸入地標名稱"); const q=encodeURIComponent(loc); window.open(type==='google'?`https://www.google.com/maps/search/?api=1&query=${q}`:`https://map.naver.com/v5/search/${q}`,'_blank'); }
    </script>
