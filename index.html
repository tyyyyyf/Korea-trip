<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 Pro Max+ V7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-bg': '#F8F5F2',
                        'cream-accent': '#4A342E',
                        'cream-primary': '#E8DCCF',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .editable:focus { outline: 2px dashed #4A342E; background: rgba(74, 52, 46, 0.05); border-radius: 4px; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); }
        #detail-modal { position: fixed; inset: 0; z-index: 500; background: #FFFFFF; display: none; overflow-y: auto; }
        #detail-modal.active { display: block; }
        
        /* 記帳按鈕樣式 */
        .seg-btn { background-color: #FFFFFF; color: #8B8B8B; border: 1px solid #F3F0ED; font-size: 10px; font-weight: bold; padding: 8px 0; border-radius: 12px; transition: all 0.2s; }
        .seg-btn.active { background-color: #4A342E; color: #FFFFFF; border-color: #4A342E; }
        
        .active-nav-btn { color: #4A342E !important; opacity: 1 !important; }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-cream-bg shadow-inner">
        
        <!-- Header -->
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-cream-primary/20">
            <h1 id="trip-title" contenteditable="true" onblur="saveState()" class="editable text-lg font-black italic">🇰🇷 韓國之旅 2026</h1>
        </header>

        <!-- [分頁 1] 行程 -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <div id="day-selector" class="flex space-x-2 overflow-x-auto no-scrollbar mb-8 pb-4"></div>
            <div class="relative ml-1 space-y-4" id="itinerary-list"></div>
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-cream-primary rounded-[2rem] text-cream-accent font-bold">+ 新增行程項目</button>
        </section>

        <!-- [分頁 2] 待辦 -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic">行前待辦事項</h2>
            <div id="todo-groups" class="space-y-6"></div>
            <button onclick="addTodoGroup()" class="mt-6 w-full py-4 bg-white border border-gray-100 rounded-3xl text-gray-400 font-bold">+ 新增分類標題</button>
        </section>

        <!-- [分頁 3] 記帳 -->
        <section id="tab-budget" class="tab-content px-6 pt-8 text-center">
            <div class="bg-white p-5 rounded-3xl shadow-sm border mb-4">
                <div class="flex justify-between text-[10px] font-bold text-gray-400 uppercase">
                    <span>預算進度 (NT$ <span contenteditable="true" id="budget-val" onblur="saveState()">50000</span>)</span>
                    <span>剩餘: NT$ <span id="budget-left" class="text-cream-accent font-mono">0</span></span>
                </div>
                <div class="w-full bg-gray-100 h-2 mt-2 rounded-full overflow-hidden">
                    <div id="budget-bar" class="bg-cream-accent h-full" style="width: 0%"></div>
                </div>
            </div>
            <div class="bg-cream-accent text-white p-8 rounded-[2.5rem] mb-6 relative overflow-hidden">
                <p class="text-[10px] opacity-60 font-bold mb-1 tracking-widest uppercase">總支出折合 (TWD)</p>
                <h3 id="total-spent" class="text-4xl font-black font-mono italic">NT$ 0</h3>
                <button onclick="toggleSettlement()" class="mt-4 bg-white/20 px-4 py-2 rounded-full text-xs italic border border-white/30">查看代墊分帳</button>
            </div>
            <div id="expense-list" class="space-y-4 text-left"></div>
        </section>

        <!-- [分頁 4] 資訊 -->
        <section id="tab-info" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic">旅遊資訊</h2>
            <div id="custom-info-list" class="space-y-4"></div>
            <button onclick="addCustomInfo()" class="mt-6 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-gray-400 font-bold">+ 新增資訊區塊</button>
        </section>

        <!-- 底部導覽 -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] bg-white/80 backdrop-blur-2xl border h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around z-[100]">
            <button onclick="switchTab('schedule')" class="flex flex-col items-center text-gray-300 active-nav-btn" id="nav-schedule"><i class="fa-solid fa-compass"></i><span class="text-[8px] font-bold">行程</span></button>
            <button onclick="switchTab('todo')" class="flex flex-col items-center text-gray-300" id="nav-todo"><i class="fa-solid fa-list-check"></i><span class="text-[8px] font-bold">待辦</span></button>
            <button onclick="switchTab('budget')" class="flex flex-col items-center text-gray-300" id="nav-budget"><i class="fa-solid fa-sack-dollar"></i><span class="text-[8px] font-bold">記帳</span></button>
            <button onclick="switchTab('info')" class="flex flex-col items-center text-gray-300" id="nav-info"><i class="fa-solid fa-circle-info"></i><span class="text-[8px] font-bold">資訊</span></button>
        </nav>

        <!-- 記帳新增浮動按鈕 -->
        <button id="fab-budget" onclick="openExpenseModal()" class="hidden fixed bottom-32 right-8 w-14 h-14 bg-cream-accent text-white rounded-full shadow-2xl items-center justify-center text-xl z-[90]">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- 行程詳細頁 Modal -->
    <div id="detail-modal" class="no-scrollbar">
        <div class="sticky top-0 z-[510] bg-white/90 backdrop-blur-md px-6 py-5 border-b flex justify-between items-center">
            <button onclick="closeDetailModal()" class="text-gray-400">✕ 關閉</button>
            <h3 class="text-xs font-black uppercase text-cream-accent italic">Itinerary Detail</h3>
            <button onclick="saveCurrentDetail()" class="px-6 py-2 bg-cream-accent text-white rounded-full text-xs font-black">SAVE</button>
        </div>
        <div class="p-8 pb-40 space-y-6">
            <input type="hidden" id="detail-idx">
            <input id="detail-title" type="text" class="w-full text-3xl font-black outline-none italic tracking-tighter" placeholder="行程名稱">
            <input id="detail-loc" type="text" class="w-full text-sm font-bold text-gray-400 outline-none italic" placeholder="📍 地標名稱用於導航">
            
            <div class="flex items-center space-x-3">
                <input id="detail-time" type="time" class="bg-gray-50 px-4 py-2 rounded-xl font-mono outline-none">
                <select id="detail-type" class="bg-white border rounded-xl px-4 py-2 text-xs font-bold italic">
                    <option value="景點">景點</option><option value="餐廳">餐廳</option><option value="購物">購物</option><option value="住宿">住宿</option><option value="交通">交通</option><option value="其他">其他</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="openM('google', document.getElementById('detail-loc').value)" class="py-4 bg-gray-50 rounded-2xl text-[10px] font-black italic">GOOGLE MAPS</button>
                <button onclick="openM('naver', document.getElementById('detail-loc').value)" class="py-4 bg-green-50 rounded-2xl text-[10px] font-black text-green-700 italic">NAVER MAP</button>
            </div>

            <textarea id="detail-desc" rows="6" class="w-full bg-gray-50 p-5 rounded-[2rem] outline-none text-sm" placeholder="行程詳細描述..."></textarea>
            <textarea id="detail-notes" rows="3" class="w-full bg-orange-50/50 p-5 rounded-[2rem] outline-none text-sm italic" placeholder="重要備註..."></textarea>
        </div>
    </div>

    <!-- 記帳 Modal -->
    <div id="expense-modal" class="fixed inset-0 z-[200] hidden bg-black/40 backdrop-blur-sm flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] p-8 pb-12 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between mb-6">
                <h3 id="exp-modal-title" class="text-xl font-black italic">新增帳目</h3>
                <button onclick="closeExpenseModal()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-400">✕</button>
            </div>
            <div class="space-y-5">
                <input type="hidden" id="edit-exp-id">
                <input id="exp-item" type="text" placeholder="支出項目 (例如：晚餐炸雞)" class="w-full bg-gray-50 p-5 rounded-2xl font-bold outline-none">
                <input id="exp-date" type="date" class="w-full bg-gray-50 p-5 rounded-2xl font-mono outline-none">
                
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block ml-2">付費者</label>
                    <div class="grid grid-cols-3 gap-2" id="payer-btns"></div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block ml-2">付費方式</label>
                    <div class="grid grid-cols-3 gap-2" id="method-btns"></div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block ml-2">消費類別</label>
                    <div class="grid grid-cols-3 gap-2" id="cat-btns"></div>
                </div>

                <div class="flex space-x-2">
                    <div class="w-1/3 relative">
                        <select id="exp-currency" onchange="calcTwdHint()" class="w-full bg-gray-50 p-5 rounded-2xl appearance-none font-bold text-center">
                            <option value="KRW">KRW ₩</option>
                            <option value="TWD">TWD $</option>
                        </select>
                        <i class="fa-solid fa-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none"></i>
                    </div>
                    <div class="flex-1 relative">
                        <input id="exp-amount" type="number" oninput="calcTwdHint()" placeholder="金額" class="w-full bg-gray-50 p-5 rounded-2xl font-black outline-none italic text-xl">
                        <span id="exp-twd-hint" class="absolute right-4 bottom-2 text-[10px] font-bold text-cream-accent italic">台幣約 NT$ 0</span>
                    </div>
                </div>

                <div class="flex items-center space-x-2 px-2">
                    <span class="text-[10px] font-bold text-gray-400">當前匯率設定:</span>
                    <input id="exp-rate-val" type="number" value="0.024" step="0.001" oninput="calcTwdHint()" class="w-16 bg-transparent border-b border-gray-200 text-center font-mono text-xs outline-none">
                </div>
                
                <button onclick="saveExpense()" class="w-full bg-cream-accent text-white py-5 rounded-[2rem] font-black tracking-widest italic shadow-lg shadow-cream-accent/20">SAVE NOW</button>
            </div>
        </div>
    </div>

    <script>
        // --- 初始化狀態 ---
        let state = JSON.parse(localStorage.getItem('korea_travel_v7')) || {
            title: "🇰🇷 韓國之旅 2026", 
            budget: 50000, 
            currentDay: 1,
            itin: { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] },
            todoGroups: [], 
            expenses: [], 
            customInfo: []
        };

        const dayList = [{d:"7/5",w:"SUN"},{d:"7/6",w:"MON"},{d:"7/7",w:"TUE"},{d:"7/8",w:"WED"},{d:"7/9",w:"THU"},{d:"7/10",w:"FRI"},{d:"7/11",w:"SAT"}];
        const payers = ["小慌", "昱凱", "小安", "文哥", "零用金"];
        const payMethods = ["現金", "line pay", "Wowpass", "信用卡", "零用金", "其他"];
        const categories = ["餐廳", "購物", "景點費用", "交通費用", "其他"];
        
        let curPayer = "文哥", curMethod = "現金", curCat = "餐廳";

        window.onload = () => { renderAll(); };

        function saveState() {
            state.title = document.getElementById('trip-title').innerText;
            state.budget = parseFloat(document.getElementById('budget-val').innerText) || 0;
            localStorage.setItem('korea_travel_v7', JSON.stringify(state));
            updateSummary();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav-btn'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav-btn');
            document.getElementById('fab-budget').style.display = (tab === 'budget') ? 'flex' : 'none';
        }

        // --- 記帳邏輯 ---
        function calcTwdHint() {
            const amt = parseFloat(document.getElementById('exp-amount').value) || 0;
            const rate = parseFloat(document.getElementById('exp-rate-val').value) || 0.024;
            const currency = document.getElementById('exp-currency').value;
            const hintEl = document.getElementById('exp-twd-hint');
            hintEl.innerText = (currency === "KRW") ? `台幣約 NT$ ${Math.round(amt * rate).toLocaleString()}` : `無需換算`;
        }

        function initExpenseBtns() {
            document.getElementById('payer-btns').innerHTML = payers.map(p => 
                `<button onclick="curPayer='${p}'; initExpenseBtns()" class="seg-btn ${p===curPayer?'active':''}">${p}</button>`).join('');
            document.getElementById('method-btns').innerHTML = payMethods.map(m => 
                `<button onclick="curMethod='${m}'; initExpenseBtns()" class="seg-btn ${m===curMethod?'active':''}">${m}</button>`).join('');
            document.getElementById('cat-btns').innerHTML = categories.map(c => 
                `<button onclick="curCat='${c}'; initExpenseBtns()" class="seg-btn ${c===curCat?'active':''}">${c}</button>`).join('');
        }

        function openExpenseModal() { 
            document.getElementById('edit-exp-id').value = ""; 
            document.getElementById('exp-item').value = "";
            document.getElementById('exp-amount').value = "";
            document.getElementById('exp-date').valueAsDate = new Date();
            document.getElementById('expense-modal').classList.remove('hidden'); 
            initExpenseBtns();
            calcTwdHint();
        }

        function closeExpenseModal() { document.getElementById('expense-modal').classList.add('hidden'); }

        function saveExpense() {
            const idx = document.getElementById('edit-exp-id').value;
            const amt = parseFloat(document.getElementById('exp-amount').value) || 0;
            const rate = parseFloat(document.getElementById('exp-rate-val').value) || 0.024;
            const currency = document.getElementById('exp-currency').value;
            const twdValue = (currency === "KRW") ? Math.round(amt * rate) : Math.round(amt);

            const rec = { 
                item: document.getElementById('exp-item').value || "未命名支出", 
                date: document.getElementById('exp-date').value, 
                amount: amt, currency: currency, twd: twdValue, 
                payer: curPayer, method: curMethod, cat: curCat
            };

            if(idx !== "") state.expenses[idx] = rec; else state.expenses.push(rec);
            saveState(); renderExpenses(); closeExpenseModal();
        }

        function renderExpenses() {
            const list = document.getElementById('expense-list'); list.innerHTML = "";
            state.expenses.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((e, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm relative mb-4";
                div.innerHTML = `
                    <div class="flex-1" onclick="editExp(${idx})">
                        <div class="flex items-center space-x-2">
                            <span class="text-[8px] bg-cream-bg text-cream-accent px-1.5 py-0.5 rounded font-black uppercase">${e.cat}</span>
                            <p class="font-black italic uppercase text-sm">${e.item}</p>
                        </div>
                        <p class="text-[9px] text-gray-400 font-bold uppercase mt-1">${e.payer} · ${e.method} · ${e.date.slice(5)}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-bold text-gray-300 font-mono">${e.amount.toLocaleString()} ${e.currency}</p>
                        <p class="text-sm font-black font-mono text-cream-accent">NT$ ${e.twd.toLocaleString()}</p>
                        <button onclick="delExp(${idx})" class="text-[8px] text-red-200 font-black mt-1 uppercase">Delete</button>
                    </div>`;
                list.appendChild(div);
            });
            updateSummary();
        }

        function editExp(idx) {
            const e = state.expenses[idx];
            document.getElementById('edit-exp-id').value = idx;
            document.getElementById('exp-item').value = e.item;
            document.getElementById('exp-date').value = e.date;
            document.getElementById('exp-amount').value = e.amount;
            document.getElementById('exp-currency').value = e.currency || "KRW";
            curPayer = e.payer; curMethod = e.method; curCat = e.cat;
            document.getElementById('expense-modal').classList.remove('hidden');
            initExpenseBtns(); calcTwdHint();
        }

        function delExp(i) { if(confirm("確定刪除此筆帳目？")) { state.expenses.splice(i,1); saveState(); renderExpenses(); } }

        function updateSummary() {
            const total = state.expenses.reduce((s, e) => s + (e.twd || 0), 0); 
            document.getElementById('total-spent').innerText = `NT$ ${total.toLocaleString()}`;
            const budget = parseFloat(document.getElementById('budget-val').innerText) || 50000;
            const left = budget - total; 
            document.getElementById('budget-left').innerText = `${left.toLocaleString()}`;
            document.getElementById('budget-bar').style.width = Math.min(100, (total / budget) * 100) + '%';
        }

        function toggleSettlement() {
            const m = document.createElement('div');
            m.className="fixed inset-0 z-[300] bg-black/50 flex items-center justify-center p-6";
            const paid = {}; payers.forEach(p => paid[p] = 0);
            state.expenses.forEach(e => { if(paid.hasOwnProperty(e.payer)) paid[e.payer] += e.twd; });
            m.innerHTML=`<div class="bg-white rounded-3xl p-8 w-full max-w-xs shadow-2xl">
                <h3 class="font-black mb-4 italic text-center">代墊分帳統計</h3>
                <div class="space-y-1">${payers.map(p => `<div class="flex justify-between border-b py-3 text-sm"><span>${p}</span><span class="font-mono text-cream-accent">NT$ ${paid[p].toLocaleString()}</span></div>`).join('')}</div>
                <button onclick="this.parentElement.parentElement.remove()" class="mt-6 w-full py-4 bg-cream-accent text-white rounded-2xl font-black italic">關閉視窗</button>
            </div>`;
            document.body.appendChild(m);
        }

        // --- 行程邏輯 ---
        function renderDayNav() {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            dayList.forEach((d, i) => {
                const num = i + 1;
                const btn = document.createElement('button');
                btn.className = `day-btn flex flex-col items-center justify-center rounded-2xl min-w-[70px] h-[70px] ${state.currentDay == num ? 'active' : 'bg-white shadow-sm'}`;
                btn.onclick = () => { state.currentDay = num; renderAll(); };
                btn.innerHTML = `<span class="text-[9px] font-black opacity-40">DAY ${num}</span><span class="text-sm font-black italic">${d.d}</span>`;
                container.appendChild(btn);
            });
        }

        function renderItin() {
            const list = document.getElementById('itinerary-list'); list.innerHTML = "";
            (state.itin[state.currentDay] || []).forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-[2rem] shadow-sm relative";
                div.innerHTML = `<button onclick="event.stopPropagation(); delItin(${idx})" class="absolute top-4 right-4 text-gray-200">✕</button><div onclick="openDetailModal(${idx})"><span class="text-xs font-mono text-cream-accent">${item.time}</span><h3 class="font-black text-lg italic uppercase">${item.title}</h3><p class="text-[10px] text-gray-400 italic">📍 ${item.loc || '未填寫地點'}</p></div>`;
                list.appendChild(div);
            });
        }

        function addNewItinerary() { state.itin[state.currentDay].push({ time:"12:00", title:"新行程", loc:"", desc:"", notes:"" }); saveState(); renderItin(); }
        function delItin(i) { if(confirm("刪除此行程？")) { state.itin[state.currentDay].splice(i,1); saveState(); renderItin(); } }

        function openDetailModal(idx) {
            const item = state.itin[state.currentDay][idx];
            document.getElementById('detail-idx').value = idx;
            document.getElementById('detail-title').value = item.title;
            document.getElementById('detail-time').value = item.time;
            document.getElementById('detail-loc').value = item.loc || "";
            document.getElementById('detail-desc').value = item.desc || "";
            document.getElementById('detail-notes').value = item.notes || "";
            document.getElementById('detail-modal').classList.add('active');
        }

        function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }
        function saveCurrentDetail() {
            const idx = document.getElementById('detail-idx').value;
            const item = state.itin[state.currentDay][idx];
            item.title = document.getElementById('detail-title').value;
            item.time = document.getElementById('detail-time').value;
            item.loc = document.getElementById('detail-loc').value;
            item.desc = document.getElementById('detail-desc').value;
            item.notes = document.getElementById('detail-notes').value;
            saveState(); renderItin(); closeDetailModal();
        }

        // --- 待辦邏輯 ---
        function renderTodos() {
            const container = document.getElementById('todo-groups'); container.innerHTML = "";
            state.todoGroups.forEach((g, gIdx) => {
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-[2rem] shadow-sm relative";
                div.innerHTML = `<button onclick="delTodoGroup(${gIdx})" class="absolute top-6 right-6 text-gray-200">✕</button><h3 contenteditable="true" onblur="state.todoGroups[${gIdx}].title=this.innerText; saveState()" class="text-base font-black italic underline decoration-cream-primary">${g.title}</h3><div class="mt-4 space-y-3">${g.items.map((it, iIdx) => `<div class="flex items-center justify-between"><div class="flex items-center space-x-2"><input type="checkbox" ${it.done?'checked':''} onchange="state.todoGroups[${gIdx}].items[${iIdx}].done=!state.todoGroups[${gIdx}].items[${iIdx}].done; saveState(); renderTodos();" class="accent-cream-accent"><span contenteditable="true" onblur="state.todoGroups[${gIdx}].items[${iIdx}].text=this.innerText; saveState()" class="text-sm font-bold ${it.done?'line-through opacity-30':''}">${it.text}</span></div><button onclick="state.todoGroups[${gIdx}].items.splice(${iIdx},1); saveState(); renderTodos();" class="text-xs text-gray-200">✕</button></div>`).join('')}</div><button onclick="state.todoGroups[${gIdx}].items.push({text:'新事項',done:false}); saveState(); renderTodos();" class="mt-4 text-[10px] font-black text-cream-accent">+ 新增項目</button>`;
                container.appendChild(div);
            });
        }
        function addTodoGroup() { state.todoGroups.push({ title: "新清單", items: [] }); saveState(); renderTodos(); }
        function delTodoGroup(idx) { if(confirm("確定刪除此分類？")) { state.todoGroups.splice(idx,1); saveState(); renderTodos(); } }

        // --- 資訊邏輯 ---
        function renderInfo() {
            const container = document.getElementById('custom-info-list'); container.innerHTML = "";
            state.customInfo.forEach((info, idx) => {
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-[2rem] shadow-sm relative";
                div.innerHTML = `<button onclick="state.customInfo.splice(${idx},1); saveState(); renderInfo();" class="absolute top-6 right-6 text-gray-200">✕</button><h4 contenteditable="true" onblur="state.customInfo[${idx}].title=this.innerText; saveState()" class="font-black text-sm uppercase italic mb-2">${info.title}</h4><div contenteditable="true" onblur="state.customInfo[${idx}].content=this.innerText; saveState()" class="text-[11px] text-gray-500 font-mono leading-relaxed whitespace-pre-wrap">${info.content}</div>`;
                container.appendChild(div);
            });
        }
        function addCustomInfo() { state.customInfo.push({ title: "新資訊標題", content: "點擊編輯內容..." }); saveState(); renderInfo(); }

        // --- 地圖跳轉 ---
        function openM(type, loc) { if(!loc) return; window.open(type==='google' ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}` : `https://map.naver.com/v5/search/${encodeURIComponent(loc)}`); }

        function renderAll() { renderDayNav(); renderItin(); renderTodos(); renderExpenses(); renderInfo(); updateSummary(); }
    </script>
</body>
</html>
