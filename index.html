<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 2026 V10.4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbGaaDf-WbI32waybI_jqRaU3HqSsAT6c",
            authDomain: "korea2026-e207a.firebaseapp.com",
            projectId: "korea2026-e207a",
            storageBucket: "korea2026-e207a.firebasestorage.app",
            messagingSenderId: "312602966357",
            appId: "1:312602966357:web:868542b30d43a0737b57dc",
            measurementId: "G-D1YGW14J6X"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tripRef = ref(db, 'korea2026_data');

        window.state = {
            budget: 50000,
            currentDay: 1,
            itin: { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] },
            todoGroups: [],
            expenses: [],
            customInfo: []
        };

        onValue(tripRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                if (!data.itin) data.itin = { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] };
                window.state = data;
                renderAll();
            }
        });

        window.saveToCloud = () => set(tripRef, window.state);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-accent { background-color: #4A342E; }
        .text-accent { color: #4A342E; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); }
        .seg-btn { background-color: #FFFFFF; color: #8B8B8B; border: 1px solid #F3F0ED; font-size: 10px; font-weight: bold; padding: 8px 0; border-radius: 12px; transition: 0.2s; }
        .seg-btn.active { background-color: #4A342E; color: #FFFFFF; border-color: #4A342E; }
        #detail-modal, #zoom-modal, #expense-modal { position: fixed; inset: 0; z-index: 500; background: #FFFFFF; display: none; overflow-y: auto; }
        #detail-modal.active, #zoom-modal.active, #expense-modal.active { display: block; }
        #expense-modal { background: rgba(0,0,0,0.4); display: none; align-items: flex-end; }
        #expense-modal.active { display: flex; }
        .itin-img { width: 100%; height: 140px; object-fit: cover; border-radius: 1.5rem; margin-top: 10px; }
        .sortable-ghost { opacity: 0.3; background: #E8DCCF !important; }
        .active-nav-btn { color: #4A342E !important; opacity: 1 !important; }
    </style>
</head>
<body class="flex justify-center">

    <div id="zoom-modal" onclick="this.classList.remove('active')" class="flex items-center justify-center p-4 bg-black/95 z-[1000]">
        <img id="zoom-img" src="" class="max-w-full max-h-full object-contain rounded-lg">
    </div>

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-[#F8F5F2] shadow-inner">
        
        <!-- Header -->
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-[#E8DCCF] flex justify-between items-center">
            <h1 class="text-lg font-black italic">🇰🇷 KOREA 2026</h1>
            <div class="flex items-center space-x-1"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><span class="text-[9px] font-black text-gray-400 uppercase">Syncing</span></div>
        </header>

        <!-- [分頁 1] 行程 -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <div id="day-selector" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 pb-2"></div>
            <div id="itinerary-list" class="space-y-4 min-h-[50px]"></div>
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-[#E8DCCF] rounded-[2rem] text-accent font-bold">+ 新增行程項目</button>
        </section>

        <!-- [分頁 2] 待辦 -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic">TODO LIST</h2>
            <div id="todo-groups" class="space-y-6"></div>
            <button onclick="addTodoGroup()" class="mt-6 w-full py-4 bg-white border border-gray-100 rounded-3xl text-gray-400 font-bold">+ 新增分類標題</button>
        </section>

        <!-- [分頁 3] 記帳 -->
        <section id="tab-budget" class="tab-content px-6 pt-8 text-center">
            <div class="bg-white p-5 rounded-3xl shadow-sm border mb-4 text-left">
                <div class="flex justify-between text-[10px] font-bold text-gray-400">
                    <span>預預算進度 (NT$ <span contenteditable="true" id="budget-val" onblur="window.state.budget=this.innerText; window.saveToCloud()">50000</span>)</span>
                    <span>剩餘: NT$ <span id="budget-left" class="text-accent font-mono">0</span></span>
                </div>
                <div class="w-full bg-gray-100 h-2 mt-2 rounded-full overflow-hidden"><div id="budget-bar" class="bg-accent h-full w-0 transition-all duration-500"></div></div>
            </div>
            <div class="bg-accent text-white p-8 rounded-[2.5rem] mb-6 relative shadow-xl">
                <p class="text-[10px] opacity-60 font-bold mb-1 tracking-widest uppercase">總支出折合 (TWD)</p>
                <h3 id="total-spent" class="text-4xl font-black font-mono italic">NT$ 0</h3>
                <button onclick="toggleSettlement()" class="mt-4 bg-white/20 px-4 py-2 rounded-full text-xs italic border border-white/30">個人代墊統計</button>
            </div>
            <div id="expense-list" class="space-y-4 text-left"></div>
        </section>

        <!-- [分頁 4] 資訊 -->
        <section id="tab-info" class="tab-content px-6 pt-8">
            <h2 class="text-xs font-black mb-3 text-accent uppercase tracking-widest">1. 住宿地址</h2>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm mb-8 border border-[#E8DCCF]/30">
                <p id="hotel-addr" class="text-sm font-bold text-gray-600 mb-4 leading-relaxed text-center">Seoul Jung-gu Sogong-ro 6na-gil 11</p>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="copyAddr()" class="bg-gray-50 py-3 rounded-xl text-[10px] font-black"><i class="fa-solid fa-copy mb-1 block text-lg"></i>複製</button>
                    <button onclick="openM('google', 'Seoul Jung-gu Sogong-ro 6na-gil 11')" class="bg-gray-50 py-3 rounded-xl text-[10px] font-black text-blue-600"><i class="fa-solid fa-map-location-dot mb-1 block text-lg"></i>GOOGLE</button>
                    <button onclick="openM('naver', 'Seoul Jung-gu Sogong-ro 6na-gil 11')" class="bg-green-50 py-3 rounded-xl text-[10px] font-black text-green-700"><i class="fa-solid fa-location-arrow mb-1 block text-lg"></i>NAVER</button>
                </div>
            </div>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-black text-accent uppercase tracking-widest">2. 其他資訊 / 條碼</h2>
                <button onclick="addCustomInfo()" class="bg-accent text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="custom-info-list" class="space-y-4"></div>
        </section>

        <!-- 底部導覽 -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] bg-white/90 backdrop-blur-2xl border h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around z-[100]">
            <button onclick="switchTab('schedule')" class="flex flex-col items-center text-gray-300" id="nav-schedule"><i class="fa-solid fa-compass"></i><span class="text-[8px] font-bold">行程</span></button>
            <button onclick="switchTab('todo')" class="flex flex-col items-center text-gray-300" id="nav-todo"><i class="fa-solid fa-list-check"></i><span class="text-[8px] font-bold">待辦</span></button>
            <button onclick="switchTab('budget')" class="flex flex-col items-center text-gray-300" id="nav-budget"><i class="fa-solid fa-sack-dollar"></i><span class="text-[8px] font-bold">記帳</span></button>
            <button onclick="switchTab('info')" class="flex flex-col items-center text-gray-300" id="nav-info"><i class="fa-solid fa-qrcode"></i><span class="text-[8px] font-bold">資訊</span></button>
        </nav>

        <button id="fab-budget" onclick="openExpenseModal()" class="hidden fixed bottom-32 right-8 w-14 h-14 bg-accent text-white rounded-full shadow-2xl items-center justify-center text-xl z-[90]"><i class="fa-solid fa-plus"></i></button>
    </div>

    <!-- 行程詳細 Modal -->
    <div id="detail-modal" class="no-scrollbar p-0">
        <div class="sticky top-0 z-[510] bg-white/90 backdrop-blur-md px-6 py-5 border-b flex justify-between items-center">
            <button onclick="closeDetailModal()" class="text-gray-400 font-bold text-xs uppercase">✕ Close</button>
            <h3 class="text-xs font-black text-accent italic uppercase">Itinerary detail</h3>
            <button onclick="saveCurrentDetail()" class="px-6 py-2 bg-accent text-white rounded-full text-xs font-black">SAVE</button>
        </div>
        <div class="p-8 pb-40 space-y-6">
            <input type="hidden" id="detail-idx">
            <div id="detail-img-preview" class="w-full h-48 bg-gray-50 rounded-[2rem] flex items-center justify-center border-2 border-dashed border-gray-200 relative overflow-hidden">
                <span class="text-gray-300 text-xs font-bold">上傳照片</span>
                <input type="file" onchange="handleImageUpload(this, 'itin')" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                <img id="detail-img-src" src="" class="hidden w-full h-full object-cover">
            </div>
            <input id="detail-title" type="text" class="w-full text-3xl font-black outline-none italic tracking-tighter" placeholder="地點名稱">
            <input id="detail-loc" type="text" class="w-full text-sm font-bold text-gray-400 outline-none italic" placeholder="📍 地標名稱用於導航">
            <div class="flex items-center space-x-3">
                <input id="detail-time" type="time" class="bg-gray-50 px-4 py-2 rounded-xl font-mono outline-none">
                <select id="detail-type" class="bg-white border rounded-xl px-4 py-2 text-xs font-bold italic">
                    <option value="景點">🎡 景點</option><option value="餐廳">🍽️ 餐廳</option><option value="購物">🛍️ 購物</option><option value="住宿">🏨 住宿</option><option value="交通">✈️ 交通</option><option value="其他">✨ 其他</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="openM('google', document.getElementById('detail-loc').value)" class="py-4 bg-gray-50 rounded-2xl text-[10px] font-black uppercase">Google Map</button>
                <button onclick="openM('naver', document.getElementById('detail-loc').value)" class="py-4 bg-green-50 rounded-2xl text-[10px] font-black text-green-700 uppercase">Naver Map</button>
            </div>
            <textarea id="detail-desc" rows="5" class="w-full bg-gray-50 p-5 rounded-[2rem] outline-none text-sm" placeholder="細節描述..."></textarea>
        </div>
    </div>

    <!-- 記帳編輯 Modal -->
    <div id="expense-modal" onclick="if(event.target==this) closeExpenseModal()">
        <div class="w-full bg-white rounded-t-[3rem] p-8 pb-12 overflow-y-auto max-h-[95vh] shadow-2xl">
            <div class="flex justify-between mb-6">
                <h3 id="exp-modal-title" class="text-xl font-black italic">新增支出</h3>
                <button onclick="closeExpenseModal()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-bold">✕</button>
            </div>
            <div class="space-y-5">
                <input type="hidden" id="edit-exp-id">
                <input id="exp-item" type="text" placeholder="支出項目 (例如：炸雞)" class="w-full bg-gray-50 p-5 rounded-2xl font-bold outline-none">
                <input id="exp-date" type="date" class="w-full bg-gray-50 p-5 rounded-2xl font-mono outline-none">
                
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block ml-2">付費者</label>
                    <div class="grid grid-cols-3 gap-2" id="payer-btns"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block ml-2">方式</label>
                        <div class="grid grid-cols-2 gap-2" id="method-btns"></div>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block ml-2">退稅狀態</label>
                        <select id="exp-tax" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold border-none outline-none">
                            <option value="無">無</option>
                            <option value="未退稅">未退稅</option>
                            <option value="已退稅">已退稅</option>
                        </select>
                    </div>
                </div>

                <div class="flex space-x-2">
                    <div class="w-1/3 relative"><select id="exp-currency" onchange="calcTwdHint()" class="w-full bg-gray-50 p-5 rounded-2xl font-bold appearance-none"><option value="KRW">KRW ₩</option><option value="TWD">TWD $</option></select></div>
                    <div class="flex-1 relative"><input id="exp-amount" type="number" oninput="calcTwdHint()" placeholder="金額" class="w-full bg-gray-50 p-5 rounded-2xl font-black outline-none italic text-xl"><span id="exp-twd-hint" class="absolute right-4 bottom-2 text-[10px] font-bold text-accent italic">約 NT$ 0</span></div>
                </div>

                <div class="flex items-center space-x-2 px-2"><span class="text-[10px] font-bold text-gray-400">匯率:</span><input id="exp-rate-val" type="number" value="0.024" step="0.001" oninput="calcTwdHint()" class="w-16 bg-transparent border-b border-gray-200 text-center font-mono text-xs outline-none"></div>
                
                <textarea id="exp-notes" rows="2" class="w-full bg-gray-50 p-4 rounded-2xl text-xs font-bold outline-none" placeholder="備註內容..."></textarea>
                
                <button onclick="saveExpense()" class="w-full bg-accent text-white py-5 rounded-[2rem] font-black italic shadow-lg shadow-brown-200 uppercase tracking-widest">Save to Cloud</button>
            </div>
        </div>
    </div>

    <script>
        const dayList = [{d:"7/5"},{d:"7/6"},{d:"7/7"},{d:"7/8"},{d:"7/9"},{d:"7/10"},{d:"7/11"}];
        const payers = ["小慌", "昱凱", "小安", "文哥", "零用金"];
        const payMethods = ["現金", "Wowpass", "信用卡", "其他"];
        let curPayer = "文哥", curMethod = "現金";
        let tempImgData = "";

        // 1. 行程拖曳排序初始化
        function initSortable() {
            const el = document.getElementById('itinerary-list');
            if(!el) return;
            Sortable.create(el, {
                animation: 150,
                handle: '.itin-card',
                ghostClass: 'sortable-ghost',
                onEnd: (evt) => {
                    const dayItin = window.state.itin[window.state.currentDay];
                    const [movedItem] = dayItin.splice(evt.oldIndex, 1);
                    dayItin.splice(evt.newIndex, 0, movedItem);
                    window.saveToCloud();
                }
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav-btn'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav-btn');
            document.getElementById('fab-budget').style.display = (tab === 'budget') ? 'flex' : 'none';
        }

        // --- 行程渲染 ---
        function renderItin() {
            const list = document.getElementById('itinerary-list'); list.innerHTML = "";
            const items = window.state.itin[window.state.currentDay] || [];
            items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "itin-card bg-white p-5 rounded-[2rem] shadow-sm relative border border-transparent active:border-gray-100";
                div.dataset.idx = idx;
                div.innerHTML = `
                    <button onclick="event.stopPropagation(); delItin(${idx})" class="absolute top-5 right-5 text-gray-200">✕</button>
                    <div onclick="openDetailModal(${idx})">
                        <div class="flex items-center space-x-2 mb-2">
                            <span class="text-[9px] font-black text-white bg-accent px-2 py-0.5 rounded-full uppercase">${item.type || '景點'}</span>
                            <span class="text-xs font-mono text-accent font-bold">${item.time}</span>
                        </div>
                        <h3 class="font-black text-lg italic tracking-tighter text-gray-800">${item.title || '地點'}</h3>
                        <p class="text-[10px] text-gray-400 italic">📍 ${item.loc || '尚未填寫地標'}</p>
                        ${item.img ? `<img src="${item.img}" class="itin-img">` : ''}
                    </div>`;
                list.appendChild(div);
            });
            initSortable();
        }

        function addNewItinerary() {
            if(!window.state.itin[window.state.currentDay]) window.state.itin[window.state.currentDay] = [];
            window.state.itin[window.state.currentDay].push({ time:"12:00", title:"", loc:"", desc:"", type:"景點", img:"" });
            window.saveToCloud();
        }

        function openDetailModal(idx) {
            const item = window.state.itin[window.state.currentDay][idx];
            document.getElementById('detail-idx').value = idx;
            document.getElementById('detail-title').value = item.title || "";
            document.getElementById('detail-time').value = item.time || "12:00";
            document.getElementById('detail-loc').value = item.loc || "";
            document.getElementById('detail-desc').value = item.desc || "";
            document.getElementById('detail-type').value = item.type || "景點";
            const preview = document.getElementById('detail-img-src');
            if(item.img) { preview.src = item.img; preview.classList.remove('hidden'); tempImgData = item.img; }
            else { preview.classList.add('hidden'); tempImgData = ""; }
            document.getElementById('detail-modal').classList.add('active');
        }

        function saveCurrentDetail() {
            const idx = document.getElementById('detail-idx').value;
            const item = window.state.itin[window.state.currentDay][idx];
            item.title = document.getElementById('detail-title').value;
            item.time = document.getElementById('detail-time').value;
            item.loc = document.getElementById('detail-loc').value;
            item.desc = document.getElementById('detail-desc').value;
            item.type = document.getElementById('detail-type').value;
            item.img = tempImgData;
            window.saveToCloud(); closeDetailModal();
        }
        function delItin(i) { if(confirm("確定刪除此行程？")) { window.state.itin[window.state.currentDay].splice(i,1); window.saveToCloud(); } }
        function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }

        // --- 記帳功能 (包含零用金分帳邏輯) ---
        function renderExpenses() {
            const list = document.getElementById('expense-list'); list.innerHTML = "";
            (window.state.expenses || []).sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((e, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm relative mb-4 transition active:scale-95";
                div.innerHTML = `
                    <div class="flex-1" onclick="editExp(${idx})">
                        <div class="flex items-center space-x-2">
                            <span class="text-[8px] bg-gray-50 text-accent px-1.5 py-0.5 rounded font-black uppercase border">${e.payer}</span>
                            <p class="font-black italic uppercase text-sm">${e.item}</p>
                            ${e.tax && e.tax !== '無' ? `<span class="text-[8px] border border-orange-200 text-orange-400 px-1 rounded">${e.tax}</span>` : ''}
                        </div>
                        <p class="text-[9px] text-gray-400 font-bold mt-1">${e.method} · ${e.date.slice(5)}</p>
                        ${e.notes ? `<p class="text-[8px] text-gray-300 italic mt-0.5">Note: ${e.notes}</p>` : ''}
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black font-mono text-accent">NT$ ${e.twd.toLocaleString()}</p>
                        <button onclick="delExp(${idx})" class="text-[8px] text-red-200 font-black uppercase mt-1">Delete</button>
                    </div>`;
                list.appendChild(div);
            });
            updateSummary();
        }

        function saveExpense() {
            const idx = document.getElementById('edit-exp-id').value;
            const amt = parseFloat(document.getElementById('exp-amount').value) || 0;
            const rate = parseFloat(document.getElementById('exp-rate-val').value) || 0.024;
            const currency = document.getElementById('exp-currency').value;
            const twdValue = (currency === "KRW") ? Math.round(amt * rate) : Math.round(amt);
            
            const rec = { 
                item: document.getElementById('exp-item').value || "支出", 
                date: document.getElementById('exp-date').value, 
                amount: amt, 
                currency, 
                twd: twdValue, 
                payer: curPayer, 
                method: curMethod,
                tax: document.getElementById('exp-tax').value,
                notes: document.getElementById('exp-notes').value
            };

            if(!window.state.expenses) window.state.expenses = [];
            if(idx !== "") window.state.expenses[idx] = rec; else window.state.expenses.push(rec);
            window.saveToCloud(); closeExpenseModal();
        }

        function toggleSettlement() {
            // 排除零用金，只計算個人
            const paid = {}; payers.forEach(p => { if(p !== "零用金") paid[p] = 0; });
            (window.state.expenses || []).forEach(e => { if(paid.hasOwnProperty(e.payer)) paid[e.payer] += e.twd; });
            const m = document.createElement('div'); m.className="fixed inset-0 z-[600] bg-black/50 flex items-center justify-center p-6";
            m.innerHTML=`<div class="bg-white rounded-[2.5rem] p-8 w-full max-w-xs shadow-2xl">
                <h3 class="font-black mb-4 italic text-center text-accent">個人代墊統計</h3>
                <p class="text-[9px] text-center text-gray-400 mb-4 uppercase tracking-tighter italic">※ 已排除「共同零用金」支付項目</p>
                <div class="space-y-1">${Object.keys(paid).map(p => `<div class="flex justify-between border-b py-3 text-sm font-bold"><span>${p}</span><span class="font-mono text-accent">NT$ ${paid[p].toLocaleString()}</span></div>`).join('')}</div>
                <button onclick="this.parentElement.parentElement.remove()" class="mt-6 w-full py-4 bg-accent text-white rounded-2xl font-black italic">關閉視窗</button>
            </div>`;
            document.body.appendChild(m);
        }

        // --- 其他輔助功能 ---
        function handleImageUpload(input, type, idx = null) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = e.target.result;
                if(type === 'itin') { tempImgData = data; document.getElementById('detail-img-src').src = data; document.getElementById('detail-img-src').classList.remove('hidden'); }
                else if(type === 'info') { window.state.customInfo[idx].img = data; window.saveToCloud(); }
            };
            reader.readAsDataURL(file);
        }

        function renderDayNav() {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            dayList.forEach((d, i) => {
                const btn = document.createElement('button');
                btn.className = `day-btn flex flex-col items-center justify-center rounded-2xl min-w-[70px] h-[70px] ${window.state.currentDay == (i+1) ? 'active' : 'bg-white shadow-sm'}`;
                btn.onclick = () => { window.state.currentDay = i+1; renderAll(); };
                btn.innerHTML = `<span class="text-[9px] font-black opacity-40 uppercase">Day ${i+1}</span><span class="text-sm font-black italic">${d.d}</span>`;
                container.appendChild(btn);
            });
        }

        function renderTodos() {
            const container = document.getElementById('todo-groups'); container.innerHTML = "";
            (window.state.todoGroups || []).forEach((g, gIdx) => {
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-[2rem] shadow-sm mb-4 relative";
                div.innerHTML = `<button onclick="window.state.todoGroups.splice(${gIdx},1); window.saveToCloud();" class="absolute top-6 right-6 text-gray-200">✕</button><h3 contenteditable="true" onblur="window.state.todoGroups[${gIdx}].title=this.innerText; window.saveToCloud()" class="text-base font-black italic underline decoration-[#E8DCCF]">${g.title}</h3><div class="mt-4 space-y-3">${g.items.map((it, iIdx) => `<div class="flex items-center justify-between"><div class="flex items-center space-x-2"><input type="checkbox" ${it.done?'checked':''} onchange="window.state.todoGroups[${gIdx}].items[${iIdx}].done=!window.state.todoGroups[${gIdx}].items[${iIdx}].done; window.saveToCloud();" class="accent-accent"><span contenteditable="true" onblur="window.state.todoGroups[${gIdx}].items[${iIdx}].text=this.innerText; window.saveToCloud()" class="text-sm font-bold ${it.done?'line-through opacity-30':''}">${it.text}</span></div><button onclick="window.state.todoGroups[${gIdx}].items.splice(${iIdx},1); window.saveToCloud();" class="text-xs text-gray-200">✕</button></div>`).join('')}</div><button onclick="window.state.todoGroups[${gIdx}].items.push({text:'新事項',done:false}); window.saveToCloud();" class="mt-4 text-[10px] font-black text-accent uppercase">+ 新增項目</button>`;
                container.appendChild(div);
            });
        }

        function renderInfo() {
            const container = document.getElementById('custom-info-list'); container.innerHTML = "";
            (window.state.customInfo || []).forEach((info, idx) => {
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-[2rem] shadow-sm relative border border-gray-50";
                div.innerHTML = `<button onclick="window.state.customInfo.splice(${idx},1); window.saveToCloud();" class="absolute top-6 right-6 text-gray-200">✕</button><h4 contenteditable="true" onblur="window.state.customInfo[${idx}].title=this.innerText; window.saveToCloud()" class="font-black text-sm uppercase italic mb-2 pr-8">${info.title}</h4><div contenteditable="true" onblur="window.state.customInfo[${idx}].content=this.innerText; window.saveToCloud()" class="text-[11px] text-gray-500 font-mono leading-relaxed whitespace-pre-wrap mb-4">${info.content}</div><div class="relative">${info.img ? `<img src="${info.img}" class="w-full rounded-xl cursor-pointer" onclick="zoomImg(this.src)">` : `<label class="flex items-center justify-center w-full py-4 bg-gray-50 rounded-xl border-2 border-dashed border-gray-100 cursor-pointer"><span class="text-[10px] font-bold text-gray-300">新增條碼/相片</span><input type="file" onchange="handleImageUpload(this, 'info', ${idx})" class="hidden" accept="image/*"></label>`}</div>`;
                container.appendChild(div);
            });
        }

        function updateSummary() {
            const total = (window.state.expenses || []).reduce((s, e) => s + (e.twd || 0), 0);
            document.getElementById('total-spent').innerText = `NT$ ${total.toLocaleString()}`;
            const budget = parseFloat(window.state.budget) || 50000;
            document.getElementById('budget-left').innerText = `${(budget - total).toLocaleString()}`;
            document.getElementById('budget-bar').style.width = Math.min(100, (total / budget) * 100) + '%';
        }

        function initExpenseBtns() {
            document.getElementById('payer-btns').innerHTML = payers.map(p => `<button onclick="curPayer='${p}'; initExpenseBtns()" class="seg-btn ${p===curPayer?'active':''}">${p}</button>`).join('');
            document.getElementById('method-btns').innerHTML = payMethods.map(m => `<button onclick="curMethod='${m}'; initExpenseBtns()" class="seg-btn ${m===curMethod?'active':''}">${m}</button>`).join('');
        }

        function openExpenseModal() { 
            document.getElementById('edit-exp-id').value = ""; document.getElementById('exp-item').value = "";
            document.getElementById('exp-amount').value = ""; document.getElementById('exp-date').valueAsDate = new Date();
            document.getElementById('exp-tax').value = "無"; document.getElementById('exp-notes').value = "";
            document.getElementById('expense-modal').classList.add('active'); initExpenseBtns(); calcTwdHint();
        }

        function editExp(idx) {
            const e = window.state.expenses[idx];
            document.getElementById('edit-exp-id').value = idx;
            document.getElementById('exp-item').value = e.item;
            document.getElementById('exp-date').value = e.date;
            document.getElementById('exp-amount').value = e.amount;
            document.getElementById('exp-tax').value = e.tax || "無";
            document.getElementById('exp-notes').value = e.notes || "";
            curPayer = e.payer; curMethod = e.method;
            document.getElementById('expense-modal').classList.add('active'); initExpenseBtns(); calcTwdHint();
        }

        function closeExpenseModal() { document.getElementById('expense-modal').classList.remove('active'); }
        function delExp(i) { if(confirm("確定刪除此帳目？")) { window.state.expenses.splice(i,1); window.saveToCloud(); } }
        function calcTwdHint() {
            const amt = parseFloat(document.getElementById('exp-amount').value) || 0;
            const rate = parseFloat(document.getElementById('exp-rate-val').value) || 0.024;
            const cur = document.getElementById('exp-currency').value;
            document.getElementById('exp-twd-hint').innerText = (cur === "KRW") ? `約 NT$ ${Math.round(amt * rate).toLocaleString()}` : `無需換算`;
        }
        function openM(type, loc) { window.open(type==='google' ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}` : `https://map.naver.com/v5/search/${encodeURIComponent(loc)}`); }
        function copyAddr() { navigator.clipboard.writeText(document.getElementById('hotel-addr').innerText).then(() => alert("地址已複製！")); }
        function zoomImg(src) { document.getElementById('zoom-img').src = src; document.getElementById('zoom-modal').classList.add('active'); }
        function addTodoGroup() { window.state.todoGroups.push({ title: "新清單", items: [] }); window.saveToCloud(); }
        function addCustomInfo() { window.state.customInfo.push({ title: "新標題", content: "", img: "" }); window.saveToCloud(); }

        function renderAll() {
            renderDayNav();
            renderItin();
            renderTodos();
            renderExpenses();
            renderInfo();
            updateSummary();
        }
    </script>
</body>
</html>
