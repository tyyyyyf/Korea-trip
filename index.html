<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-bg': '#F8F5F2',
                        'cream-card': '#FFFFFF',
                        'cream-accent': '#4A342E',
                        'cream-primary': '#E8DCCF',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .editable:focus { outline: 2px dashed #4A342E; background: rgba(74, 52, 46, 0.05); border-radius: 4px; }
        .active-nav-btn { color: #4A342E !important; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); }
        .timeline-line::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #E8DCCF; opacity: 0.5; }
        
        /* 記帳彈窗按鈕選單樣式 */
        .seg-btn { background-color: #FFFFFF; color: #8B8B8B; border: 1px solid #F3F0ED; transition: all 0.2s; }
        .seg-btn.active { background-color: #4A342E; color: #FFFFFF; border-color: #4A342E; }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-cream-bg shadow-inner">
        
        <!-- Header -->
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-cream-primary/20 flex justify-between items-center">
            <h1 id="trip-title" contenteditable="true" onblur="saveState()" class="editable text-lg font-black tracking-tight italic">🇰🇷 韓國之旅 2026</h1>
            <div class="w-8 h-8 rounded-full bg-cream-accent text-white flex items-center justify-center text-[10px] font-bold">KR</div>
        </header>

        <!-- [分頁 1] 行程 -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <div id="day-selector" class="flex space-x-3 overflow-x-auto no-scrollbar mb-8 pb-2"></div>
            <div class="relative timeline-line ml-1" id="itinerary-list"></div>
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-cream-accent font-bold text-sm">
                <i class="fa-solid fa-plus mr-2"></i>新增行程項目
            </button>
        </section>

        <!-- [分頁 2] 代辦 -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic">行前代辦</h2>
                <button onclick="addTodoGroup()" class="text-xs bg-cream-accent text-white px-3 py-1.5 rounded-full font-bold">新增母標題</button>
            </div>
            <div id="todo-groups" class="space-y-6"></div>
        </section>

        <!-- [分頁 3] 記帳 -->
        <section id="tab-budget" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic">旅遊記帳</h2>
            
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-4">
                <div class="flex justify-between text-[11px] font-bold text-gray-400 mb-2">
                    <span>預算進度 (NT$ <span contenteditable="true" id="budget-val" onblur="saveState()">50000</span>)</span>
                    <span>剩餘: <span id="budget-left" class="text-cream-accent">0</span></span>
                </div>
                <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                    <div id="budget-bar" class="bg-cream-accent h-full transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>

            <div class="bg-cream-accent text-white p-8 rounded-[2.5rem] shadow-lg mb-6 relative overflow-hidden">
                <p class="text-[10px] opacity-70 font-bold mb-1 tracking-widest uppercase">總支出 (TWD)</p>
                <h3 id="total-spent" class="text-4xl font-black italic tracking-tighter">NT$ 0</h3>
                <button onclick="toggleSettlement()" class="mt-4 bg-white/20 px-4 py-2 rounded-full text-[10px] font-bold border border-white/30">
                    查看誰付錢給誰
                </button>
                <i class="fa-solid fa-sack-dollar absolute -right-4 -bottom-4 text-white/10 text-9xl"></i>
            </div>

            <!-- 動態日期篩選標籤 -->
            <div id="expense-date-filter" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6"></div>
            <div id="expense-list" class="space-y-4"></div>
        </section>

        <!-- [分頁 4] 資訊 -->
        <section id="tab-info" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic text-cream-accent">旅遊資訊</h2>
            <div class="space-y-4 mb-8">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-[10px] font-black text-blue-500 uppercase mb-3 tracking-widest font-mono">✈️ 去程班機</p>
                    <h4 class="font-black text-base">濟州航空 7C6102</h4>
                    <div class="mt-2 text-sm text-gray-500 font-medium leading-relaxed">
                        11:55 桃機 T1 起飛<br>15:35 抵達仁川機場 T1
                    </div>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-[10px] font-black text-orange-500 uppercase mb-3 tracking-widest font-mono">✈️ 回程班機</p>
                    <h4 class="font-black text-base">長榮航空 BR159</h4>
                    <div class="mt-2 text-sm text-gray-500 font-medium leading-relaxed">
                        19:45 仁川機場 T1 起飛<br>21:25 抵達桃機 T2
                    </div>
                </div>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-8 text-center">
                <p class="text-[10px] font-black text-cream-accent uppercase mb-3 tracking-widest font-mono">🏨 住宿導航</p>
                <h4 class="font-black text-sm mb-1">Seoul Jung-gu Sogong-ro 6na-gil 11</h4>
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button onclick="openM('google', 'Seoul Jung-gu Sogong-ro 6na-gil 11')" class="py-3 bg-gray-50 rounded-2xl text-[10px] font-bold">Google Maps</button>
                    <button onclick="openM('naver', '서울특별시 중구 소공로6나길 11')" class="py-3 bg-green-50 rounded-2xl text-[10px] font-bold text-green-700">NAVER Map</button>
                </div>
            </div>
            <!-- 自訂資訊區 -->
            <div id="custom-info-list" class="space-y-4"></div>
            <button onclick="addCustomInfo()" class="mt-4 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-gray-400 font-bold text-sm">+ 新增自訂資訊區塊</button>
        </section>

        <!-- 底部導覽列 -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-[400px] bg-white/80 backdrop-blur-2xl border border-white/50 h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-2 z-[100]">
            <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-btn flex flex-col items-center space-y-1 active-nav-btn text-gray-300">
                <i class="fa-solid fa-compass text-lg"></i><span class="text-[9px] font-black uppercase">行程</span>
            </button>
            <button onclick="switchTab('todo')" id="nav-todo" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-list-check text-lg"></i><span class="text-[9px] font-black uppercase">代辦</span>
            </button>
            <button onclick="switchTab('budget')" id="nav-budget" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-sack-dollar text-lg"></i><span class="text-[9px] font-black uppercase">記帳</span>
            </button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-circle-info text-lg"></i><span class="text-[9px] font-black uppercase">資訊</span>
            </button>
        </nav>

        <!-- 記帳按鈕 -->
        <button id="fab-budget" onclick="openExpenseModal()" class="hidden fixed bottom-32 right-8 w-14 h-14 bg-cream-accent text-white rounded-full shadow-2xl items-center justify-center text-xl z-[90]">
            <i class="fa-solid fa-plus"></i>
        </button>

        <!-- 分帳統計 Modal -->
        <div id="settlement-modal" class="fixed inset-0 z-[250] hidden bg-black/40 backdrop-blur-sm flex items-center justify-center p-6">
            <div class="w-full max-w-[350px] bg-white rounded-[2.5rem] p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-black italic tracking-tighter">誰該給誰錢</h3>
                    <button onclick="toggleSettlement()" class="text-gray-300 text-sm">✕</button>
                </div>
                <div id="settlement-content" class="space-y-3 max-h-[300px] overflow-y-auto no-scrollbar"></div>
                <button onclick="toggleSettlement()" class="w-full mt-8 bg-cream-accent text-white py-4 rounded-2xl font-bold text-sm">關閉</button>
            </div>
        </div>

        <!-- 記帳新增 Modal (按照截圖 UI 重構) -->
        <div id="expense-modal" class="fixed inset-0 z-[200] hidden bg-black/40 backdrop-blur-sm flex items-end">
            <div class="w-full bg-white rounded-t-[3rem] p-8 animate-[slideUp_0.3s]">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-black italic">新增記帳</h3>
                    <button onclick="closeExpenseModal()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-xs text-gray-400">✕</button>
                </div>

                <div class="space-y-6 overflow-y-auto max-h-[75vh] no-scrollbar">
                    <!-- 項目名稱 -->
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 mb-2 block uppercase tracking-widest">項目名稱</label>
                        <input id="exp-item" type="text" placeholder="例如：午餐、地鐵" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm font-medium">
                    </div>

                    <!-- 花費日期 -->
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 mb-2 block uppercase tracking-widest">花費日期</label>
                        <input id="exp-date" type="date" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm font-bold">
                    </div>

                    <!-- 付款人 (按鈕選單) -->
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 mb-2 block uppercase tracking-widest">付款人</label>
                        <div class="grid grid-cols-4 gap-2">
                            <button onclick="setField('payer', '小慌')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold">小慌</button>
                            <button onclick="setField('payer', '昱凱')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold">昱凱</button>
                            <button onclick="setField('payer', '小安')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold">小安</button>
                            <button onclick="setField('payer', '文哥')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold active">文哥</button>
                        </div>
                    </div>

                    <!-- 付款方式 (按鈕選單) -->
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 mb-2 block uppercase tracking-widest">付款方式</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setField('payment', '信用卡')" class="payment-btn seg-btn py-3 rounded-xl text-[10px] font-bold">信用卡</button>
                            <button onclick="setField('payment', '現金')" class="payment-btn seg-btn py-3 rounded-xl text-[10px] font-bold active">現金</button>
                            <button onclick="setField('payment', '行動支付')" class="payment-btn seg-btn py-3 rounded-xl text-[10px] font-bold">行動支付</button>
                        </div>
                    </div>

                    <!-- 退稅狀態 (按鈕選單) -->
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 mb-2 block uppercase tracking-widest">退稅狀態</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setField('tax', '無')" class="tax-btn seg-btn py-3 rounded-xl text-[10px] font-bold active">無</button>
                            <button onclick="setField('tax', '未退稅')" class="tax-btn seg-btn py-3 rounded-xl text-[10px] font-bold">未退稅</button>
                            <button onclick="setField('tax', '已退稅')" class="tax-btn seg-btn py-3 rounded-xl text-[10px] font-bold">已退稅</button>
                        </div>
                    </div>

                    <!-- 金額與幣別 -->
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 mb-2 block uppercase tracking-widest">金額</label>
                        <div class="flex items-center space-x-2">
                            <select id="exp-currency" class="w-1/3 bg-gray-50 p-4 rounded-2xl text-xs font-bold border-none outline-none">
                                <option value="KRW">KRW(₩)</option><option value="TWD">TWD($)</option>
                            </select>
                            <input id="exp-amount" type="number" placeholder="0" class="flex-1 bg-gray-50 p-4 rounded-2xl outline-none text-sm font-black">
                        </div>
                        <div class="mt-3 flex justify-between px-2">
                            <span class="text-[10px] text-gray-400 font-bold uppercase">匯率: <input id="exp-rate" type="number" value="0.024" step="0.001" class="w-10 bg-transparent border-b outline-none"></span>
                            <span id="exp-twd-hint" class="text-[10px] font-black text-cream-accent tracking-tighter uppercase italic">台幣換算: NT$ 0</span>
                        </div>
                    </div>

                    <button onclick="saveExpense()" class="w-full bg-cream-accent text-white py-5 rounded-3xl font-black shadow-lg tracking-widest active:scale-95 transition">確認儲存</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- 核心資料 ---
        let state = JSON.parse(localStorage.getItem('korea_2026_final')) || {
            title: "🇰🇷 韓國之旅 2026", budget: 50000, currentDay: 1,
            itin: { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] },
            todoGroups: [{ id: 1, title: "母標題: 必備清單", items: ["護照", "機票"] }],
            expenses: [], customInfo: []
        };

        const dayArr = [
            { d: "7/5", w: "SUN", n: "Day 1" }, { d: "7/6", w: "MON", n: "Day 2" }, { d: "7/7", w: "TUE", n: "Day 3" },
            { d: "7/8", w: "WED", n: "Day 4" }, { d: "7/9", w: "THU", n: "Day 5" }, { d: "7/10", w: "FRI", n: "Day 6" }, { d: "7/11", w: "SAT", n: "Day 7" }
        ];

        let curPayer = "文哥", curPayment = "現金", curTax = "無";

        window.onload = () => {
            renderAll();
            document.getElementById('exp-amount').oninput = calcHint;
            document.getElementById('exp-rate').oninput = calcHint;
        };

        function saveState() {
            state.title = document.getElementById('trip-title').innerText;
            state.budget = parseFloat(document.getElementById('budget-val').innerText) || 0;
            localStorage.setItem('korea_2026_final', JSON.stringify(state));
            updateSummary();
        }

        function renderAll() {
            renderDayNav(); renderItin(); renderTodos(); renderExpenses('all'); renderInfo(); updateSummary();
        }

        // --- 行程 ---
        function renderDayNav() {
            const container = document.getElementById('day-selector');
            container.innerHTML = "";
            dayArr.forEach((d, i) => {
                const dayNum = i + 1;
                const btn = document.createElement('button');
                btn.className = `day-btn flex-none w-18 h-24 bg-white rounded-3xl flex flex-col items-center justify-center shadow-sm transition-all ${state.currentDay == dayNum ? 'active' : 'text-cream-sub'}`;
                btn.onclick = () => { state.currentDay = dayNum; renderAll(); };
                btn.innerHTML = `<span class="text-[9px] font-black opacity-50 mb-1">${d.n}</span><span class="text-[10px] font-bold">${d.w}</span><span class="text-base font-black">${d.d}</span>`;
                container.appendChild(btn);
            });
        }
        function renderItin() {
            const list = document.getElementById('itinerary-list');
            list.innerHTML = "";
            const items = state.itin[state.currentDay] || [];
            items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "relative pl-10 mb-8";
                div.innerHTML = `
                    <div class="absolute left-[13px] top-1 w-4 h-4 rounded-full bg-cream-accent border-4 border-white shadow z-10"></div>
                    <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-cream-primary/10 relative">
                        <button onclick="delItin(${idx})" class="absolute top-4 right-4 text-gray-200">✕</button>
                        <div class="flex justify-between mb-2">
                            <span contenteditable="true" onblur="editItin(${idx},'time',this.innerText)" class="editable text-xs font-black text-cream-accent italic">${item.time}</span>
                            <span contenteditable="true" onblur="editItin(${idx},'type',this.innerText)" class="editable text-[10px] bg-cream-bg px-2 py-1 rounded-lg text-cream-sub">${item.type}</span>
                        </div>
                        <h3 contenteditable="true" onblur="editItin(${idx},'title',this.innerText)" class="editable font-black text-base mb-1">${item.title}</h3>
                        <p contenteditable="true" onblur="editItin(${idx},'loc',this.innerText)" class="editable text-[11px] text-gray-400 mb-3">${item.loc}</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="openM('google', '${item.loc}')" class="py-2.5 bg-gray-50 rounded-xl text-[10px] font-black">Google</button>
                            <button onclick="openM('naver', '${item.loc}')" class="py-2.5 bg-green-50 rounded-xl text-[10px] font-black text-green-700">Naver</button>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }
        function addNewItinerary() { state.itin[state.currentDay].push({ time: "12:00", title: "新行程", loc: "地點", type: "分類" }); saveState(); renderItin(); }
        function delItin(idx) { state.itin[state.currentDay].splice(idx,1); saveState(); renderItin(); }
        function editItin(idx, f, v) { state.itin[state.currentDay][idx][f] = v; saveState(); }

        // --- 代辦 ---
        function renderTodos() {
            const container = document.getElementById('todo-groups');
            container.innerHTML = "";
            state.todoGroups.forEach((group, gIdx) => {
                const gDiv = document.createElement('div');
                gDiv.className = "bg-white p-6 rounded-[2.5rem] shadow-sm relative";
                gDiv.innerHTML = `
                    <button onclick="delTodoG(${gIdx})" class="absolute top-6 right-6 text-gray-200">✕</button>
                    <h3 contenteditable="true" onblur="editTodoG(${gIdx}, this.innerText)" class="editable text-base font-black mb-4 pr-6">${group.title}</h3>
                    <div class="space-y-3">
                        ${group.items.map((item, iIdx) => `
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3"><div class="w-4 h-4 rounded border border-gray-200"></div>
                                <span contenteditable="true" onblur="editTodoI(${gIdx},${iIdx},this.innerText)" class="editable text-sm font-bold text-gray-500">${item}</span></div>
                                <button onclick="delTodoI(${gIdx},${iIdx})" class="text-gray-200 text-xs">✕</button>
                            </div>`).join('')}
                    </div>
                    <button onclick="addTodoI(${gIdx})" class="mt-4 text-[10px] font-black text-cream-accent uppercase">+ 新增項目</button>`;
                container.appendChild(gDiv);
            });
        }
        function addTodoGroup() { state.todoGroups.push({ id: Date.now(), title: "母標題: 新分類", items: ["代辦項目"] }); saveState(); renderTodos(); }
        function delTodoG(idx) { state.todoGroups.splice(idx,1); saveState(); renderTodos(); }
        function editTodoG(idx, v) { state.todoGroups[idx].title = v; saveState(); }
        function addTodoI(idx) { state.todoGroups[idx].items.push("點擊編輯"); saveState(); renderTodos(); }
        function delTodoI(gIdx, iIdx) { state.todoGroups[gIdx].items.splice(iIdx,1); saveState(); renderTodos(); }
        function editTodoI(gIdx, iIdx, v) { state.todoGroups[gIdx].items[iIdx] = v; saveState(); }

        // --- 記帳 ---
        function setField(type, val) {
            document.querySelectorAll(`.${type}-btn`).forEach(b => {
                b.classList.remove('active');
                if (b.innerText === val) b.classList.add('active');
            });
            if(type === 'payer') curPayer = val;
            if(type === 'payment') curPayment = val;
            if(type === 'tax') curTax = val;
        }

        function renderExpenses(filter = 'all') {
            const list = document.getElementById('expense-list');
            list.innerHTML = "";
            const uniqueDates = [...new Set(state.expenses.map(e => e.date.slice(5)))].sort();
            renderDateFilters(uniqueDates, filter);

            const filtered = filter === 'all' ? state.expenses : state.expenses.filter(e => e.date.endsWith(filter));
            filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((e, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm relative";
                div.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-gray-50 rounded-2xl flex items-center justify-center text-[10px] font-black text-gray-400 italic">${e.payer[0]}</div>
                        <div>
                            <div class="flex items-center space-x-2"><p class="text-sm font-black">${e.item}</p>
                            ${e.tax === '已退稅' ? '<span class="bg-green-500 text-white text-[7px] px-1.5 py-0.5 rounded-full font-bold">已退稅</span>' : ''}</div>
                            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">${e.date.slice(5)} · ${e.payer} · ${e.payment}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black italic tracking-tighter">NT$ ${e.twd.toLocaleString()}</p>
                        <p class="text-[9px] text-gray-300 font-bold tracking-widest italic">(₩ ${e.amount.toLocaleString()})</p>
                        <button onclick="delExp(${idx})" class="text-[8px] text-gray-200 uppercase mt-1">✕ 刪除</button>
                    </div>`;
                list.appendChild(div);
            });
            updateSummary();
        }
        function renderDateFilters(dates, cur) {
            const container = document.getElementById('expense-date-filter');
            container.innerHTML = `<button onclick="renderExpenses('all')" class="px-4 py-2 rounded-full text-[10px] font-bold ${cur === 'all' ? 'bg-cream-accent text-white' : 'bg-white text-gray-400'}">全部</button>`;
            dates.forEach(d => {
                container.innerHTML += `<button onclick="renderExpenses('${d}')" class="px-4 py-2 rounded-full text-[10px] font-bold ${cur === d ? 'bg-cream-accent text-white' : 'bg-white text-gray-400'}">${d}</button>`;
            });
        }
        function calcHint() {
            const a = parseFloat(document.getElementById('exp-amount').value) || 0;
            const r = parseFloat(document.getElementById('exp-rate').value) || 1;
            document.getElementById('exp-twd-hint').innerText = `台幣換算: NT$ ${Math.round(a * r).toLocaleString()}`;
        }
        function openExpenseModal() { document.getElementById('expense-modal').classList.remove('hidden'); document.getElementById('exp-date').valueAsDate = new Date(); }
        function closeExpenseModal() { document.getElementById('expense-modal').classList.add('hidden'); }
        function saveExpense() {
            const item = document.getElementById('exp-item').value;
            const date = document.getElementById('exp-date').value;
            const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
            const rate = parseFloat(document.getElementById('exp-rate').value) || 1;
            if (item && amount) {
                state.expenses.push({ item, date, amount, rate, payer: curPayer, payment: curPayment, tax: curTax, twd: Math.round(amount * rate) });
                saveState(); renderExpenses(); closeExpenseModal();
                document.getElementById('exp-item').value = ""; document.getElementById('exp-amount').value = "";
            }
        }
        function delExp(idx) { if(confirm("確定刪除？")) { state.expenses.splice(idx,1); saveState(); renderExpenses(); } }
        function updateSummary() {
            const total = state.expenses.reduce((s, e) => s + e.twd, 0);
            document.getElementById('total-spent').innerText = `NT$ ${total.toLocaleString()}`;
            document.getElementById('budget-left').innerText = `$ ${(state.budget - total).toLocaleString()}`;
            document.getElementById('budget-bar').style.width = Math.min(100, (total / state.budget) * 100) + '%';
        }
        function toggleSettlement() {
            const modal = document.getElementById('settlement-modal');
            const content = document.getElementById('settlement-content');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                const payers = ["小慌", "昱凱", "小安", "文哥"];
                const total = state.expenses.reduce((s, e) => s + e.twd, 0);
                const avg = total / payers.length;
                const paid = {}; payers.forEach(p => paid[p] = 0);
                state.expenses.forEach(e => paid[e.payer] += e.twd);
                content.innerHTML = "";
                payers.forEach(p => {
                    const diff = paid[p] - avg;
                    content.innerHTML += `<div class="flex justify-between items-center py-2 border-b border-gray-50"><span class="text-sm font-bold">${p}</span><div class="text-right"><p class="text-[10px] text-gray-400">支付: ${paid[p].toLocaleString()}</p><p class="text-xs font-black ${diff >= 0 ? 'text-green-500' : 'text-red-400'}">${diff >= 0 ? '+' : ''}${Math.round(diff).toLocaleString()}</p></div></div>`;
                });
            } else { modal.classList.add('hidden'); }
        }

        // --- 資訊 ---
        function renderInfo() {
            const container = document.getElementById('custom-info-list');
            container.innerHTML = "";
            state.customInfo.forEach((info, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl shadow-sm border border-gray-100 relative";
                div.innerHTML = `<button onclick="delInfo(${idx})" class="absolute top-4 right-4 text-gray-200 text-xs">✕</button>
                    <h4 contenteditable="true" onblur="editInfo(${idx},'title',this.innerText)" class="editable font-black text-sm mb-2">${info.title}</h4>
                    <div contenteditable="true" onblur="editInfo(${idx},'content',this.innerText)" class="editable text-xs text-gray-500 leading-relaxed">${info.content}</div>`;
                container.appendChild(div);
            });
        }
        function addCustomInfo() { state.customInfo.push({ title: "新資訊區塊", content: "點擊編輯內容" }); saveState(); renderInfo(); }
        function delInfo(idx) { state.customInfo.splice(idx,1); saveState(); renderInfo(); }
        function editInfo(idx, f, v) { state.customInfo[idx][f] = v; saveState(); }

        // --- 通用 ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-300'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav-btn'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav-btn');
            document.getElementById('nav-' + tab).classList.remove('text-gray-300');
            document.getElementById('fab-budget').style.display = (tab === 'budget') ? 'flex' : 'none';
        }
        function openM(type, loc) { const q = encodeURIComponent(loc); window.open(type === 'google' ? `https://www.google.com/maps/search/?api=1&query=${q}` : `https://map.naver.com/v5/search/${q}`, '_blank'); }
    </script>
</body>
</html>
