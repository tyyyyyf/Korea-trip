<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🇰🇷 韓國之旅 2026 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-bg': '#F8F5F2',
                        'cream-card': '#FFFFFF',
                        'cream-accent': '#4A342E',
                        'cream-primary': '#E8DCCF',
                        'cat-att': '#D9B99B', 'cat-res': '#E8DCCF', 'cat-caf': '#EEDFCC',
                        'cat-shp': '#F3E9E0', 'cat-bis': '#C4A484', 'cat-mon': '#D2B48C', 'cat-oth': '#ECECEB',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F5F2; color: #2C2C2C; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .editable:focus { outline: 2px dashed #4A342E; background: rgba(74, 52, 46, 0.05); border-radius: 4px; }
        .active-nav-btn { color: #4A342E !important; }
        .day-btn { width: 80px; height: 80px; flex-shrink: 0; transition: all 0.2s; }
        .day-btn.active { background-color: #4A342E; color: white; transform: scale(1.05); }
        .timeline-line::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #E8DCCF; opacity: 0.5; }
        .seg-btn { background-color: #FFFFFF; color: #8B8B8B; border: 1px solid #F3F0ED; transition: all 0.2s; }
        .seg-btn.active { background-color: #4A342E; color: #FFFFFF; border-color: #4A342E; }
        /* Detail Modal */
        #detail-modal { position: fixed; inset: 0; z-index: 500; background: #FFFFFF; display: none; overflow-y: auto; }
        #detail-modal.active { display: block; animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-[430px] min-h-screen pb-32 relative bg-cream-bg shadow-inner">
        
        <!-- Header -->
        <header class="p-6 bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-cream-primary/20 flex justify-between items-center">
            <h1 id="trip-title" contenteditable="true" onblur="saveState()" class="editable text-lg font-black tracking-tight italic">🇰🇷 韓國之旅 2026</h1>
            <div class="w-8 h-8 rounded-full bg-cream-accent text-white flex items-center justify-center text-[10px] font-bold">KR</div>
        </header>

        <!-- [分頁 1] 行程 -->
        <section id="tab-schedule" class="tab-content active px-4 pt-6">
            <div id="day-selector" class="flex space-x-3 overflow-x-auto no-scrollbar mb-8 pb-4"></div>
            <div class="relative timeline-line ml-1" id="itinerary-list"></div>
            <button onclick="addNewItinerary()" class="mt-8 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-cream-accent font-bold text-sm tracking-widest">+ 新增行程項目</button>
        </section>

        <!-- [分頁 2] 代辦 -->
        <section id="tab-todo" class="tab-content px-6 pt-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic">行前代辦</h2>
                <button onclick="addTodoGroup()" class="text-xs bg-cream-accent text-white px-3 py-1.5 rounded-full font-bold">新增母標題</button>
            </div>
            <div id="todo-groups" class="space-y-6"></div>
        </section>

        <!-- [分頁 3] 記帳 -->
        <section id="tab-budget" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic">旅遊記帳</h2>
            <div id="budget-summary-area" class="mb-4"></div>
            <div class="bg-cream-accent text-white p-8 rounded-[2.5rem] shadow-lg mb-6 relative overflow-hidden">
                <p class="text-[10px] opacity-70 font-bold mb-1 tracking-widest uppercase font-mono">總支出 (TWD)</p>
                <h3 id="total-spent" class="text-4xl font-black italic tracking-tighter">NT$ 0</h3>
                <button onclick="toggleSettlement()" class="mt-4 bg-white/20 px-4 py-2 rounded-full text-[10px] font-bold border border-white/30 italic">查看分帳統計</button>
                <i class="fa-solid fa-coins absolute -right-4 -bottom-4 text-white/10 text-9xl"></i>
            </div>
            <div id="expense-date-filter" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 px-1"></div>
            <div id="expense-list" class="space-y-4"></div>
        </section>

        <!-- [分頁 4] 資訊 -->
        <section id="tab-info" class="tab-content px-6 pt-8">
            <h2 class="text-2xl font-black mb-6 italic text-cream-accent">旅遊資訊</h2>
            <div class="space-y-4 mb-8">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-[10px] font-black text-blue-500 uppercase mb-3 tracking-widest font-mono">✈️ 去程 濟州航空 7C6102</p>
                    <div class="text-sm text-gray-500 font-medium font-mono tracking-tighter">11:55 桃機 T1 / 15:35 抵達仁川 T1</div>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-[10px] font-black text-orange-500 uppercase mb-3 tracking-widest font-mono">✈️ 回程 長榮航空 BR159</p>
                    <div class="text-sm text-gray-500 font-medium font-mono tracking-tighter">19:45 仁川 T1 / 21:25 抵達桃機 T2</div>
                </div>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-8">
                <h4 class="font-black text-[13px] text-center mb-4 italic">Seoul Jung-gu Sogong-ro 6na-gil 11</h4>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="openM('google', 'Seoul Jung-gu Sogong-ro 6na-gil 11')" class="py-3 bg-gray-50 rounded-2xl text-[10px] font-bold">Google Maps</button>
                    <button onclick="openM('naver', '서울특별시 중구 소공로6나길 11')" class="py-3 bg-green-50 rounded-2xl text-[10px] font-bold text-green-700">NAVER Map</button>
                </div>
            </div>
            <div id="custom-info-list" class="space-y-4"></div>
            <button onclick="addCustomInfo()" class="mt-4 w-full py-4 border-2 border-dashed border-cream-primary rounded-3xl text-gray-400 font-bold text-sm">+ 新增自訂資訊</button>
        </section>

        <!-- 底部導覽 -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-[400px] bg-white/80 backdrop-blur-2xl border border-white/50 h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-2 z-[100]">
            <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-btn flex flex-col items-center space-y-1 active-nav-btn text-gray-300">
                <i class="fa-solid fa-compass text-lg"></i><span class="text-[9px] font-black uppercase tracking-tighter">行程</span>
            </button>
            <button onclick="switchTab('todo')" id="nav-todo" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-list-check text-lg"></i><span class="text-[9px] font-black uppercase tracking-tighter">代辦</span>
            </button>
            <button onclick="switchTab('budget')" id="nav-budget" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-sack-dollar text-lg"></i><span class="text-[9px] font-black uppercase tracking-tighter">記帳</span>
            </button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-btn flex flex-col items-center space-y-1 text-gray-300">
                <i class="fa-solid fa-circle-info text-lg"></i><span class="text-[9px] font-black uppercase tracking-tighter">資訊</span>
            </button>
        </nav>

        <!-- 記帳新增按鈕 -->
        <button id="fab-budget" onclick="openExpenseModal()" class="hidden fixed bottom-32 right-8 w-14 h-14 bg-cream-accent text-white rounded-full shadow-2xl items-center justify-center text-xl z-[90] active:scale-90 transition">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- [新組件] 全螢幕詳細頁 Modal -->
    <div id="detail-modal" class="no-scrollbar">
        <div class="sticky top-0 z-[510] bg-white/90 backdrop-blur-md px-6 py-5 border-b border-gray-100 flex justify-between items-center">
            <button onclick="closeDetailModal()" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full text-gray-400">✕</button>
            <h3 class="text-[10px] font-black italic tracking-widest text-cream-accent uppercase">Itinerary Detail</h3>
            <button onclick="saveCurrentDetail()" class="px-5 py-2 bg-cream-accent text-white rounded-full text-xs font-black italic shadow-lg shadow-cream-accent/20">SAVE</button>
        </div>

        <div class="p-8 pb-40 space-y-8">
            <input type="hidden" id="detail-itin-idx">
            
            <!-- 標題與時間 -->
            <div class="space-y-4">
                <input id="detail-title" type="text" class="w-full text-3xl font-black border-none outline-none italic tracking-tighter" placeholder="景點/目的地名稱">
                <div class="flex items-center space-x-3 bg-gray-50 w-fit px-4 py-2 rounded-2xl">
                    <i class="fa-regular fa-clock text-cream-accent text-sm"></i>
                    <input id="detail-time" type="time" class="text-sm font-black italic border-none outline-none bg-transparent">
                </div>
            </div>

            <!-- 分類 (Dropdown) -->
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 block">Category</label>
                <select id="detail-category" class="w-full bg-cream-bg/50 p-4 rounded-2xl border-none outline-none text-sm font-bold appearance-none">
                    <option value="景點">景點</option>
                    <option value="餐廳">餐廳</option>
                    <option value="咖啡廳">咖啡廳</option>
                    <option value="購物">購物</option>
                    <option value="住宿">住宿</option>
                    <option value="交通">交通</option>
                    <option value="機場">機場</option>
                    <option value="夜生活">夜生活</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <!-- 描述與備註 -->
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Description</label>
                    <textarea id="detail-desc" rows="3" class="w-full bg-gray-50 p-5 rounded-[2rem] border-none outline-none text-sm font-medium leading-relaxed" placeholder="輸入行程內容..."></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Notes</label>
                    <textarea id="detail-notes" rows="2" class="w-full bg-orange-50/50 p-5 rounded-[2rem] border-none outline-none text-sm font-medium leading-relaxed italic" placeholder="附近有什麼..."></textarea>
                </div>
            </div>

            <!-- 導航按鈕 -->
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="openM('google', document.getElementById('detail-title').value)" class="py-4 bg-gray-50 rounded-2xl text-[10px] font-black italic uppercase tracking-widest border border-gray-100">Google Maps</button>
                <button onclick="openM('naver', document.getElementById('detail-title').value)" class="py-4 bg-green-50 rounded-2xl text-[10px] font-black text-green-700 italic uppercase tracking-widest">NAVER Map</button>
            </div>

            <!-- 購物模組 Shopping List -->
            <div class="pt-8 border-t border-gray-100">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <h4 class="text-xl font-black italic tracking-tight">Shopping List 🧾</h4>
                        <p id="overall-shop-stat" class="text-[9px] font-black text-gray-400 uppercase mt-1 tracking-tighter">0 Items Bought (0%)</p>
                    </div>
                    <button onclick="addShopGroup()" class="bg-cream-accent text-white px-4 py-2 rounded-full text-[10px] font-black uppercase italic shadow-lg shadow-cream-accent/20">+ Add Shop</button>
                </div>
                
                <div id="shopping-module-container" class="space-y-6">
                    <!-- JS 生成 Shopping Groups -->
                </div>
            </div>
        </div>
    </div>

    <!-- 記帳 & 分帳 Modal (保留原有邏輯) -->
    <div id="expense-modal" class="fixed inset-0 z-[200] hidden bg-black/40 backdrop-blur-sm flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] p-8 animate-[slideUp_0.3s] pb-12">
            <div class="flex justify-between items-center mb-6">
                <h3 id="exp-modal-title" class="text-xl font-black italic">記帳</h3>
                <button onclick="closeExpenseModal()" class="w-8 h-8 bg-gray-100 rounded-full text-gray-400 text-xs">✕</button>
            </div>
            <div class="space-y-4 overflow-y-auto max-h-[70vh] no-scrollbar">
                <input type="hidden" id="edit-exp-id">
                <input id="exp-item" type="text" placeholder="項目名稱" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm font-bold">
                <input id="exp-date" type="date" class="w-full bg-gray-50 p-4 rounded-2xl outline-none text-sm font-bold font-mono">
                <div class="grid grid-cols-4 gap-2" id="payer-btns">
                    <button onclick="setField('payer','小慌')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold">小慌</button>
                    <button onclick="setField('payer','昱凱')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold">昱凱</button>
                    <button onclick="setField('payer','小安')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold">小安</button>
                    <button onclick="setField('payer','文哥')" class="payer-btn seg-btn py-3 rounded-xl text-[10px] font-bold active">文哥</button>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setField('payment','信用卡')" class="payment-btn seg-btn py-3 rounded-xl text-[10px] font-bold">信用卡</button>
                    <button onclick="setField('payment','現金')" class="payment-btn seg-btn py-3 rounded-xl text-[10px] font-bold active">現金</button>
                    <button onclick="setField('payment','行動支付')" class="payment-btn seg-btn py-3 rounded-xl text-[10px] font-bold">行動支付</button>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setField('tax','無')" class="tax-btn seg-btn py-3 rounded-xl text-[10px] font-bold active">無</button>
                    <button onclick="setField('tax','未退稅')" class="tax-btn seg-btn py-3 rounded-xl text-[10px] font-bold">未退稅</button>
                    <button onclick="setField('tax','已退稅')" class="tax-btn seg-btn py-3 rounded-xl text-[10px] font-bold">已退稅</button>
                </div>
                <div class="flex items-center space-x-2">
                    <select id="exp-currency" class="w-1/3 bg-gray-50 p-4 rounded-2xl text-[10px] font-black border-none outline-none"><option value="KRW">KRW(₩)</option><option value="TWD">TWD($)</option></select>
                    <input id="exp-amount" type="number" placeholder="金額" class="flex-1 bg-gray-50 p-4 rounded-2xl outline-none text-base font-black italic">
                </div>
                <div class="flex justify-between px-2 font-mono text-[10px] text-gray-400">
                    <span>匯率: <input id="exp-rate" type="number" value="0.024" step="0.001" class="w-10 bg-transparent border-b border-gray-200 outline-none"></span>
                    <span id="exp-twd-hint" class="font-black text-cream-accent uppercase">台幣: NT$ 0</span>
                </div>
                <button onclick="saveExpense()" class="w-full bg-cream-accent text-white py-5 rounded-[2.5rem] font-black shadow-lg">確認儲存</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心資料 ---
        let state = JSON.parse(localStorage.getItem('korea_2026_pro_v9')) || {
            title: "🇰🇷 韓國之旅 2026", budget: 50000, currentDay: 1,
            itin: { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[] },
            todoGroups: [], expenses: [], customInfo: []
        };

        const dayInfo = [
            { d: "7/5", w: "SUN", n: "Day 1" }, { d: "7/6", w: "MON", n: "Day 2" }, { d: "7/7", w: "TUE", n: "Day 3" },
            { d: "7/8", w: "WED", n: "Day 4" }, { d: "7/9", w: "THU", n: "Day 5" }, { d: "7/10", w: "FRI", n: "Day 6" }, { d: "7/11", w: "SAT", n: "Day 7" }
        ];

        let curPayer="文哥", curPayment="現金", curTax="無";

        window.onload = () => {
            renderAll();
            document.getElementById('exp-amount').oninput = calcExpHint;
            document.getElementById('exp-rate').oninput = calcExpHint;
        };

        function saveState() {
            state.title = document.getElementById('trip-title').innerText;
            localStorage.setItem('korea_2026_pro_v9', JSON.stringify(state));
            updateSummary();
        }

        function renderAll() {
            renderDayNav(); renderItin(); renderTodos(); renderExpenses('all'); renderInfo(); updateSummary();
        }

        // --- 行程功能 ---
        function renderDayNav() {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            dayInfo.forEach((d, i) => {
                const num = i + 1;
                const btn = document.createElement('button');
                btn.className = `day-btn flex-none rounded-2xl flex flex-col items-center justify-center shadow-sm transition-all ${state.currentDay == num ? 'active' : 'bg-white text-cream-sub'}`;
                btn.onclick = () => { state.currentDay = num; renderAll(); };
                btn.innerHTML = `<span class="text-[9px] font-black opacity-40 mb-1 uppercase tracking-tighter font-mono">${d.n}</span><span class="text-[10px] font-bold">${d.w}</span><span class="text-base font-black italic tracking-tighter underline decoration-cream-primary/30">${d.d}</span>`;
                container.appendChild(btn);
            });
        }

        function getCatColor(type) {
            const map = {'景點':'bg-cat-att text-white','購物':'bg-cat-shp text-[#8B735B]','餐廳':'bg-cat-res text-cream-accent','咖啡廳':'bg-cat-caf text-[#8B7E74]','住宿':'bg-cat-bis text-white','交通':'bg-cat-mon text-white','其他':'bg-cat-oth text-gray-500'};
            return map[type] || 'bg-white text-gray-400';
        }

        function renderItin() {
            const list = document.getElementById('itinerary-list'); list.innerHTML = "";
            const items = state.itin[state.currentDay] || [];
            items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "relative pl-10 mb-8";
                div.innerHTML = `
                    <div class="absolute left-[13px] top-1 w-4 h-4 rounded-full bg-cream-accent border-4 border-white shadow z-10"></div>
                    <div onclick="openDetailModal(${idx})" class="bg-white p-5 rounded-[2rem] shadow-sm border border-cream-primary/10 relative transition active:scale-95">
                        <div class="absolute top-4 right-4 flex space-x-3 text-gray-300">
                            <button onclick="event.stopPropagation(); moveItin(${idx},-1)"><i class="fa-solid fa-chevron-up"></i></button>
                            <button onclick="event.stopPropagation(); moveItin(${idx},1)"><i class="fa-solid fa-chevron-down"></i></button>
                            <button onclick="event.stopPropagation(); delItin(${idx})"><i class="fa-solid fa-xmark ml-1"></i></button>
                        </div>
                        <div class="flex justify-between mb-2 pr-14">
                            <span class="text-xs font-black text-cream-accent italic tracking-tighter">${item.time || '12:00'}</span>
                            <span class="text-[9px] px-2 py-1 rounded-lg font-bold uppercase ${getCatColor(item.type)}">${item.type}</span>
                        </div>
                        <h3 class="font-black text-base italic tracking-tight uppercase">${item.title}</h3>
                        ${item.shopping && item.shopping.length > 0 ? `<p class="text-[8px] font-black text-orange-400 mt-2 italic uppercase tracking-widest"><i class="fa-solid fa-cart-shopping mr-1"></i> Includes Shopping List</p>` : ''}
                    </div>`;
                list.appendChild(div);
            });
        }

        function addNewItinerary() {
            state.itin[state.currentDay].push({ time:"12:00", title:"新行程", type:"景點", desc:"", notes:"", shopping:[] });
            saveState(); renderItin();
        }
        function delItin(idx) { if(confirm("確定刪除行程？")) { state.itin[state.currentDay].splice(idx,1); saveState(); renderItin(); } }
        function moveItin(idx, dir) {
            const arr = state.itin[state.currentDay]; const t = idx + dir;
            if(t >= 0 && t < arr.length) { [arr[idx], arr[t]] = [arr[t], arr[idx]]; saveState(); renderItin(); }
        }

        // --- Detail Modal & Shopping List 邏輯 ---
        function openDetailModal(idx) {
            const item = state.itin[state.currentDay][idx];
            document.getElementById('detail-itin-idx').value = idx;
            document.getElementById('detail-title').value = item.title;
            document.getElementById('detail-time').value = item.time || "12:00";
            document.getElementById('detail-category').value = item.type || "景點";
            document.getElementById('detail-desc').value = item.desc || "";
            document.getElementById('detail-notes').value = item.notes || "";
            
            renderShoppingModule(item.shopping || []);
            document.getElementById('detail-modal').classList.add('active');
        }

        function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }

        function saveCurrentDetail() {
            const itinIdx = document.getElementById('detail-itin-idx').value;
            const item = state.itin[state.currentDay][itinIdx];
            item.title = document.getElementById('detail-title').value;
            item.time = document.getElementById('detail-time').value;
            item.type = document.getElementById('detail-category').value;
            item.desc = document.getElementById('detail-desc').value;
            item.notes = document.getElementById('detail-notes').value;
            // Shopping list is saved real-time via its own functions
            saveState(); renderItin(); closeDetailModal();
        }

        function renderShoppingModule(shops) {
            const container = document.getElementById('shopping-module-container');
            container.innerHTML = "";
            let totalItems = 0, totalBought = 0;

            shops.forEach((shop, sIdx) => {
                const boughtCount = shop.items.filter(i => i.bought).length;
                const totalCount = shop.items.length;
                const pct = totalCount > 0 ? Math.round((boughtCount / totalCount) * 100) : 0;
                totalItems += totalCount;
                totalBought += boughtCount;

                const div = document.createElement('div');
                div.className = "bg-white border border-gray-100 rounded-[2rem] p-5 shadow-sm space-y-4";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h5 contenteditable="true" onblur="editShopName(${sIdx}, this.innerText)" class="editable font-black text-sm italic tracking-tight uppercase">${shop.name}</h5>
                            <div class="mt-2 flex items-center space-x-2">
                                <div class="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                                    <div class="h-full bg-cream-accent transition-all duration-500" style="width: ${pct}%"></div>
                                </div>
                                <span class="text-[9px] font-black text-cream-accent font-mono">${boughtCount}/${totalCount}</span>
                            </div>
                        </div>
                        <button onclick="delShop(${sIdx})" class="ml-4 text-gray-300 text-xs">✕</button>
                    </div>
                    <div class="space-y-2">
                        ${shop.items.map((item, iIdx) => `
                            <div class="flex items-center space-x-3 bg-cream-bg/30 p-3 rounded-xl relative group">
                                <input type="checkbox" ${item.bought?'checked':''} onchange="toggleShopItem(${sIdx}, ${iIdx})" class="w-5 h-5 accent-cream-accent rounded-lg">
                                <div class="flex-1 min-w-0">
                                    <div contenteditable="true" onblur="editShopItem(${sIdx},${iIdx},'name',this.innerText)" class="editable text-[11px] font-bold truncate ${item.bought?'line-through text-gray-300':''}">${item.name}</div>
                                    <div class="flex items-center space-x-2 mt-1">
                                        <span class="text-[9px] font-black text-gray-400 font-mono">₩ <span contenteditable="true" onblur="editShopItem(${sIdx},${iIdx},'price',this.innerText)">${item.price.toLocaleString()}</span></span>
                                        <span class="text-[9px] font-black text-gray-400 font-mono">x <span contenteditable="true" onblur="editShopItem(${sIdx},${iIdx},'qty',this.innerText)">${item.qty}</span></span>
                                    </div>
                                </div>
                                <button onclick="delShopItem(${sIdx}, ${iIdx})" class="text-gray-200 text-[10px] opacity-0 group-hover:opacity-100">✕</button>
                            </div>
                        `).join('')}
                        <button onclick="addShopItem(${sIdx})" class="text-[9px] font-black text-cream-accent uppercase tracking-widest mt-2">+ Add Item</button>
                    </div>
                `;
                container.appendChild(div);
            });

            const overallPct = totalItems > 0 ? Math.round((totalBought / totalItems) * 100) : 0;
            document.getElementById('overall-shop-stat').innerText = `${totalBought} / ${totalItems} Bought (${overallPct}%)`;
        }

        function addShopGroup() {
            const itinIdx = document.getElementById('detail-itin-idx').value;
            if(!state.itin[state.currentDay][itinIdx].shopping) state.itin[state.currentDay][itinIdx].shopping = [];
            state.itin[state.currentDay][itinIdx].shopping.push({ name: "NEW SHOP", items: [] });
            saveState(); renderShoppingModule(state.itin[state.currentDay][itinIdx].shopping);
        }
        function delShop(sIdx) { 
            const itinIdx = document.getElementById('detail-itin-idx').value;
            state.itin[state.currentDay][itinIdx].shopping.splice(sIdx, 1);
            saveState(); renderShoppingModule(state.itin[state.currentDay][itinIdx].shopping);
        }
        function addShopItem(sIdx) {
            const itinIdx = document.getElementById('detail-itin-idx').value;
            state.itin[state.currentDay][itinIdx].shopping[sIdx].items.push({ name: "New Item", price: 0, qty: 1, bought: false, link: "" });
            saveState(); renderShoppingModule(state.itin[state.currentDay][itinIdx].shopping);
        }
        function toggleShopItem(sIdx, iIdx) {
            const itinIdx = document.getElementById('detail-itin-idx').value;
            const item = state.itin[state.currentDay][itinIdx].shopping[sIdx].items[iIdx];
            item.bought = !item.bought;
            saveState(); renderShoppingModule(state.itin[state.currentDay][itinIdx].shopping);
        }
        function editShopName(sIdx, v) { 
            const itinIdx = document.getElementById('detail-itin-idx').value;
            state.itin[state.currentDay][itinIdx].shopping[sIdx].name = v; saveState(); 
        }
        function editShopItem(sIdx, iIdx, f, v) {
            const itinIdx = document.getElementById('detail-itin-idx').value;
            const item = state.itin[state.currentDay][itinIdx].shopping[sIdx].items[iIdx];
            if(f==='price' || f==='qty') item[f] = parseFloat(v.replace(/,/g,'')) || 0;
            else item[f] = v;
            saveState(); 
        }
        function delShopItem(sIdx, iIdx) {
            const itinIdx = document.getElementById('detail-itin-idx').value;
            state.itin[state.currentDay][itinIdx].shopping[sIdx].items.splice(iIdx,1);
            saveState(); renderShoppingModule(state.itin[state.currentDay][itinIdx].shopping);
        }

        // --- 其餘模組 (代辦/記帳 - 保留) ---
        function renderTodos() {
            const container = document.getElementById('todo-groups'); container.innerHTML = "";
            state.todoGroups.forEach((group, gIdx) => {
                const gDiv = document.createElement('div'); gDiv.className = "bg-white p-6 rounded-[2.5rem] shadow-sm relative mb-4";
                gDiv.innerHTML = `<button onclick="delTodoG(${gIdx})" class="absolute top-6 right-6 text-gray-200">✕</button>
                    <h3 contenteditable="true" onblur="editTodoG(${gIdx}, this.innerText)" class="editable text-base font-black mb-4 pr-6 italic uppercase tracking-widest">${group.title}</h3>
                    <div class="space-y-3">${group.items.map((item, iIdx) => `<div class="flex items-center justify-between group">
                        <div class="flex items-center space-x-3"><div class="w-4 h-4 rounded border border-gray-200"></div>
                        <span contenteditable="true" onblur="editTodoI(${gIdx},${iIdx},this.innerText)" class="editable text-sm font-bold text-gray-500">${item}</span></div>
                        <button onclick="delTodoI(${gIdx},${iIdx})" class="text-gray-200 text-xs">✕</button></div>`).join('')}</div>
                    <button onclick="addTodoI(${gIdx})" class="mt-4 text-[10px] font-black text-cream-accent uppercase tracking-widest">+ 新增子項目</button>`;
                container.appendChild(gDiv);
            });
        }
        function addTodoGroup() { state.todoGroups.push({ id: Date.now(), title: "母標題: 新群組", items: ["代辦項目"] }); saveState(); renderTodos(); }
        function delTodoG(idx) { state.todoGroups.splice(idx,1); saveState(); renderTodos(); }
        function editTodoG(idx, v) { state.todoGroups[idx].title = v; saveState(); }
        function addTodoI(idx) { state.todoGroups[idx].items.push("點擊編輯"); saveState(); renderTodos(); }
        function delTodoI(gIdx, iIdx) { state.todoGroups[gIdx].items.splice(iIdx,1); saveState(); renderTodos(); }
        function editTodoI(gIdx, iIdx, v) { state.todoGroups[gIdx].items[iIdx] = v; saveState(); }

        function setField(type, val) {
            document.querySelectorAll(`.${type}-btn`).forEach(b => {
                b.classList.remove('active'); if (b.innerText === val) b.classList.add('active');
            });
            if(type === 'payer') curPayer = val; if(type === 'payment') curPayment = val; if(type === 'tax') curTax = val;
        }

        function renderExpenses(filter = 'all') {
            const list = document.getElementById('expense-list'); list.innerHTML = "";
            const uniqueDates = [...new Set(state.expenses.map(e => e.date.slice(5)))].sort();
            renderExpDateFilter(uniqueDates, filter);
            const filtered = filter === 'all' ? state.expenses : state.expenses.filter(e => e.date.endsWith(filter));
            filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((e) => {
                const idx = state.expenses.findIndex(x => x.id === e.id);
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm relative transition active:scale-95";
                div.innerHTML = `<div class="flex items-center space-x-4 flex-1" onclick="editExp(${idx})">
                    <div class="w-10 h-10 bg-gray-50 rounded-2xl flex items-center justify-center text-[10px] font-black text-gray-400 italic">${e.payer[0]}</div>
                    <div class="flex-1"><div class="flex items-center space-x-2"><p class="text-sm font-black italic tracking-tighter uppercase">${e.item}</p>${e.tax === '已退稅'?'<span class="bg-green-500 text-white text-[7px] px-1.5 py-0.5 rounded-full font-bold uppercase">已退</span>':''}</div>
                    <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">${e.date.slice(5)} · ${e.payer} · ${e.payment}</p></div></div>
                    <div class="text-right shrink-0"><p class="text-sm font-black italic tracking-tighter">NT$ ${e.twd.toLocaleString()}</p><p class="text-[9px] text-gray-300 font-bold uppercase tracking-widest italic font-mono">(₩ ${e.amount.toLocaleString()})</p>
                    <button onclick="delExp(${idx})" class="text-[8px] text-red-200 font-bold mt-1 uppercase tracking-tighter italic">✕ 刪除</button></div>`;
                list.appendChild(div);
            });
            updateSummary();
        }
        function renderExpDateFilter(dates, cur) {
            const container = document.getElementById('expense-date-filter'); container.innerHTML = `<button onclick="renderExpenses('all')" class="px-5 py-2 rounded-full text-[10px] font-black ${cur === 'all' ? 'bg-cream-accent text-white' : 'bg-white text-gray-400'} shadow-sm uppercase italic">全部</button>`;
            dates.forEach(d => { container.innerHTML += `<button onclick="renderExpenses('${d}')" class="px-5 py-2 rounded-full text-[10px] font-black ${cur === d ? 'bg-cream-accent text-white' : 'bg-white text-gray-400'} shadow-sm uppercase italic">${d}</button>`; });
        }
        function calcExpHint() {
            const a = parseFloat(document.getElementById('exp-amount').value) || 0; const r = parseFloat(document.getElementById('exp-rate').value) || 1;
            document.getElementById('exp-twd-hint').innerText = `台幣: NT$ ${Math.round(a * r).toLocaleString()}`;
        }
        function openExpenseModal() {
            document.getElementById('exp-modal-title').innerText = "新增記帳"; document.getElementById('edit-exp-id').value = "";
            document.getElementById('expense-modal').classList.remove('hidden'); document.getElementById('exp-date').valueAsDate = new Date();
            setField('payer', '文哥'); setField('payment', '現金'); setField('tax', '無');
            document.getElementById('exp-item').value = ""; document.getElementById('exp-amount').value = ""; calcExpHint();
        }
        function editExp(idx) {
            const e = state.expenses[idx]; document.getElementById('exp-modal-title').innerText = "編輯帳目";
            document.getElementById('edit-exp-id').value = e.id; document.getElementById('exp-item').value = e.item;
            document.getElementById('exp-date').value = e.date; document.getElementById('exp-amount').value = e.amount;
            document.getElementById('exp-rate').value = e.rate; setField('payer', e.payer); setField('payment', e.payment); setField('tax', e.tax);
            document.getElementById('expense-modal').classList.remove('hidden'); calcExpHint();
        }
        function closeExpenseModal() { document.getElementById('expense-modal').classList.add('hidden'); }
        function saveExpense() {
            const item = document.getElementById('exp-item').value, date = document.getElementById('exp-date').value, amount = parseFloat(document.getElementById('exp-amount').value) || 0, rate = parseFloat(document.getElementById('exp-rate').value) || 1, id = document.getElementById('edit-exp-id').value;
            if (item && amount) {
                const rec = { id: id || Date.now(), item, date, amount, rate, payer: curPayer, payment: curPayment, tax: curTax, twd: Math.round(amount * rate) };
                if (id) { const idx = state.expenses.findIndex(x => x.id == id); state.expenses[idx] = rec; } else { state.expenses.push(rec); }
                saveState(); renderExpenses(); closeExpenseModal();
            }
        }
        function delExp(idx) { if(confirm("確定刪除？")) { state.expenses.splice(idx,1); saveState(); renderExpenses(); } }
        function updateSummary() {
            const total = state.expenses.reduce((s, e) => s + e.twd, 0); document.getElementById('total-spent').innerText = `NT$ ${total.toLocaleString()}`;
            document.getElementById('budget-left').innerText = `$ ${(state.budget - total).toLocaleString()}`;
            document.getElementById('budget-bar').style.width = Math.min(100, (total / state.budget) * 100) + '%';
        }
        function toggleSettlement() {
            const modal = document.getElementById('settlement-modal'), content = document.getElementById('settlement-content');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden'); const pList = ["小慌", "昱凱", "小安", "文哥"], total = state.expenses.reduce((s, e) => s + e.twd, 0), avg = total / pList.length, paid = {}; pList.forEach(p => paid[p] = 0);
                state.expenses.forEach(e => paid[e.payer] += e.twd); content.innerHTML = "";
                pList.forEach(p => { const diff = paid[p] - avg; content.innerHTML += `<div class="flex justify-between py-2 border-b border-gray-50"><span class="text-sm font-bold italic">${p}</span><div class="text-right font-mono"><p class="text-[10px] text-gray-400">已付: ${paid[p].toLocaleString()}</p><p class="text-xs font-black italic ${diff >= 0 ? 'text-green-500' : 'text-red-400'}">${diff >= 0 ? '+' : ''}${Math.round(diff).toLocaleString()}</p></div></div>`; });
            } else { modal.classList.add('hidden'); }
        }

        function renderInfo() {
            const container = document.getElementById('custom-info-list'); container.innerHTML = "";
            (state.customInfo || []).forEach((info, idx) => {
                const div = document.createElement('div'); div.className = "bg-white p-5 rounded-3xl shadow-sm border border-gray-100 relative mb-4";
                div.innerHTML = `<button onclick="delInfo(${idx})" class="absolute top-4 right-4 text-gray-200 text-xs">✕</button><h4 contenteditable="true" onblur="editInfo(${idx},'title',this.innerText)" class="editable font-black text-sm mb-2 italic tracking-widest uppercase underline decoration-cream-accent/20">${info.title}</h4><div contenteditable="true" onblur="editInfo(${idx},'content',this.innerText)" class="editable text-xs text-gray-500 leading-relaxed font-medium font-mono">${info.content}</div>`;
                container.appendChild(div);
            });
        }
        function addCustomInfo() { if(!state.customInfo) state.customInfo = []; state.customInfo.push({ title: "新標題", content: "內容..." }); saveState(); renderInfo(); }
        function delInfo(idx) { state.customInfo.splice(idx,1); saveState(); renderInfo(); }
        function editInfo(idx, f, v) { state.customInfo[idx][f] = v; saveState(); }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-300'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav-btn'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav-btn');
            document.getElementById('nav-' + tab).classList.remove('text-gray-300');
            document.getElementById('fab-budget').style.display = (tab === 'budget') ? 'flex' : 'none';
        }
        function openM(type, loc) { 
            if(!loc) return alert("請輸入地標名稱");
            const q = encodeURIComponent(loc); 
            window.open(type === 'google' ? `https://www.google.com/maps/search/?api=1&query=${q}` : `https://map.naver.com/v5/search/${q}`, '_blank'); 
        }
    </script>
</body>
</html>
